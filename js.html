                const t = m.totals || {};
                if (t.kcal != null || t.p != null) {
                    html += `<tr style="background:#f8f9fa;font-weight:bold;">
                        <td colspan="2" style="border:1px solid #bbb;padding:2px 4px;text-align:right;">Tổng (AI)</td>

                        <td style="border:1px solid #bbb;padding:2px 4px;text-align:right;">${t.p != null ? escapeHtml_(String(t.p)) : '—'}</td>
                        <td style="border:1px solid #bbb;padding:2px 4px;text-align:right;">${t.l != null ? escapeHtml_(String(t.l)) : '—'}</td>
                        <td style="border:1px solid #bbb;padding:2px 4px;text-align:right;">${t.g != null ? escapeHtml_(String(t.g)) : '—'}</td>
                    </tr>`;
                }
                html += '</tbody></table>';
            }

            const exchanges = Array.isArray(m.exchanges) ? m.exchanges : [];
            if (exchanges.length) {
                html += '<div style="font-size:9pt;"><b>Quy đổi/khẩu phần:</b><ul style="margin:2px 0 4px 16px;padding:0;">';
                exchanges.forEach(ex => {
                    html += `<li><b>${escapeHtml_(ex.group || '')}:</b> ${escapeHtml_(ex.detail || '')}</li>`;
                });
                html += '</ul></div>';
            }
            if (m.recipe) {
                html += `<div style="font-size:9pt;"><b>Cách chế biến:</b><div style="white-space:pre-wrap;background:#fcfcfc;border:1px dashed #ccc;padding:3px 6px;border-radius:4px;">${escapeHtml_(m.recipe)}</div></div>`;
            }
            html += '</div>'; // end meal
        });
        html += '</div></div>'; // end day
    });
    return html;
}

            : ctx.icuRoute === 'ICU_ROUTE_NPO' ? 'Nhịn ăn (NPO)'
            : (ctx.postopDiet === 'POSTOP_DIET_EN_TUBE' ? 'Sonde sau mổ'
                : ctx.postopDiet === 'POSTOP_DIET_TPN' ? 'TPN sau mổ'
                : 'Đường miệng');
        items.push(`<b>Đường nuôi dưỡng:</b> ${escapeHtml_(route)}`);
        if (ctx.dietPref && ctx.dietPref !== 'NONE') items.push(`<b>Sở thích/Tôn giáo:</b> ${escapeHtml_(ctx.dietPref)}`);
        if (Array.isArray(ctx.allergies) && ctx.allergies.length) items.push(`<b>Dị ứng:</b> ${ctx.allergies.map(escapeHtml_).join('; ')}`);
        const tex = [];
        if (ctx.conditions.includes('PREGNANT')) tex.push('Đang mang thai' + (ctx.pregTri ? ' (Q' + ctx.pregTri.replace('PREGNANT_T','') + ')' : '') + (Number.isFinite(ctx.pregWeek) ? ' - tuần ' + ctx.pregWeek : ''));
        if (ctx.conditions.includes('LACTATING')) tex.push('Đang cho con bú');
        if (ctx.conditions.includes('REFEEDING_RISK')) tex.push('Nguy cơ Refeeding - khởi đầu chậm, theo dõi điện giải');
        if (ctx.conditions.includes('ICU')) tex.push('Bệnh nặng / ICU - tăng giảm theo dung nạp');
        if (ctx.conditions.includes('PRE_OP')) tex.push('Trước phẫu thuật - lưu ý ERAS / NPO');
        if (ctx.conditions.includes('POST_OP_EARLY')) tex.push('Hậu phẫu sớm - khởi động ruột chậm');
        if (tex.length) items.push(`<b>Tình trạng đặc biệt:</b> ${tex.map(escapeHtml_).join('; ')}`);
    }
    return '<ul style="margin:0 0 0 16px;padding:0;">' + items.map(t => `<li>${t}</li>`).join('') + '</ul>';
}

// Hàm phụ trợ: Lấy chuỗi thực đơn tóm tắt
function getMenuSummaryString() {
    let text = "";
    if (currentMenuData.breakfast.length) text += "Sáng: " + currentMenuData.breakfast.map(i => i.name).join(', ') + "\n";
    if (currentMenuData.lunch.length) text += "Trưa: " + currentMenuData.lunch.map(i => i.name).join(', ') + "\n";
    if (currentMenuData.dinner.length) text += "Tối: " + currentMenuData.dinner.map(i => i.name).join(', ') + "\n";
    
    let snacks = [];
    if (currentMenuData.snack1.length) snacks.push(...currentMenuData.snack1.map(i => i.name));
    if (currentMenuData.snack2.length) snacks.push(...currentMenuData.snack2.map(i => i.name));
    if (currentMenuData.snack3.length) snacks.push(...currentMenuData.snack3.map(i => i.name));
    
    if (snacks.length) text += "Phụ: " + snacks.join(', ');
    
    return text || "Theo thực đơn mẫu chi tiết đính kèm.";
}

function collectFullModulesSnapshot_() {
    const fields = {};
    document.querySelectorAll('#mod1 input, #mod1 select, #mod1 textarea, #mod2 input, #mod2 select, #mod2 textarea, #mod3 input, #mod3 select, #mod3 textarea, #mod4 input, #mod4 select, #mod4 textarea, #mod5 input, #mod5 select, #mod5 textarea')
        .forEach((el) => {
            const key = el.id || el.name;
            if (!key) return;
            if (el.type === 'checkbox' || el.type === 'radio') {
                fields[key] = el.checked;
            } else {
                fields[key] = el.value;
            }
        });

    const checkedGroups = {};
    document.querySelectorAll('#mod1 input[type="checkbox"]:checked, #mod2 input[type="checkbox"]:checked, #mod3 input[type="checkbox"]:checked, #mod4 input[type="checkbox"]:checked, #mod5 input[type="checkbox"]:checked')
        .forEach((el) => {
            const g = el.name || 'ungrouped';
            if (!checkedGroups[g]) checkedGroups[g] = [];
            checkedGroups[g].push(el.value || el.id || 'checked');
        });

    const computedIndicators = {};
    const computedIds = [
      'hienThiTuoi', 'm2_bmi', 'm2_bmi_class', 'm2_bmi_class_nl', 'm2_bmi_class_te', 'm2_bmi_z_who',
      'm2_whr', 'm2_whr_class', 'm2_whtr', 'm2_whtr_class',
      'm2_calf_class', 'm2_muac_class',
      'm2_grip_class', 'm2_sarcopenia_summary', 'ped_2460_summary', 'ped_5to19_summary',
      'must_total', 'must_risk', 'micro_suggestion_result',
      'final_kcal', 'macro_p_g', 'macro_l_g', 'macro_g_g',
      'final_water_ml', 'final_fiber_g', 'kitchen_note',
      'life_move_daily', 'life_sport_plan', 'life_rest_plan', 'life_note_plan'
    ];
    computedIds.forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      const val = (el.value != null && el.value !== '') ? el.value : (el.innerText || el.textContent || '');
      computedIndicators[id] = String(val || '').trim();
    });

    return {
        savedAt: new Date().toISOString(),
        currentUser: CURRENT_USER || null,
        selectedDiagnosisList: selectedDiagnosisList || [],
        menuData: currentMenuData || {},
        printMode: currentPrintMode || 'RECORD',
        fields: fields,
        checkedGroups: checkedGroups,
        computedIndicators: computedIndicators
    };
}

                </div>
                <div class="small text-muted text-break">URL: <code>${res.viewUrl}</code></div>

            `;

    }).exportPrintAreaAsPdf(JSON.stringify(payload));
}

function renderHistoryTable(history) {
    const panel = document.getElementById('history_panel');
    const tbody = document.getElementById('history_table_body');
    const msg = document.getElementById('search_msg');
    
    tbody.innerHTML = "";
    
    if (!history || history.length === 0) {
        msg.innerHTML = "<span class='text-danger'>Không tìm thấy hồ sơ cũ.</span>";
        panel.classList.add('d-none');
    } else {
        msg.innerHTML = "";
        panel.classList.remove('d-none');
        
        const currentWeight = parseFloat(document.getElementById('m2_canNang').value) || 0;
        
        history.forEach((visit, index) => {
            let trend = "";
            if (index === 0 && currentWeight > 0) {
                const diff = currentWeight - visit.weight;
                if (diff > 0) trend = `<i class="fas fa-arrow-up text-danger ms-1" title="Tăng ${diff.toFixed(1)}kg"></i>`;
                else if (diff < 0) trend = `<i class="fas fa-arrow-down text-warning ms-1" title="Giảm ${Math.abs(diff).toFixed(1)}kg"></i>`;
                else trend = `<i class="fas fa-minus text-secondary ms-1"></i>`;
            }

            const row = `
            <tr>
                <td>${visit.date}</td>
                <td>${visit.patientId || ''}</td>
                <td>${visit.name || ''}</td>
                <td class="fw-bold">${visit.weight} ${trend}</td>
                <td>${visit.bmi}</td>
                <td>${visit.diet || ''}</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary" onclick="loadOldRecordToForm(decodeURIComponent('${encodeURIComponent(visit.fullSnapshotJson || '')}'))">
                    Nạp lại
                  </button>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
}

    if (typeof calcAnthropometryV3 === 'function') calcAnthropometryV3();
    if (typeof calcNRS2002 === 'function') calcNRS2002();

let listReferences = [];
let currentRefContext = ""; // Nội dung tài liệu đang chọn để gửi cho AI

function normalizeReferenceItem_(item) {
    const i = item || {};
    return {
        RefID: i.RefID || i.refid || i.refId || i.ID || '',
        Category: i.Category || i.category || 'Chưa phân loại',
        Title: i.Title || i.title || '(Không tiêu đề)',
        Type: String(i.Type || i.type || 'TEXT').toUpperCase(),
        Content: i.Content || i.content || '',
        Tags: i.Tags || i.tags || '',
        AddedBy: i.AddedBy || i.addedBy || i.User || i.user || 'Unknown',
        Timestamp: i.Timestamp || i.timestamp || new Date()
    };
}

function loadReferences() {
    const tableBody = document.getElementById('refTableBody');
    const debugEl = document.getElementById('refDebugInfo');
    if (!tableBody) return;
    tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted"><i class="fas fa-spinner fa-spin"></i> Đang tải kho dữ liệu...</td></tr>';
    if (debugEl) debugEl.innerText = 'Đang tải...';

    gasRun('tải danh sách tài liệu', tableBody).withSuccessHandler(data => {
        listReferences = Array.isArray(data) ? data.filter(Boolean).map(normalizeReferenceItem_) : [];
        if (debugEl) debugEl.innerText = `Tổng: ${listReferences.length}`;
        renderRefList();
        updateCategoryDropdown();
    }).getReferenceList();
}

function updateCategoryDropdown() {
    const refs = Array.isArray(listReferences) ? listReferences : [];
    const cats = [...new Set(refs.map(i => i?.Category))].filter(Boolean);
    const select = document.getElementById('refFilterCat');
    if (!select) return;
    const oldVal = select.value || 'ALL';
    // Giữ option đầu tiên (ALL), xóa các option sau
    while (select.options.length > 1) { select.remove(1); }
    
    cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.innerText = c;
        select.appendChild(opt);
    });
    const allValues = Array.from(select.options).map(o => o.value);
    select.value = allValues.includes(oldVal) ? oldVal : 'ALL';
}

function renderRefList() {
    const tableBody = document.getElementById('refTableBody');
    const debugEl = document.getElementById('refDebugInfo');
    if (!tableBody) return;
    const refs = Array.isArray(listReferences) ? listReferences : [];
    const filterCat = document.getElementById('refFilterCat')?.value || 'ALL';
    const search = (document.getElementById('refSearch')?.value || '').trim().toLowerCase();
    
    const filtered = refs.filter(item => {
        const cat = String(item.Category || '').trim().toLowerCase();
        const catFilter = String(filterCat || 'ALL').trim().toLowerCase();
        const matchCat = catFilter === 'all' || cat === catFilter;
        const title = String(item.Title || '').toLowerCase();
        const tags = String(item.Tags || '').toLowerCase();
        const content = String(item.Content || '').toLowerCase();
        const matchSearch = title.includes(search) || tags.includes(search) || content.includes(search);
        return matchCat && matchSearch;
    });

    // Nếu đang lọc danh mục làm rỗng kết quả dù có dữ liệu, tự trả về ALL để không mất hiển thị.
    if (filtered.length === 0 && refs.length > 0 && filterCat !== 'ALL') {
        const select = document.getElementById('refFilterCat');
        if (select) select.value = 'ALL';
        return renderRefList();
    }

    if(filtered.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Không có tài liệu phù hợp bộ lọc.</td></tr>';
        if (debugEl) debugEl.innerText = `Tổng: ${refs.length} | Hiển thị: 0`;
        return;
    }

    if (debugEl) debugEl.innerText = `Tổng: ${refs.length} | Hiển thị: ${filtered.length}`;

    tableBody.innerHTML = filtered.map((item) => {
        const ts = item.Timestamp ? new Date(item.Timestamp).toLocaleString('vi-VN') : '';
        const isLink = item.Type === 'LINK';
        const shortContent = String(item.Content || '');
        const linkCell = isLink
            ? `<a href="${shortContent}" target="_blank" rel="noopener">Mở link</a>`
            : `${shortContent.slice(0, 60)}${shortContent.length > 60 ? '...' : ''}`;
        return `<tr>
            <td>${item.Category || ''}</td>
            <td class="fw-bold">${item.Title || ''}</td>
            <td>${item.Type || ''}</td>
            <td>${linkCell}</td>
            <td>${item.AddedBy || ''}</td>
            <td>${ts}</td>
            <td>
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-primary" onclick="previewRef('${item.RefID}')">Xem</button>
                <button class="btn btn-outline-secondary" onclick="useInAI('${item.RefID}')">AI</button>
                <button class="btn btn-outline-danger" onclick="deleteRef('${item.RefID}')">Xóa</button>
              </div>
            </td>
        </tr>`;
    }).join('');
}

/**
 * Mở/đóng widget trợ lý AI nổi (em bé 3D ở góc phải).
 * @param {boolean} [forceOpen] true: bắt buộc mở, false: bắt buộc đóng, undefined: toggle
 */
function toggleFloatingChat(forceOpen) {
    const panel = document.getElementById('floatingChatPanel');
    const fab   = document.getElementById('babyFab');
    if (!panel) return;
    const isOpen = panel.classList.contains('is-open');
    const willOpen = (typeof forceOpen === 'boolean') ? forceOpen : !isOpen;

    if (willOpen && !isOpen) {
        panel.classList.remove('is-closing');
        panel.classList.add('is-open');
        panel.setAttribute('aria-hidden', 'false');
        if (fab) fab.setAttribute('aria-label', 'Đóng trợ lý AI');
        const cu = document.getElementById('chatUser');
        if (cu && (!cu.innerText || cu.innerText.trim() === '')) {
            cu.innerText = (typeof CURRENT_USER !== 'undefined' && CURRENT_USER) ? CURRENT_USER.name : 'Đồng nghiệp';
        }
        setTimeout(() => {
            const inp = document.getElementById('aiInput');
            if (inp) inp.focus();
            const area = document.getElementById('chatArea');
            if (area) area.scrollTop = area.scrollHeight;
        }, 220);
    } else if (!willOpen && isOpen) {
        panel.classList.add('is-closing');
        setTimeout(() => {
            panel.classList.remove('is-open', 'is-closing');
            panel.setAttribute('aria-hidden', 'true');
        }, 200);
        if (fab) fab.setAttribute('aria-label', 'Mở trợ lý AI');
    }
}

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
        const panel = document.getElementById('floatingChatPanel');
        if (panel && panel.classList.contains('is-open')) toggleFloatingChat(false);
    }
});

function sendToAI() {
    const input = document.getElementById('aiInput');
    const text = input.value.trim();
    if(!text) return;

    // Add User Message
    appendChat(text, 'user');
    input.value = '';
    
    // Add Loading
    const loadingId = 'ai-load-' + new Date().getTime();
    const chatArea = document.getElementById('chatArea');
    chatArea.innerHTML += `<div class="chat-message ai-message" id="${loadingId}"><i class="fas fa-circle-notch fa-spin"></i> Đang suy nghĩ...</div>`;
    chatArea.scrollTop = chatArea.scrollHeight;

    // Call Backend
    google.script.run
      .withSuccessHandler(response => {
        const loadingNode = document.getElementById(loadingId);
        if (loadingNode) loadingNode.remove();
        const safeText = response || "AI chưa phản hồi nội dung. Vui lòng thử lại.";
        appendChat(formatAIMarkdown(String(safeText)), 'ai');
      })
      .withFailureHandler(err => {
        const loadingNode = document.getElementById(loadingId);
        if (loadingNode) loadingNode.remove();
        appendChat(`⚠️ Lỗi gọi AI: ${getServerErrorMessage(err)}`, 'ai');
      })
      .callGeminiAI(text, currentRefContext);
}

function appendChat(msg, sender) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `chat-message ${sender}-message`;
    div.innerHTML = msg; // Allow HTML for formatting
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

function clearChat() {
    const chatArea = document.getElementById('chatArea');
    if (chatArea) {

let THU_VIEN_EMBED_URL = '';
/** URL host thư viện (index.html ~31MB — cần GitHub Pages; jsDelivr giới hạn 20MB/file). */
const THU_VIEN_DEFAULT_URLS = [
  'https://htthinh28.github.io/dinh_duong_lam_sang/'
];
const THU_VIEN_LOAD_TIMEOUT_MS = 90000;
const THU_VIEN_PROBE_TIMEOUT_MS = 12000;

function mergeThuVienUrlList(serverUrls) {
  const out = [];
  (Array.isArray(serverUrls) ? serverUrls : []).concat(THU_VIEN_DEFAULT_URLS).forEach((u) => {
    const url = String(u || '').trim();
    if (url && out.indexOf(url) < 0) out.push(url);
  });
  return out;
}

function fetchThuVienUrlsFromServer() {
  return new Promise((resolve) => {
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      resolve(THU_VIEN_DEFAULT_URLS);
      return;
    }
    google.script.run
      .withSuccessHandler((urls) => resolve(mergeThuVienUrlList(urls)))
      .withFailureHandler(() => resolve(THU_VIEN_DEFAULT_URLS))
      .getThuVienEmbedUrls();
  });
}

async function probeThuVienUrl(url) {
  const ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
  const timer = ctrl ? setTimeout(() => ctrl.abort(), THU_VIEN_PROBE_TIMEOUT_MS) : null;
  try {
    const res = await fetch(url, { method: 'HEAD', cache: 'no-store', signal: ctrl ? ctrl.signal : undefined });
    if (!res.ok) return false;
    const ct = (res.headers.get('content-type') || '').toLowerCase();
    return !ct || ct.indexOf('text/html') >= 0;
  } catch (e) {
    return false;
  } finally {
    if (timer) clearTimeout(timer);
  }
}

async function filterReachableThuVienUrls(urls) {
  const reachable = [];
  for (let i = 0; i < urls.length; i++) {
    if (await probeThuVienUrl(urls[i])) reachable.push(urls[i]);
  }
  return reachable;
}

function loadThuVienFrame(forceReload) {
  const pack = document.getElementById('section-thu-vien-pack');
  const frame = document.getElementById('thuVienFrame');
  const loading = document.getElementById('thuVienFrameLoading');
  if (!pack) {
    alert('Module Thư viện chưa được triển khai trên phiên bản web này. Vui lòng cập nhật triển khai Apps Script (phiên bản mới).');
    return;
  }
  if (!frame) return;

  const showLoadError = (tried) => {
    if (!loading) return;
    loading.classList.remove('d-none');
    loading.innerHTML =
      '<i class="fas fa-triangle-exclamation fa-2x mb-3 d-block text-danger"></i>' +
      '<p class="mb-2 fw-semibold">Không tải được thư viện từ máy chủ.</p>' +
      '<p class="small text-muted mb-2">Nguyên nhân thường gặp: <strong>GitHub Pages chưa bật</strong> hoặc workflow deploy chưa chạy thành công. File thư viện ~31MB nên không dùng được jsDelivr (giới hạn 20MB).</p>' +
      '<p class="small text-muted mb-2">Cách khắc phục: GitHub → Settings → Pages → Source: <strong>GitHub Actions</strong>, rồi chạy workflow <code>Deploy Thu vien to GitHub Pages</code>. Hoặc đặt URL host khác trong Sheet <code>SYS_CONFIG</code> → <code>THU_VIEN_URL</code>.</p>' +
      '<p class="small text-muted mb-3">Đã thử: ' + (tried || []).map((u) => '<code class="d-block text-break">' + u + '</code>').join('') + '</p>' +
      '<button type="button" class="btn btn-sm btn-primary me-2" onclick="reloadThuVienFrame(true)"><i class="fas fa-rotate-right"></i> Thử lại</button>' +
      '<button type="button" class="btn btn-sm btn-outline-primary" onclick="openThuVienInNewTab()"><i class="fas fa-up-right-from-square"></i> Mở tab mới</button>';
    frame.classList.add('d-none');
  };

  const tryUrlAt = (urls, index, bust) => {
    if (!urls || index >= urls.length) {
      showLoadError(urls);
      return;
    }
    const url = urls[index];
    let settled = false;
    if (loading) {
      loading.classList.remove('d-none');
      loading.innerHTML =
        '<i class="fas fa-spinner fa-spin fa-2x mb-3 d-block text-primary"></i>' +
        'Đang tải thư viện (' + (index + 1) + '/' + urls.length + ')...';
    }
    frame.classList.add('d-none');
    const timer = setTimeout(() => {
      if (settled) return;
      settled = true;
      frame.onload = null;
      tryUrlAt(urls, index + 1, bust);
    }, THU_VIEN_LOAD_TIMEOUT_MS);

    frame.onload = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      THU_VIEN_EMBED_URL = url;
      frame.dataset.loaded = '1';
      frame.classList.remove('d-none');
      loading?.classList.add('d-none');
    };
    frame.onerror = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      tryUrlAt(urls, index + 1, bust);
    };
    frame.src = url + bust;
  };

  const start = (urls) => {
    const list = (Array.isArray(urls) ? urls : [urls]).filter(Boolean);
    if (!list.length) {
      showLoadError([]);
      return;
    }
    if (forceReload) frame.removeAttribute('data-loaded');
    if (frame.dataset.loaded === '1' && THU_VIEN_EMBED_URL && !forceReload) {
      frame.classList.remove('d-none');
      loading?.classList.add('d-none');
      return;
    }
    const bust = forceReload ? ((list[0].indexOf('?') >= 0 ? '&' : '?') + 't=' + Date.now()) : '';
    tryUrlAt(list, 0, bust);
  };

  if (THU_VIEN_EMBED_URL && !forceReload) {
    start([THU_VIEN_EMBED_URL]);
    return;
  }

  if (loading) {
    loading.classList.remove('d-none');
    loading.innerHTML =
      '<i class="fas fa-spinner fa-spin fa-2x mb-3 d-block text-primary"></i>' +
      'Đang kiểm tra máy chủ thư viện...';
  }

  fetchThuVienUrlsFromServer().then(async (urls) => {
    const reachable = await filterReachableThuVienUrls(urls);
    if (reachable.length) {
      start(reachable);
      return;
    }
    // Vẫn thử iframe nếu HEAD bị chặn CORS nhưng trang vẫn tải được.
    start(urls);
  });
}

function forceClinicalWorkflowPane(index) {
  document.body.setAttribute('data-clinical-step', String(index + 1));
  const viewport = document.getElementById('clinicalModuleViewport');
  const store = document.getElementById('v-pills-tabContent');

  TOOL_TAB_IDS.forEach((id) => {
    const tab = document.getElementById(id);
    const target = tab?.getAttribute('data-bs-target');
    const pane = target ? document.querySelector(target) : null;
    tab?.classList.remove('active');
    tab?.setAttribute('aria-selected', 'false');
    setPaneState(pane, false);
  });

  WORKFLOW_TAB_IDS.forEach((id, i) => {
    const tab = document.getElementById(id);
    const target = tab?.getAttribute('data-bs-target');
    const pane = target ? document.querySelector(target) : null;
    const active = i === index;
    tab?.classList.toggle('active', active);
    tab?.setAttribute('aria-selected', active ? 'true' : 'false');
    if (pane) {
      if (active && viewport && pane.parentElement !== viewport) {
        viewport.appendChild(pane);
      } else if (!active && store && pane.parentElement !== store) {
        store.appendChild(pane);
      }
      setPaneState(pane, active);
    }
  });
}

function setPaneState(pane, active) {
  if (!pane) return;
  pane.classList.toggle('active', active);
  pane.classList.toggle('show', active);
  pane.style.setProperty('display', active ? 'block' : 'none', 'important');
  pane.style.setProperty('opacity', active ? '1' : '0', 'important');
  pane.style.setProperty('visibility', active ? 'visible' : 'hidden', 'important');
  pane.style.setProperty('height', active ? 'auto' : '0', 'important');
  pane.style.setProperty('overflow', active ? 'visible' : 'hidden', 'important');
  pane.setAttribute('aria-hidden', active ? 'false' : 'true');
}

  WORKFLOW_TAB_IDS.forEach((id) => {
    const tab = document.getElementById(id);
    tab?.addEventListener('click', () => {
      const idx = WORKFLOW_TAB_IDS.indexOf(id);
      if (idx >= 0) setTimeout(() => forceClinicalWorkflowPane(idx), 0);
    });
    tab?.addEventListener('shown.bs.tab', () => {
      const idx = WORKFLOW_TAB_IDS.indexOf(id);
      if (idx >= 0) forceClinicalWorkflowPane(idx);
      updateClinicalWorkflowChrome();
    });
  });

  TOOL_TAB_IDS.forEach((id) => {
    const tab = document.getElementById(id);
    tab?.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();
      const moduleNumber = parseInt(id.replace('tab', ''), 10);
      if (!Number.isNaN(moduleNumber)) showAppModule(moduleNumber);
    });
  });
  updateClinicalWorkflowChrome();
}

// ============================================
// 14. MODULE 7 - QUAN TRI NGUOI DUNG
// ============================================
function quanTriInitModule() {
  if (!CURRENT_USER || String(CURRENT_USER.role || '').toUpperCase() !== 'ADMIN') {
    const body = document.getElementById('qtUserTableBody');
    if (body) body.innerHTML = '<tr><td colspan="9" class="text-danger text-center">Chỉ tài khoản ADMIN mới được truy cập module quản trị.</td></tr>';
    const pm = document.getElementById('permMatrixContainer');
    if (pm) pm.innerHTML = '<div class="text-danger text-center py-4">Chỉ ADMIN mới được xem/sửa ma trận phân quyền.</div>';
    return;
  }
  quanTriLoadUsers();
  quanTriLoadPermMatrix();
}

// ============================================================================
// 14B. MA TRẬN PHÂN QUYỀN (Role × Module × Action)
// ============================================================================
let PERM_MATRIX_DATA = null;   // { groups, modules, actions, matrix }
const PERM_ACTION_KEYS = ['view', 'edit', 'delete', 'export'];
const PERM_ACTION_LABELS = ['Xem', 'Sửa', 'Xóa', 'Xuất'];
const PERM_ACTION_ICONS = ['fa-eye', 'fa-pen', 'fa-trash', 'fa-file-export'];

function quanTriLoadPermMatrix() {
  const host = document.getElementById('permMatrixContainer');
  if (!host) return;
  host.innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-circle-notch fa-spin"></i> Đang tải ma trận phân quyền...</div>';
  gasRun('tải ma trận phân quyền', host).withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) {
      host.innerHTML = `<div class="text-danger text-center py-4">${res.error}</div>`;
      return;
    }
    PERM_MATRIX_DATA = res;
    renderPermMatrix_();
  }).quanTriLayMaTranPhanQuyen();
}

function renderPermMatrix_() {
  const host = document.getElementById('permMatrixContainer');
  if (!host || !PERM_MATRIX_DATA) return;
  const { groups, modules, matrix } = PERM_MATRIX_DATA;

  let head = `
    <tr>
      <th rowspan="2" class="perm-role-cell">Vai trò</th>
      ${modules.map(m => `<th colspan="4" class="perm-mod-th">Mod ${m.id}<small>${escapeHtml_(m.label)}</small></th>`).join('')}
      <th rowspan="2" style="min-width:120px;">Toàn quyền</th>
    </tr>
    <tr>
      ${modules.map(() => PERM_ACTION_LABELS.map((label, idx) =>
        `<th class="perm-action-th" title="${label}"><i class="fas ${PERM_ACTION_ICONS[idx]}"></i></th>`
      ).join('')).join('')}
    </tr>
  `;

  let body = '';
  groups.forEach(group => {
    body += `<tr class="perm-group-row"><td colspan="${1 + modules.length * 4 + 1}"><i class="fas ${group.icon} me-2"></i>${escapeHtml_(group.label)}</td></tr>`;
    group.roles.forEach(role => {
      const rowMatrix = (matrix[role.id]) || {};
      const cells = modules.map(mod => {
        const arr = rowMatrix[mod.id] || [0, 0, 0, 0];
        return PERM_ACTION_KEYS.map((act, idx) => {
          const checked = arr[idx] ? 'checked' : '';
          return `<td class="perm-action-cell">
            <input type="checkbox" data-perm-role="${role.id}" data-perm-mod="${mod.id}" data-perm-action="${idx}" ${checked} onchange="onPermCellChange_(this)">
          </td>`;
        }).join('');
      }).join('');
      const allChecked = modules.every(mod => {
        const arr = rowMatrix[mod.id] || [0, 0, 0, 0];
        return arr.every(v => v === 1);
      }) ? 'checked' : '';
      body += `
        <tr>
          <td class="perm-role-cell">
            <span class="perm-role-id">${role.id}</span>${escapeHtml_(role.label)}
            <small>${role.id === 'USER' ? 'Khách hàng/bệnh nhân truy cập hồ sơ cá nhân' : 'Nhân viên y tế nội bộ'}</small>
            <div class="perm-quick-actions">
              <button class="btn btn-outline-success" type="button" onclick="permRoleSetAll_('${role.id}', true)" title="Cấp toàn quyền"><i class="fas fa-check"></i> Tất cả</button>
              <button class="btn btn-outline-secondary" type="button" onclick="permRoleSetAll_('${role.id}', false)" title="Bỏ toàn bộ"><i class="fas fa-xmark"></i> Bỏ</button>
              <button class="btn btn-outline-primary" type="button" onclick="permRoleSetView_('${role.id}')" title="Chỉ xem"><i class="fas fa-eye"></i> Chỉ xem</button>
            </div>
          </td>
          ${cells}
          <td class="perm-action-cell perm-action-cell--all">
            <input type="checkbox" data-perm-role="${role.id}" data-perm-action="ALL" ${allChecked} onchange="permRoleSetAll_('${role.id}', this.checked)" title="Bật/tắt toàn quyền">
          </td>
        </tr>
      `;
    });
  });

  host.innerHTML = `
    <div class="perm-matrix-legend">
      <span><strong>Hướng dẫn:</strong> tích chọn các quyền cho từng <em>vai trò × module × hành động</em>.</span>
      <span><strong>Xem</strong>: được mở module/đọc dữ liệu.</span>
      <span><strong>Sửa</strong>: thêm/cập nhật bản ghi.</span>
      <span><strong>Xóa</strong>: xóa bản ghi.</span>
      <span><strong>Xuất</strong>: in/PDF/QR/chia sẻ.</span>
    </div>
    <div class="perm-matrix-wrap">
      <table class="perm-matrix-table">
        <thead>${head}</thead>
        <tbody>${body}</tbody>
      </table>
    </div>
  `;
}

function onPermCellChange_(el) {
  if (!PERM_MATRIX_DATA) return;
  const role = el.getAttribute('data-perm-role');
  const mod  = parseInt(el.getAttribute('data-perm-mod'), 10);
  const act  = parseInt(el.getAttribute('data-perm-action'), 10);
  if (!PERM_MATRIX_DATA.matrix[role]) PERM_MATRIX_DATA.matrix[role] = {};
  if (!PERM_MATRIX_DATA.matrix[role][mod]) PERM_MATRIX_DATA.matrix[role][mod] = [0, 0, 0, 0];
  PERM_MATRIX_DATA.matrix[role][mod][act] = el.checked ? 1 : 0;
  permRefreshAllToggle_(role);
}

function permRoleSetAll_(role, value) {
  if (!PERM_MATRIX_DATA) return;
  const v = value ? 1 : 0;
  PERM_MATRIX_DATA.modules.forEach(mod => {
    PERM_MATRIX_DATA.matrix[role] = PERM_MATRIX_DATA.matrix[role] || {};
    PERM_MATRIX_DATA.matrix[role][mod.id] = [v, v, v, v];
  });
  document.querySelectorAll(`#permMatrixContainer input[data-perm-role="${role}"]`).forEach(cb => {
    if (cb.getAttribute('data-perm-action') === 'ALL') cb.checked = !!value;
    else cb.checked = !!value;
  });
}

function permRoleSetView_(role) {
  if (!PERM_MATRIX_DATA) return;
  PERM_MATRIX_DATA.modules.forEach(mod => {
    PERM_MATRIX_DATA.matrix[role] = PERM_MATRIX_DATA.matrix[role] || {};
    PERM_MATRIX_DATA.matrix[role][mod.id] = [1, 0, 0, 0];
  });
  document.querySelectorAll(`#permMatrixContainer input[data-perm-role="${role}"]`).forEach(cb => {
    const act = cb.getAttribute('data-perm-action');
    if (act === 'ALL') cb.checked = false;
    else cb.checked = (parseInt(act, 10) === 0);
  });
}

function permRefreshAllToggle_(role) {
  const all = (PERM_MATRIX_DATA.modules || []).every(mod => {
    const arr = (PERM_MATRIX_DATA.matrix[role] && PERM_MATRIX_DATA.matrix[role][mod.id]) || [0, 0, 0, 0];
    return arr.every(v => v === 1);
  });
  const cb = document.querySelector(`#permMatrixContainer input[data-perm-role="${role}"][data-perm-action="ALL"]`);
  if (cb) cb.checked = all;
}

function quanTriSavePermMatrix() {
  if (!PERM_MATRIX_DATA) return alert('Chưa có ma trận để lưu.');
  if (!confirm('Xác nhận lưu ma trận phân quyền? Quyền mới sẽ áp dụng từ lần đăng nhập kế tiếp.')) return;
  const host = document.getElementById('permMatrixContainer');
  gasRun('lưu ma trận phân quyền', host).withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    alert(res.message || 'Đã lưu ma trận phân quyền.');
  }).quanTriLuuMaTranPhanQuyen(PERM_MATRIX_DATA.matrix, CURRENT_USER ? CURRENT_USER.email : '');
}

function quanTriResetPermMatrix() {
  if (!confirm('Khôi phục ma trận về cấu hình mặc định? Mọi tùy chỉnh hiện tại sẽ bị thay thế.')) return;
  const host = document.getElementById('permMatrixContainer');
  host.innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-circle-notch fa-spin"></i> Đang khôi phục mặc định...</div>';
  gasRun('reset ma trận phân quyền', host).withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) {
      host.innerHTML = `<div class="text-danger text-center py-4">${res.error}</div>`;
      return;
    }
    if (PERM_MATRIX_DATA && res.matrix) PERM_MATRIX_DATA.matrix = res.matrix;
    renderPermMatrix_();
    alert(res.message || 'Đã khôi phục mặc định.');
  }).quanTriResetMaTranPhanQuyen(CURRENT_USER ? CURRENT_USER.email : '');
}

function quanTriLoadUsers() {
  const body = document.getElementById('qtUserTableBody');
  if (!body) return;
  body.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Đang tải dữ liệu...</td></tr>';
  gasRun('tải danh sách user quản trị', body).withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) {
      body.innerHTML = `<tr><td colspan="9" class="text-danger text-center">${res.error}</td></tr>`;
      return;
    }
    QUAN_TRI_USERS = Array.isArray(res.data) ? res.data : [];
    if (!QUAN_TRI_USERS.length) {
      body.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Chưa có user.</td></tr>';
      return;
    }
    body.innerHTML = QUAN_TRI_USERS.map(u => {
      const st = String(u.Status || '').toUpperCase();
      const pend = st === 'PENDING_APPROVAL';
      const badgeClass = st === 'ACTIVE' ? 'bg-success' : pend ? 'bg-warning text-dark' : 'bg-secondary';
      return `
      <tr>
        <td>${u.Email || ''}</td>
        <td>${u.FullName || ''}</td>
        <td>${u.JobTitle || ''}</td>
        <td>${u.Phone || ''}</td>
        <td>${u.PracticeCertificate || ''}</td>
        <td>${u.PracticeScope || ''}</td>
        <td>
          <select class="form-select form-select-sm" onchange="quanTriSetRole('${u.Email}', this.value)" ${pend ? 'disabled' : ''}>
            ${['USER','NURSE','DIETITIAN','DOCTOR','MANAGER','ADMIN'].map(r => `<option value="${r}" ${String(u.Role || '').toUpperCase() === r ? 'selected' : ''}>${r}</option>`).join('')}
          </select>
        </td>
        <td><span class="badge ${badgeClass}">${u.Status || ''}</span></td>
        <td>
          <div class="btn-group btn-group-sm flex-wrap">
            ${pend ? `<button class="btn btn-success btn-sm" onclick="quanTriApproveUser('${u.Email}')">Duyệt</button>` : ''}
            <button class="btn btn-outline-primary btn-sm" onclick="quanTriEditUser('${u.Email}')">Sửa</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="quanTriToggleLock('${u.Email}', '${u.Status || ''}')" ${pend ? 'disabled' : ''}>${String(u.Status).toUpperCase() === 'ACTIVE' ? 'Khóa' : 'Mở khóa'}</button>
            <button class="btn btn-outline-danger btn-sm" onclick="quanTriDeleteUser('${u.Email}')">Xóa</button>
          </div>
        </td>
      </tr>
    `;
    }).join('');
  }).quanTriQuanLyUser('LIST', {});
}

function quanTriCreateUser() {
  const payload = {
    fullName: document.getElementById('qtFullName')?.value.trim(),
    jobTitle: document.getElementById('qtJobTitle')?.value.trim(),
    email: document.getElementById('qtEmail')?.value.trim(),
    phone: document.getElementById('qtPhone')?.value.trim(),
    practiceCertificate: document.getElementById('qtPracticeCertificate')?.value.trim(),
    practiceScope: document.getElementById('qtPracticeScope')?.value.trim(),
    password: document.getElementById('qtPassword')?.value.trim(),
    role: document.getElementById('qtRole')?.value || 'USER'
  };

  if (!payload.fullName || !payload.jobTitle || !payload.email || !payload.phone || !payload.practiceCertificate || !payload.practiceScope || !payload.password) {
    alert('Vui lòng nhập đầy đủ thông tin bắt buộc.');
    return;
  }

  gasRun('tạo user mới').withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    alert(res.message || 'Tạo user thành công.');
    ['qtFullName','qtJobTitle','qtEmail','qtPhone','qtPracticeCertificate','qtPracticeScope','qtPassword'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    quanTriLoadUsers();
  }).quanTriTaoUser(payload);
}

function quanTriSetRole(email, role) {
  gasRun('cập nhật phân quyền').withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    quanTriLoadUsers();
  }).quanTriPhanQuyen(email, role);
}

function quanTriEditUser(email) {
  const target = (email || '').trim().toLowerCase();
  const user = QUAN_TRI_USERS.find(u => String(u.Email || '').trim().toLowerCase() === target);
  if (!user) return alert('Không tìm thấy user cần sửa.');

  const fullName = prompt('Họ tên:', user.FullName || '');
  if (fullName === null) return;
  const jobTitle = prompt('Chức danh:', user.JobTitle || '');
  if (jobTitle === null) return;
  const phone = prompt('Số điện thoại:', user.Phone || '');
  if (phone === null) return;
  const practiceCertificate = prompt('Chứng chỉ hành nghề:', user.PracticeCertificate || '');
  if (practiceCertificate === null) return;
  const practiceScope = prompt('Phạm vi hành nghề:', user.PracticeScope || '');
  if (practiceScope === null) return;

  gasRun('cập nhật thông tin user').withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    alert(res.message || 'Cập nhật thành công.');
    quanTriLoadUsers();
  }).quanTriQuanLyUser('UPDATE_PROFILE', {
    email: email,
    fullName: String(fullName || '').trim(),
    jobTitle: String(jobTitle || '').trim(),
    phone: String(phone || '').trim(),
    practiceCertificate: String(practiceCertificate || '').trim(),
    practiceScope: String(practiceScope || '').trim()
  });
}

function quanTriToggleLock(email, currentStatus) {
  const action = String(currentStatus || '').toUpperCase() === 'ACTIVE' ? 'LOCK' : 'UNLOCK';
  gasRun('khóa/mở user').withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    quanTriLoadUsers();
  }).quanTriQuanLyUser(action, { email: email });
}

function quanTriDeleteUser(email) {
  if (!confirm(`Xác nhận xóa user ${email}?`)) return;
  gasRun('xóa user').withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    quanTriLoadUsers();
  }).quanTriQuanLyUser('DELETE', { email: email });
}

function quanTriGenerateResetCode() {
  const email = document.getElementById('qtResetEmail')?.value.trim();
  if (!email) return alert('Vui lòng nhập email cần phục hồi mật khẩu.');
  gasRun('tạo mã phục hồi mật khẩu').withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    document.getElementById('qtResetCode').value = res.resetCode || '';
    alert((res.message || 'Đã tạo mã phục hồi.') + (res.resetCode ? `\nMã: ${res.resetCode}` : ''));
  }).quanTriYeuCauPhucHoiMatKhau(email);
}

function quanTriApplyResetPass() {
  const email = document.getElementById('qtResetEmail')?.value.trim();
  const code = document.getElementById('qtResetCode')?.value.trim();
  const newPass = document.getElementById('qtResetNewPass')?.value.trim();
  if (!email || !code || !newPass) return alert('Vui lòng nhập đủ email, mã phục hồi và mật khẩu mới.');
  gasRun('phục hồi mật khẩu').withSuccessHandler((res) => {
    res = normalizeServerResult(res);
    if (res.error) return alert(res.error);
    alert(res.message || 'Đặt lại mật khẩu thành công.');
    document.getElementById('qtResetCode').value = '';
    document.getElementById('qtResetNewPass').value = '';
    quanTriLoadUsers();
  }).quanTriPhucHoiMatKhau(email, code, newPass);
}
