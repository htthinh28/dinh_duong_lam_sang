function getCdaReferenceRow(codeKey) {
    return CDA_QD2879_REFERENCE[codeKey] || null;
}

function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatCdaReferenceSummary(codeKey) {
    const r = getCdaReferenceRow(codeKey);
    if (!r) return '';
    const parts = [`E ${r.e} kcal`, `P ${r.p} g`, `L ${r.l} g`, `G ${r.g} g`, `Nước ${r.water}`];
    if (r.fiber) parts.push(`Xơ ${r.fiber}`);
    if (r.natri) parts.push(`Na ${r.natri}`);
    if (r.kali) parts.push(`K ${r.kali}`);
    if (r.phosphat) parts.push(`Phốt-phát ${r.phosphat}`);
    if (r.chol) parts.push(`Cholesterol ${r.chol}`);
    return parts.join(' | ');
}

function updateCdaReferencePanel() {
    const el = document.getElementById('cda_reference_panel');
    if (!el) return;
    const code = document.getElementById('diet_code_select')?.value;
    const prep = document.getElementById('diet_prep_select')?.value || 'COM';
    const prepLbl = getDietPrepLabel(prep);
    const r = getCdaReferenceRow(code);
    if (!r) {
        el.innerHTML = '<p class="small text-muted mb-0">Chưa có dòng bảng QĐ 2879 cho mã này.</p>';
        return;
    }
    const extras = ['natri', 'kali', 'phosphat', 'chol'].map(k => r[k] ? `<tr><td class="text-muted">${k === 'natri' ? 'Natri' : k === 'kali' ? 'Kali' : k === 'phosphat' ? 'Phốt-phát' : 'Cholesterol'}</td><td>${r[k]}</td></tr>` : '').join('');
    el.innerHTML = `
        <p class="small text-muted mb-2">Theo <strong>QĐ 2879/QĐ-BYT</strong> — cơ cấu tham chiếu (người lớn ~50–55 kg / mức năng lượng trong bảng). Chữ <strong>X</strong> trong mã = dạng chế biến (cơm, phở, cháo, sữa…); đang chọn: <strong>${prepLbl}</strong> — giữ mục tiêu dinh dưỡng, đổi quy đổi thực phẩm/khối lượng.</p>

function getIycfAgeBand6to23(months) {
    const m = Number(months);
    if (!Number.isFinite(m) || m < 6 || m > 23) return null;
    if (m <= 8) return '6-8';
    if (m <= 11) return '9-11';
    return '12-23';
}

function formatIycfReferenceSummary(months) {
    const band = getIycfAgeBand6to23(months);
    if (!band) return '';
    const r = IYCF_BYT_6_23_REFERENCE;
    const micro = band === '12-23' ? r.micro1223 : r.micro611;
    return [
        `Nhóm tuổi ${band} tháng`,
        `Tổng nhu cầu năng lượng ~${r.totalEnergyKcalRange[band]} kcal/ngày (Trẻ bú mẹ — Bảng 1)`,
        `Năng lượng cần từ thức ăn bổ sung khi lượng sữa mẹ trung bình: ~${r.complementaryKcalBreastMilkAvg[band]} kcal/ngày`,
        `Protein tổng khuyến nghị ${r.proteinTotalDay[band]} g/ngày; protein từ thức ăn bổ sung ~${r.proteinFromComplementaryG[band]} g/ngày`,
        `Lipid khuyến nghị tổng ~${r.lipidTotalG[band]} g/ngày; lipid từ thức ăn bổ sung ~${r.lipidFromComp25pct[band]} hoặc ~${r.lipidFromComp30pct[band]} g/ngày (25% hoặc 30% năng lượng trong thức ăn bổ sung — Bảng 3)`,
        `Nước uống thêm: ${r.waterExtraMl[band]}`,
        micro,
        r.footnoteFeZn
    ].join(' | ');
}

    const wrap = document.getElementById('iycf_reference_panel_wrap');
    const el = document.getElementById('iycf_reference_panel');
    if (!el) return;
    const months = currentPatient.month || 0;
    const ped = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';
    const band = getIycfAgeBand6to23(months);
    if (wrap) {
        if (!ped || months > 23) wrap.classList.add('d-none');
        else wrap.classList.remove('d-none');

            : 'Fe 9,0–8,3 mg; Zn 4,1; Na 600; K 700; Ca 400 mg (6–11 tháng, Bảng 4).';

function getDietPrepLabel(prepKey) {
    return DIET_PREP_DB[prepKey]?.label || DIET_PREP_DB.COM.label;
}

function getDietCodeDisplay(codeKey, prepKey) {
    const prep = prepKey || document.getElementById('diet_prep_select')?.value || 'COM';
    if (!codeKey) return '';
    return String(codeKey).replace(/-X$/i, `-${prep}`);
}

function syncSuggestedDietPrepFromCode(codeKey) {
    const prepEl = document.getElementById('diet_prep_select');
    if (!prepEl) return;
    const t = DIET_CODE_DB[codeKey]?.type;
    if (t === 'LIQUID') prepEl.value = 'SUA';
    else if (t === 'SOFT') prepEl.value = 'CHAO';
    else prepEl.value = 'COM';
}

function applyDietPrepToStarch(dietPrep, starchId) {
    if (starchId === 'S06') return starchId;
    if (dietPrep === 'CHAO') return 'S03';
    if (dietPrep === 'SUP') return 'S04';
    if (dietPrep === 'SUA') return 'S03';
    return starchId;
}

function starchQtyForKcalShare(starchId, kcalShare) {
    const food = VIET_FOOD_DB.find(f => f.id === starchId);
    if (!food || kcalShare <= 0) return '0';
    if (food.unit === 'g' || food.unit === 'ml') return ((kcalShare / food.kcal) * 100).toFixed(0);
    return Math.max(1, +(kcalShare / food.kcal).toFixed(1)) + '';
}

function getServerErrorMessage(error) {
    if (!error) return 'Không rõ lỗi.';
    if (typeof error === 'string') return error;
    return error.message || error.details || JSON.stringify(error);
}

function handleServerFailure(context, renderTarget = null) {
    return function(error) {
        const message = getServerErrorMessage(error);
        console.error(`[Apps Script] ${context}:`, error);
        if (renderTarget) {
            const target = typeof renderTarget === 'string' ? document.querySelector(renderTarget) : renderTarget;
            if (target) target.innerHTML = `<div class="text-danger p-2">Lỗi ${context}: ${message}</div>`;
        } else {
            alert(`Lỗi ${context}: ${message}`);
        }
    };
}

function gasRun(context, renderTarget = null) {
    return google.script.run.withFailureHandler(handleServerFailure(context, renderTarget));
}

function normalizeServerResult(res) {
    if (res && typeof res === 'object') return res;
    return { error: 'Không nhận được phản hồi hợp lệ từ máy chủ.' };
}

function checkLoginSession() {
  const session = sessionStorage.getItem('PC_USER_SESSION');
  if (session) {
    CURRENT_USER = JSON.parse(session);
    document.getElementById('login_overlay')?.classList.add('d-none');
    const cu = document.getElementById('currentUser');
    if (cu) cu.innerHTML = `BS. ${CURRENT_USER.name}`;
    const lbl = document.getElementById('loggedAccountLabel');
    if (lbl) lbl.innerText = `${CURRENT_USER.name} (${CURRENT_USER.email})`;
    
    initApp(); // Load dữ liệu hệ thống sau khi login thành công
  } else {
    document.getElementById('login_overlay')?.classList.remove('d-none');
  }
}

function handleLogin() {
  const email = document.getElementById('txtEmail')?.value;
  const pass = document.getElementById('txtPass')?.value;
  const btn = document.getElementById('btnLogin');
  
  if(!email || !pass) return alert("Vui lòng nhập đủ thông tin!");
  if (!btn) return;

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
  btn.disabled = true;

  google.script.run.withSuccessHandler(res => {
    res = normalizeServerResult(res);
    btn.innerHTML = 'ĐĂNG NHẬP'; btn.disabled = false;
    
    if (res.error) {
       document.getElementById('loginMsg').innerText = res.error;
    } else {
       sessionStorage.setItem('PC_USER_SESSION', JSON.stringify(res.user));
       checkLoginSession();
    }
  }).loginUser(email, pass);
}

function handleLogout() {
  sessionStorage.removeItem('PC_USER_SESSION');
  softResetToLogin_();
}

/**
 * Reset trạng thái app về màn hình đăng nhập mà KHÔNG reload trang.
 * Tránh bị màn trắng trong iframe sandbox của Apps Script web app
 * (do URL /exec có token một lần nên reload iframe hay bị trắng).
 */
function softResetToLogin_() {
  try {
    CURRENT_USER = null;
    if (typeof QUAN_TRI_USERS !== 'undefined') QUAN_TRI_USERS = [];
    if (typeof PERM_MATRIX_DATA !== 'undefined') PERM_MATRIX_DATA = null;
  } catch (e) { /* ignore */ }

  try { if (typeof toggleFloatingChat === 'function') toggleFloatingChat(false); } catch (e) {}

  document.body.classList.remove('clinical-workflow-active');
  document.body.removeAttribute('data-clinical-step');
  document.body.removeAttribute('data-staff-root');
  toggleStaffRegisterPanel(false);

  document.querySelectorAll('.modal.show').forEach(m => {
    try { bootstrap.Modal.getInstance(m)?.hide(); } catch (e) {}
  });

  ['txtEmail', 'txtPass', 'loginMsg', 'regFullName', 'regJobTitle', 'regPhone', 'regEmail', 'regPassword', 'regPracticeCertificate', 'regPracticeScope'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.tagName === 'INPUT') el.value = '';
    else el.innerText = '';
  });
  const regMsg = document.getElementById('registerStaffMsg');
  if (regMsg) regMsg.innerText = '';
  const btnRegisterStaff = document.getElementById('btnRegisterStaff');
  if (btnRegisterStaff) { btnRegisterStaff.disabled = false; btnRegisterStaff.innerHTML = '<i class="fas fa-paper-plane me-1"></i>Gửi đăng ký chờ duyệt'; }
  const btnLogin = document.getElementById('btnLogin');
  if (btnLogin) { btnLogin.disabled = false; btnLogin.innerHTML = 'ĐĂNG NHẬP'; }

  const overlay = document.getElementById('login_overlay');
  if (overlay) overlay.classList.remove('d-none');

  setTimeout(() => document.getElementById('txtEmail')?.focus(), 80);
}

  let open;
  if (typeof forceOpen === 'boolean') open = forceOpen;
  else open = panel.classList.contains('d-none');

  panel.classList.toggle('d-none', !open);
  if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  if (label) label.textContent = open ? 'Thu gọn đăng ký' : 'Đăng ký tài khoản nhân viên';
  if (chevron) {
    chevron.classList.remove('fa-chevron-down', 'fa-chevron-up');
    chevron.classList.add(open ? 'fa-chevron-up' : 'fa-chevron-down');
  }
}

// ============================================
// 3. LOGIC LÂM SÀNG CỐT LÕI (CLINICAL CORE)
// ============================================

// [LMS & Z-SCORE] Hàm nội suy tuyến tính (Được cập nhật an toàn hơn)
function getInterpLMS(gender, type, val) {
    if (!WHO_LMS_DATA[gender] || !WHO_LMS_DATA[gender][type]) return null;
    
    const data = WHO_LMS_DATA[gender][type];
    const keys = Object.keys(data).map(Number).sort((a,b) => a-b);
    
    // Nếu giá trị nằm ngoài khoảng
    if (val <= keys[0]) return { L: data[keys[0]][1], M: data[keys[0]][2], S: data[keys[0]][3] };
    if (val >= keys[keys.length-1]) return { L: data[keys[keys.length-1]][1], M: data[keys[keys.length-1]][2], S: data[keys[keys.length-1]][3] };

    // Tìm khoảng chứa giá trị
    let lower = keys[0], upper = keys[keys.length-1];
    for (let i = 0; i < keys.length - 1; i++) {
        if (val >= keys[i] && val < keys[i+1]) { lower = keys[i]; upper = keys[i+1]; break; }
    }

    // Nội suy
    const ratio = (val - lower) / (upper - lower);
    const p1 = data[lower], p2 = data[upper];
    return { 
        L: p1[1] + (p2[1] - p1[1]) * ratio, 
        M: p1[2] + (p2[2] - p1[2]) * ratio, 
        S: p1[3] + (p2[3] - p1[3]) * ratio 
    };
}

// Tính giá trị Z-Score (Box-Cox)
function calculateZScoreValue(val, L, M, S) {
    if (val <= 0 || !L || !M || !S) return 0;
    if (Math.abs(L) < 0.01) return Math.log(val / M) / S;
    return (Math.pow(val / M, L) - 1) / (L * S);
}

/** Phân loại nhân trắc 3 màu: xanh lá = bình thường/tốt · vàng = nguy cơ thấp · đỏ = nguy cơ cao */
function anthroApplyTier_(inputEl, tier, text) {
    if (!inputEl) return;
    inputEl.value = text || '';
    const base = 'form-control form-control-sm fw-bold border py-1';
    if (tier === 'green') inputEl.className = `${base} border-success bg-success bg-opacity-10 text-success`;
    else if (tier === 'yellow') inputEl.className = `${base} border-warning bg-warning bg-opacity-50 text-dark`;
    else if (tier === 'red') inputEl.className = `${base} border-danger bg-danger bg-opacity-10 text-danger`;
    else inputEl.className = 'form-control form-control-sm bg-light py-1';
}

/** Giữ tương thích snapshot/in: ẩn #m2_bmi_class trùng với NL hoặc TE đang hiển thị */
function syncMirrorBmiClass_() {
    const hid = document.getElementById('m2_bmi_class');
    if (!hid) return;
    const ped = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';
    const src = document.getElementById(ped ? 'm2_bmi_class_te' : 'm2_bmi_class_nl');

}

/**
 * Chuẩn BMI-for-age WHO (0–60 tháng): median M từ median CN/tuổi và CC/tuổi cùng bộ LMS;
 * L,S cố định đại diện phân phối BMI-for-age WHO (xấp xỉ — đủ để Z-score và phân loại).
 */
function getBMIAgeLMS_(gender, monthAge) {
    const m = Math.max(0, Math.min(60, monthAge));
    const lmsWA = getInterpLMS(gender, 'WA', m);
    const lmsHA = getInterpLMS(gender, 'HA', m);
    if (!lmsWA || !lmsHA) return null;
    const M = lmsWA.M / Math.pow(lmsHA.M / 100, 2);
    const L = -0.38;
    const S = 0.088;
    return { L, M, S };
}

/** Phân loại BMI trẻ em theo Z BMI-for-age WHO; 3 màu theo ngưỡng -2 / ±1 / +2 SD */
function applyPediatricBmiForAgeWHO_(bmi, gender) {
    const el = document.getElementById('m2_bmi_class_te');
    const zHidden = document.getElementById('m2_bmi_z_who');
    if (!el) return;

    let month = currentPatient.month;
    if (month === undefined || month === null || month === 0) {
        const ageText = document.getElementById('hienThiTuoi')?.value || '';
        if (ageText.includes('tháng')) month = parseInt(ageText, 10) || 0;
    }
    month = Math.max(0, Math.min(60, month || 0));

    const lms = getBMIAgeLMS_(gender, month);
    if (!lms || !(bmi > 0)) {
        anthroApplyTier_(el, '', '');
        if (zHidden) zHidden.value = '';
        syncMirrorBmiClass_();
        if (typeof updateNutritionWeightGoalBadge_ === 'function') updateNutritionWeightGoalBadge_();
        return;
    }

    const z = calculateZScoreValue(bmi, lms.L, lms.M, lms.S);
    if (zHidden) zHidden.value = Number.isFinite(z) ? z.toFixed(2) : '';

    let tier;
    let msg;
    if (z < -2 || z >= 2) {
        tier = 'red';
        if (z < -2) msg = `BMI-for-age Z=${z.toFixed(2)} SD (WHO): < -2 SD — gầy / suy dinh dưỡng theo BMI`;
        else msg = `BMI-for-age Z=${z.toFixed(2)} SD (WHO): ≥ +2 SD — thừa cân / béo phì`;
    } else if ((z >= -2 && z < -1) || (z > 1 && z < 2)) {
        tier = 'yellow';
        msg = `BMI-for-age Z=${z.toFixed(2)} SD (WHO): nguy cơ thấp (-2…-1 hoặc +1…+2 SD)`;
    } else {
        tier = 'green';
        msg = `BMI-for-age Z=${z.toFixed(2)} SD (WHO): -1 đến +1 SD — bình thường`;
    }

    anthroApplyTier_(el, tier, msg);
    syncMirrorBmiClass_();
    if (typeof updateNutritionWeightGoalBadge_ === 'function') updateNutritionWeightGoalBadge_();
}

// Hiển thị & Phân loại Z-Score (Logic hiển thị giữ nguyên)
function renderZResult(resId, valId, zScore, type) {
    const resEl = document.getElementById(resId);
    const valEl = document.getElementById(valId);
    
    valEl.innerText = (zScore > 0 ? "+" : "") + zScore.toFixed(2) + " SD";
    
    let text = "Bình thường";
    let colorClass = "text-success fw-bold";
    let bgClass = "bg-white";

    if (type === 'WA') { 
        if (zScore < -2) { text = "Nhẹ cân (SDD)"; colorClass = "text-danger fw-bold"; bgClass = "bg-danger bg-opacity-10"; }
        else if (zScore > 2) { text = "Thừa cân"; colorClass = "text-warning fw-bold"; }
    } 
    else if (type === 'HA') { 
        if (zScore < -2) { text = "Thấp còi (SDD)"; colorClass = "text-danger fw-bold"; bgClass = "bg-danger bg-opacity-10"; }
    }
    else if (type === 'WH') { 
        if (zScore < -3) { text = "Gầy còm NẶNG"; colorClass = "text-danger fw-bold text-uppercase"; bgClass = "bg-danger bg-opacity-25"; }
        else if (zScore < -2) { text = "Gầy còm (SDD)"; colorClass = "text-danger fw-bold"; bgClass = "bg-danger bg-opacity-10"; }
        else if (zScore > 2) { text = "Béo phì"; colorClass = "text-danger fw-bold"; }
        else if (zScore > 1) { text = "Nguy cơ thừa cân"; colorClass = "text-warning fw-bold"; }
    }

    resEl.value = text;
    resEl.className = `form-control ${colorClass} ${bgClass}`;
}

// Hàm Tra cứu Z-Score (Kết nối dữ liệu)
function lookupZScoreData() {
    const w = parseFloat(document.getElementById('m2_canNang').value);
    const h = parseFloat(document.getElementById('m2_chieuCao').value);
    let month = currentPatient.month; 
    
    // Fallback nếu biến month chưa có
    if (month === undefined || month === null) {
        const ageText = document.getElementById('hienThiTuoi').value;
        if(ageText && ageText.includes("tháng")) month = parseInt(ageText);
    }

    const genderVal = document.getElementById('gioiTinh').value;
    const gender = (genderVal === 'Nam') ? 'BOY' : 'GIRL';

    if (!w || !h || month === undefined) {
        anthroApplyTier_(document.getElementById('m2_bmi_class_te'), '', '');
        const zH = document.getElementById('m2_bmi_z_who');
        if (zH) zH.value = '';
        syncMirrorBmiClass_();
        return;
    }

    const bmiPed = w / Math.pow(h / 100, 2);
    const bmiEl = document.getElementById('m2_bmi');
    if (bmiEl) bmiEl.value = bmiPed.toFixed(1);

    // Tính toán Z-Score với logic mới
    const lmsWA = getInterpLMS(gender, 'WA', month);
    const zWA = lmsWA ? calculateZScoreValue(w, lmsWA.L, lmsWA.M, lmsWA.S) : 0;

    const lmsHA = getInterpLMS(gender, 'HA', month);
    const zHA = lmsHA ? calculateZScoreValue(h, lmsHA.L, lmsHA.M, lmsHA.S) : 0;

    const lmsWH = getInterpLMS(gender, 'WH', h);
    const zWH = lmsWH ? calculateZScoreValue(w, lmsWH.L, lmsWH.M, lmsWH.S) : 0;

    renderZResult('res_wa', 'val_wa', zWA, 'WA');
    renderZResult('res_ha', 'val_ha', zHA, 'HA');
    renderZResult('res_wh', 'val_wh', zWH, 'WH');
    applyPediatricBmiForAgeWHO_(bmiPed, gender);
    updatePed2460NutritionSummary_(zWA, zHA, zWH);
    if (typeof updateNutritionWeightGoalBadge_ === 'function') updateNutritionWeightGoalBadge_();
}

function classifyHa24to60_(z) {
    if (z < -3) return 'Thấp còi nặng';
    if (z < -2) return 'Thấp còi vừa';
    if (z > 3) return 'Có thể rất cao (xem xét loại trừ rối loạn hormone tăng trưởng)';
    return 'Bình thường';
}
function classifyWa24to60_(z) {
    if (z < -3) return 'Nhẹ cân nặng';
    if (z < -2) return 'Nhẹ cân vừa';
    if (z > 2) return 'Cân nặng cao theo tuổi (đối chiếu CN/CC để kết luận thừa cân-béo phì)';
    return 'Bình thường';
}
function classifyWh24to60_(z) {
    if (z < -3) return 'Gầy còm nặng';
    if (z < -2) return 'Gầy còm vừa';
    if (z > 3) return 'Béo phì';
    if (z > 2) return 'Thừa cân';
    return 'Bình thường';
}
function classifyMuac24to60_(muac) {
    if (!(muac > 0)) return 'Chưa có MUAC';
    if (muac < 115) return 'SDD cấp nặng (<115 mm)';
    if (muac < 125) return 'SDD cấp vừa (115 đến <125 mm)';
    return 'Bình thường (>=125 mm)';
}

function classifyHa5to19_(z) {
    if (!Number.isFinite(z)) return 'Chưa có Z H/A';
    if (z < -3) return 'Thấp còi nặng';
    if (z < -2) return 'Thấp còi vừa';
    if (z > 3) return 'Có thể rất cao (cần loại trừ rối loạn hormone tăng trưởng)';
    return 'Bình thường';
}
function classifyWa5to19_(z, monthAge) {
    if (monthAge >= 120) return 'Không áp dụng W/A cho 10-19 tuổi';
    if (!Number.isFinite(z)) return 'Chưa có Z W/A';
    if (z < -3) return 'Nhẹ cân nặng';
    if (z < -2) return 'Nhẹ cân vừa';
    if (z > 2) return 'Cân nặng cao theo tuổi (đối chiếu BMI/tuổi để kết luận)';
    return 'Bình thường';
}
function classifyBmiAge5to19_(z) {
    if (!Number.isFinite(z)) return 'Chưa có Z BMI/tuổi';
    if (z > 2) return 'Béo phì';
    if (z > 1) return 'Thừa cân';
    if (z < -3) return 'Rất gầy';
    if (z < -2) return 'Gầy';
    return 'Bình thường';
}
function classifyMuac5to19_(muac, monthAge) {
    if (!(muac > 0)) return 'Chưa có MUAC';
    if (monthAge < 120) {
        if (muac < 135) return 'SDD cấp nặng (<135 mm)';
        if (muac < 145) return 'SDD cấp vừa (135 đến <145 mm)';
        return 'Bình thường (>=145 mm)';
    }
    if (muac < 160) return 'SDD cấp nặng (<160 mm)';
    if (muac < 185) return 'SDD cấp vừa (160 đến <185 mm)';
    return 'Bình thường (>=185 mm)';
}

function updatePed5to19NutritionSummary_() {
    const out = document.getElementById('ped_5to19_summary');
    if (!out) return;
    const month = currentPatient.month || 0;
    if (currentPatient.type !== 'PED' || month < 60 || month >= (19 * 12)) {
        out.value = 'Áp dụng cho trẻ từ 5 đến dưới 19 tuổi.';

        const t = document.getElementById(id)?.innerText || '';

    };

function updatePed2460NutritionSummary_(zWA, zHA, zWH) {
    const out = document.getElementById('ped_2460_summary');
    if (!out) return;

    const month = currentPatient.month || 0;
    if (currentPatient.type !== 'PED' || month < 24 || month > 60) {

}

let html5QrcodeScanner = null;
let isScannerOpen = false;
let lastScanAt = 0;

function toDobDisplay(rawDob) {
    const raw = String(rawDob || '').trim();
    if (!raw) return '';
    const digits = raw.replace(/\D/g, '');
    if (digits.length === 8) {
        if (digits.startsWith('19') || digits.startsWith('20')) {
            return `${digits.slice(6, 8)}/${digits.slice(4, 6)}/${digits.slice(0, 4)}`;
        }
        return `${digits.slice(0, 2)}/${digits.slice(2, 4)}/${digits.slice(4, 8)}`;
    }
    const m = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) return `${m[3]}/${m[2]}/${m[1]}`;
    return '';
}

function parseIdentityFromQr(decodedText) {
    const raw = String(decodedText || '').trim();
    if (!raw) return null;

    if (raw.includes('|')) {
        const data = raw.split('|').map(s => String(s || '').trim());
        return {
            id: data[0] || '',
            name: data[2] || '',
            dob: toDobDisplay(data[3] || '')
        };
    }

    if ((raw.startsWith('{') && raw.endsWith('}')) || (raw.startsWith('[') && raw.endsWith(']'))) {
        try {
            const obj = JSON.parse(raw);
            return {
                id: String(obj.id || obj.cccd || obj.patientId || obj.ma || '').trim(),
                name: String(obj.name || obj.fullName || obj.hoTen || '').trim(),
                dob: toDobDisplay(obj.dob || obj.birthDate || obj.ngaySinh || '')
            };
        } catch (e) {
            // ignore JSON parse error
        }
    }

    const idOnly = raw.match(/\b\d{9,12}\b/);
    if (idOnly) return { id: idOnly[0], name: '', dob: '' };

    return null;
}

function closeScanner() {
    const reader = document.getElementById('reader');
    const btn = document.getElementById('btnScanQr');
    if (reader) reader.style.display = 'none';
    if (btn) btn.innerHTML = '<i class="fas fa-qrcode"></i> Quét QR CCCD/BHYT';
    if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(() => {});
        html5QrcodeScanner = null;
    }
    isScannerOpen = false;
}

function onScanSuccess(decodedText) {
    const now = Date.now();
    if (now - lastScanAt < 1500) return;
    lastScanAt = now;

    const parsed = parseIdentityFromQr(decodedText);
    if (!parsed) {
        alert("QR không đúng định dạng CCCD/BHYT.");
        return;
    }

    if (parsed.id) document.getElementById('cccd').value = parsed.id;
    if (parsed.name) document.getElementById('hoTen').value = parsed.name.toUpperCase();
    if (parsed.dob) {
        document.getElementById('ngaySinh').value = parsed.dob;
        calcAgeJCI();
    }
    syncPatientInfo();
    closeScanner();
    alert("Đã nhận diện: " + (parsed.name || parsed.id || "Thành công"));
}

function toggleScanner() {
    const reader = document.getElementById('reader');
    const btn = document.getElementById('btnScanQr');
    if (!reader) return;

    if (isScannerOpen) {
        closeScanner();
        return;
    }
    if (typeof Html5QrcodeScanner === 'undefined') {
        alert("Chưa tải được thư viện quét QR. Vui lòng tải lại trang.");
        return;
    }

    reader.style.display = 'block';
    if (btn) btn.innerHTML = '<i class="fas fa-times"></i> Đóng máy quét';

    html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        {
            fps: 10,
            qrbox: { width: 220, height: 220 },
            rememberLastUsedCamera: true
        },
        false
    );
    html5QrcodeScanner.render(onScanSuccess, () => {});
    isScannerOpen = true;
}

function formatNgaySinhInput(inputEl) {
    if (!inputEl) return;
    const digits = String(inputEl.value || '').replace(/\D/g, '').slice(0, 8);
    let out = digits;
    if (digits.length > 4) out = `${digits.slice(0,2)}/${digits.slice(2,4)}/${digits.slice(4)}`;
    else if (digits.length > 2) out = `${digits.slice(0,2)}/${digits.slice(2)}`;
    inputEl.value = out;
}

function parseDobDdMmYyyy_(dobVal) {
    const m = String(dobVal || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (!m) return null;
    const dd = parseInt(m[1], 10);
    const mm = parseInt(m[2], 10);
    const yyyy = parseInt(m[3], 10);
    const d = new Date(yyyy, mm - 1, dd);
    if (d.getFullYear() !== yyyy || d.getMonth() !== mm - 1 || d.getDate() !== dd) return null;
    return d;
}

function calcAgeJCI() {
    const dobVal = document.getElementById('ngaySinh').value;
    if (!dobVal) return;
    const dob = parseDobDdMmYyyy_(dobVal);
    if (!dob) {
        document.getElementById('hienThiTuoi').value = '';
        return;
    }
    const today = new Date();
    let months = (today.getFullYear() - dob.getFullYear()) * 12;
    months -= dob.getMonth();
    months += today.getMonth();
    
    currentPatient.month = months;

    const display = document.getElementById('hienThiTuoi');
    if (months < 72) {
        display.value = months + " tháng tuổi";
    } else {
        display.value = Math.floor(months / 12) + " tuổi";
    }
    
    syncPatientInfo(); 
    if(document.getElementById('mod2').classList.contains('active')) {
        checkPatientType();
    } else {
        updateIycfReferencePanel();
        updateMicroNutrientsFootnote();
    }
}

function normalizeDrugAllergyItem_(item) {
    const i = item || {};
    return {
        name: String(i.name || '').trim(),
        severity: String(i.severity || '').trim(),
        type: String(i.type || '').trim()
    };
}

function renderDrugAllergyList() {
    const wrap = document.getElementById('drugAllergyList');
    const hidden = document.getElementById('drugAllergyJson');
    if (!wrap || !hidden) return;
    hidden.value = JSON.stringify(currentDrugAllergies || []);
    if (!currentDrugAllergies || currentDrugAllergies.length === 0) {
        wrap.innerHTML = '<span class="text-muted fst-italic">Chưa ghi nhận dị ứng thuốc.</span>';
        return;
    }
    wrap.innerHTML = currentDrugAllergies.map((it, idx) => {
        const name = String(it.name || '');
        const sev = String(it.severity || '').replaceAll('_', ' ');
        const type = String(it.type || '').replaceAll('_', ' ');
        return `<span class="badge bg-light text-dark border me-1 mb-1">${name} | ${sev || '---'} | ${type || '---'} <i class="fas fa-times text-danger ms-1 pointer" onclick="removeDrugAllergyItem(${idx})"></i></span>`;
    }).join('');
}

function addDrugAllergyItem() {
    const nameEl = document.getElementById('drugAllergyName');
    const sevEl = document.getElementById('drugAllergySeverity');
    const typeEl = document.getElementById('drugAllergyType');
    if (!nameEl || !sevEl || !typeEl) return;

    const item = normalizeDrugAllergyItem_({
        name: nameEl.value,
        severity: sevEl.value,
        type: typeEl.value
    });
    if (!item.name) {
        alert('Vui lòng nhập tên thuốc/nhóm thuốc dị ứng.');
        return;
    }
    currentDrugAllergies.push(item);
    nameEl.value = '';
    sevEl.value = '';
    typeEl.value = '';
    renderDrugAllergyList();
    updateAllergyState();
}

function removeDrugAllergyItem(index) {
    if (index < 0 || index >= currentDrugAllergies.length) return;
    currentDrugAllergies.splice(index, 1);
    renderDrugAllergyList();
    updateAllergyState();
}

function getDrugAllergySummaryText() {
    if (!currentDrugAllergies || currentDrugAllergies.length === 0) return '';
    return currentDrugAllergies.map(it => `${it.name}${it.severity ? ` (${it.severity})` : ''}${it.type ? ` - ${it.type}` : ''}`).join('; ');
}

function toggleAllergySection() {

function updateAllergyState() {
    currentAllergies = [];
    document.querySelectorAll('.allergy-cb:checked').forEach(cb => {
        currentAllergies.push(cb.value);
    });
    const other = document.getElementById('allergyOther').value.trim().toUpperCase();

    const stickyAnchor = document.querySelector('#sticky_name');
    const stickyInput = stickyAnchor?.parentElement?.parentElement?.querySelector('input.text-danger');

            alertBadge.innerText = `CÓ DỊ ỨNG: ${[foodPart, drugPart].filter(Boolean).join(' | ')}`;
        }

function isFoodBlockedByAllergy(food) {
    if (!food || !currentAllergies || currentAllergies.length === 0) return false;
    const name = String(food.name || '').toUpperCase();
    const cat = String(food.cat || '').toUpperCase();

    for (const raw of currentAllergies) {
        const a = String(raw || '').toUpperCase().trim();
        if (!a) continue;
        if (a === 'HẢI SẢN' && (name.includes('CÁ') || name.includes('TÔM') || name.includes('CUA') || name.includes('MỰC') || name.includes('HẢI SẢN'))) return true;
        if ((a === 'SỮA BÒ' || a === 'GALACTOSE') && (cat === 'MILK' || name.includes('SỮA') || name.includes('YOGURT'))) return true;
        if (a === 'TRỨNG' && name.includes('TRỨNG')) return true;
        if ((a === 'ĐẬU PHỘNG' || a === 'LẠC') && (name.includes('LẠC') || name.includes('ĐẬU PHỘNG'))) return true;
        // Dị ứng tự do: nếu nhập cụm từ thì chặn theo từ khóa tên món.
        if (!['HẢI SẢN','SỮA BÒ','GALACTOSE','TRỨNG','ĐẬU PHỘNG','LẠC'].includes(a) && name.includes(a)) return true;
    }
    return false;
}

// Bật/tắt khu vực đánh giá theo giới tính & đối tượng để bản đánh giá tinh gọn.
function applyGenderVisibility_() {
    const gender = String(document.getElementById('gioiTinh')?.value || '').trim().toLowerCase();
    const isFemale = gender === 'nu' || gender === 'nữ';
    const isMale = gender === 'nam';
    const isPed = (typeof currentPatient !== 'undefined' && currentPatient)
        ? (currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO')
        : false;

    const showFemale = !isPed && isFemale;
    const showMale = !isPed && isMale;

    document.querySelectorAll('.female-only').forEach(el => {
        el.style.display = showFemale ? '' : 'none';
        if (!showFemale) _resetContainerInputs_(el);
    });
    document.querySelectorAll('.male-only').forEach(el => {
        el.style.display = showMale ? '' : 'none';
        if (!showMale) _resetContainerInputs_(el);
    });

    // Bố cục Bước 6: khi cột Sản phụ khoa ẩn → các cột còn lại nở rộng để tránh khoảng trắng.
    const step6Row = document.getElementById('step6Row');

        const cols = step6Row.querySelectorAll('.step6-col');
        const visibleCols = Array.from(cols).filter(c => c.style.display !== 'none' && !c.classList.contains('d-none'));
        cols.forEach(c => {
            c.classList.remove('col-md-4', 'col-md-6', 'col-md-12');
            if (visibleCols.length === 3) c.classList.add('col-md-4');
            else if (visibleCols.length === 2) c.classList.add('col-md-6');
            else c.classList.add('col-md-12');
        });
    }

    // Tiêu đề BƯỚC 6 đổi theo giới tính: ẩn "& SẢN KHOA" với nam và nhi.
    const step6Title = document.getElementById('step6Title');

    }
}

// Khi ẩn một khu vực, xóa giá trị/checkbox bên trong để không lưu nhầm dữ liệu.
function _resetContainerInputs_(root) {
    if (!root) return;
    root.querySelectorAll('input, select, textarea').forEach(el => {
        if (el.type === 'checkbox' || el.type === 'radio') el.checked = false;
        else if (el.tagName === 'SELECT') el.selectedIndex = 0;
        else if (el.type !== 'hidden') el.value = '';
    });
    // Đồng thời ẩn các "details panel" con đang bung
    root.querySelectorAll('[id$="_details"]').forEach(d => { d.style.display = 'none'; });
}

// Hàm tính toán & phân loại (CẬP NHẬT BMI CHÂU Á & Z-SCORE KẾT HỢP)
function calcAnthropometryV3() {
    const h = parseFloat(document.getElementById('m2_chieuCao').value);
    const w = parseFloat(document.getElementById('m2_canNang').value);

    // 1. NGƯỜI LỚN (Adult) - Chuẩn IDI & WPRO (Châu Á), 3 mức màu
    if (currentPatient.type === 'ADULT') {
        anthroApplyTier_(document.getElementById('m2_bmi_class_te'), '', '');
        const zClear = document.getElementById('m2_bmi_z_who');
        if (zClear) zClear.value = '';
        if (h > 0 && w > 0) {
            const h_m = h / 100;
            const bmiNum = w / (h_m * h_m);
            const bmi = bmiNum.toFixed(1);
            document.getElementById('m2_bmi').value = bmi;

            let tier;
            let pl;
            if (bmiNum < 17.5 || bmiNum >= 25) {
                tier = 'red';
                if (bmiNum < 17.5) pl = 'Gầy / suy dinh dưỡng — nguy cơ cao';
                else if (bmiNum < 30) pl = 'Thừa cân hoặc béo phì — nguy cơ cao';
                else pl = 'Béo phì độ II — nguy cơ cao';
            } else if ((bmiNum >= 23 && bmiNum < 25) || (bmiNum >= 17.5 && bmiNum < 18.5)) {
                tier = 'yellow';
                pl = bmiNum >= 23 ? 'Thừa cân nhẹ (tiền béo phì) — nguy cơ thấp' : 'Cân nặng thấp biên — nguy cơ thấp';
            } else {
                tier = 'green';
                pl = 'Bình thường / tốt (Châu Á 18,5–22,9)';
            }

            anthroApplyTier_(document.getElementById('m2_bmi_class_nl'), tier, pl);
            syncMirrorBmiClass_();

            let mustScore = 0;
            if (bmiNum < 18.5) mustScore = 2;
            else if (bmiNum < 20) mustScore = 1;
            document.getElementById('must_bmi_score').value = mustScore;

            calcMUST();
        } else {
            document.getElementById('m2_bmi').value = '';
            anthroApplyTier_(document.getElementById('m2_bmi_class_nl'), '', '');
            syncMirrorBmiClass_();
        }
    }
    // 2. NHI KHOA — Z-score QĐ 3777 (CN/CC/CN-CC) + BMI-for-age Z WHO ở #m2_bmi_class_te
    else {
        anthroApplyTier_(document.getElementById('m2_bmi_class_nl'), '', '');
        if (h > 0 && w > 0) {
            document.getElementById('m2_bmi').value = (w / Math.pow(h / 100, 2)).toFixed(1);
            const m = currentPatient.month || 0;
            if (m >= 24 && m <= 60) lookupZScoreData();
            if (m >= 60 && m < (19 * 12)) updatePed5to19NutritionSummary_();
        } else {
            document.getElementById('m2_bmi').value = '';
            anthroApplyTier_(document.getElementById('m2_bmi_class_te'), '', '');
            const zClear2 = document.getElementById('m2_bmi_z_who');
            if (zClear2) zClear2.value = '';
            syncMirrorBmiClass_();
            const s519 = document.getElementById('ped_5to19_summary');
            if (s519) s519.value = '';
        }
    }
    calcWHR();
    if (typeof calcPregWeightChange === 'function') calcPregWeightChange();
    if (typeof updateNutritionClassification === 'function') updateNutritionClassification();
    if (typeof updateNutritionWeightGoalBadge_ === 'function') updateNutritionWeightGoalBadge_();
}

/** CC — AWGS case-finding NL; TE có thêm vùng vàng biên. */
function calcCalfAwgsScreening() {
    const el = document.getElementById('m2_calf_cm');
    const out = document.getElementById('m2_calf_class');
    if (!el || !out) return;
    const v = parseFloat(el.value);
    if (!(v > 0)) {
        anthroApplyTier_(out, '', '');
        updatePed2460NutritionSummaryFromUI_();
        return;
    }
    const isMale = String(document.getElementById('gioiTinh')?.value || 'Nam').toLowerCase() === 'nam';
    const ped = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';

    const lowThrMale = 34;
    const lowThrFemale = 33;

    if (ped) {
        const low = isMale ? v < lowThrMale : v < lowThrFemale;
        const good = isMale ? v >= 36 : v >= 35;
        if (low) anthroApplyTier_(out, 'red', 'CC thấp — nguy cơ cao (sàng lọc sarcopenia · TE)');
        else if (!good) anthroApplyTier_(out, 'yellow', 'CC biên — nguy cơ thấp / theo dõi');
        else anthroApplyTier_(out, 'green', 'CC — bình thường / tốt');
        return;
    }

    const low = isMale ? v < lowThrMale : v < lowThrFemale;
    const midBand = isMale ? (v >= lowThrMale && v < 36) : (v >= lowThrFemale && v < 35);
    if (low) anthroApplyTier_(out, 'red', 'CC dưới ngưỡng AWGS — nguy cơ cao (sàng lọc sarcopenia)');
    else if (midBand) anthroApplyTier_(out, 'yellow', 'CC biên AWGS — nguy cơ thấp');
    else anthroApplyTier_(out, 'green', 'CC đạt — bình thường / tốt');
}

/** MUAC — WHO 6–59 tháng (đỏ/vàng/xanh); NL hoặc >5 tuổi: ngưỡng 21 / 23 cm. */
function calcMuacSddScreening() {
    const el = document.getElementById('m2_muac');
    const out = document.getElementById('m2_muac_class');
    if (!el || !out) return;
    const v = parseFloat(el.value);
    if (!(v > 0)) {
        anthroApplyTier_(out, '', '');
        updatePed2460NutritionSummaryFromUI_();
        if (typeof updatePed5to19NutritionSummary_ === 'function') updatePed5to19NutritionSummary_();
        return;
    }

    let monthAge = currentPatient.month || 0;
    if (!monthAge) {
        const ageText = document.getElementById('hienThiTuoi')?.value || '';
        if (ageText.includes('tháng')) monthAge = parseInt(ageText, 10) || 0;
        else monthAge = (parseInt(ageText, 10) || 0) * 12;
    }

    const ped = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';

    if (ped && monthAge >= 6 && monthAge < 60) {
        if (v < 11.5) anthroApplyTier_(out, 'red', 'MUAC thấp — nguy cơ cao (WHO 6–59 tháng)');
        else if (v < 12.5) anthroApplyTier_(out, 'yellow', 'MUAC biên — nguy cơ thấp');
        else anthroApplyTier_(out, 'green', 'MUAC — bình thường / tốt');
        updatePed2460NutritionSummaryFromUI_();
        if (typeof updatePed5to19NutritionSummary_ === 'function') updatePed5to19NutritionSummary_();
        return;
    }

    if (ped && monthAge >= 60 && monthAge < 120) {
        if (v < 13.5) anthroApplyTier_(out, 'red', 'MUAC thấp — SDD cấp nặng (<135 mm, 5-9 tuổi)');
        else if (v < 14.5) anthroApplyTier_(out, 'yellow', 'MUAC biên — SDD cấp vừa (135 đến <145 mm)');
        else anthroApplyTier_(out, 'green', 'MUAC — bình thường (>=145 mm, 5-9 tuổi)');
        updatePed2460NutritionSummaryFromUI_();
        if (typeof updatePed5to19NutritionSummary_ === 'function') updatePed5to19NutritionSummary_();
        return;
    }
    if (ped && monthAge >= 120 && monthAge < (19 * 12)) {
        if (v < 16) anthroApplyTier_(out, 'red', 'MUAC thấp — SDD cấp nặng (<160 mm, 10-19 tuổi)');
        else if (v < 18.5) anthroApplyTier_(out, 'yellow', 'MUAC biên — SDD cấp vừa (160 đến <185 mm)');
        else anthroApplyTier_(out, 'green', 'MUAC — bình thường (>=185 mm, 10-19 tuổi)');
        updatePed2460NutritionSummaryFromUI_();
        if (typeof updatePed5to19NutritionSummary_ === 'function') updatePed5to19NutritionSummary_();
        return;
    }

    if (v < 21) anthroApplyTier_(out, 'red', 'MUAC thấp — nguy cơ cao (NL)');
    else if (v < 23) anthroApplyTier_(out, 'yellow', 'MUAC biên — nguy cơ thấp (NL)');
    else anthroApplyTier_(out, 'green', 'MUAC — bình thường / tốt (NL)');
    updatePed2460NutritionSummaryFromUI_();
    if (typeof updatePed5to19NutritionSummary_ === 'function') updatePed5to19NutritionSummary_();
}

function updatePed2460NutritionSummaryFromUI_() {
    const zWaText = document.getElementById('val_wa')?.innerText || '';
    const zHaText = document.getElementById('val_ha')?.innerText || '';
    const zWhText = document.getElementById('val_wh')?.innerText || '';
    const parseZ = (t) => {
        const m = String(t || '').match(/[-+]?\d+(\.\d+)?/);
        return m ? parseFloat(m[0]) : NaN;
    };
    const zWA = parseZ(zWaText);
    const zHA = parseZ(zHaText);
    const zWH = parseZ(zWhText);
    if ([zWA, zHA, zWH].some(Number.isNaN)) return;
    updatePed2460NutritionSummary_(zWA, zHA, zWH);
}

/** WHtR — NL: xanh ≤0,5 · vàng (0,5;0,55] · đỏ >0,55. TE: ngưỡng lệch nhẹ. */
function calcWHtR() {
    const eoEl = document.getElementById('m2_vongEo');
    const hEl = document.getElementById('m2_chieuCao');
    const rEl = document.getElementById('m2_whtr');
    const cEl = document.getElementById('m2_whtr_class');
    if (!eoEl || !hEl || !rEl || !cEl) return;

    const eo = parseFloat(eoEl.value);
    const h = parseFloat(hEl.value);
    if (!(eo > 0) || !(h > 0)) {
        rEl.value = '';
        anthroApplyTier_(cEl, '', '');
        return;
    }

    const r = eo / h;
    rEl.value = r.toFixed(3);
    const ped = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';

    let tier;
    let msg;
    if (ped) {
        if (r > 0.52) { tier = 'red'; msg = 'WHtR cao — nguy cơ cao (TE · Châu Á)'; }
        else if (r > 0.48) { tier = 'yellow'; msg = 'WHtR biên — nguy cơ thấp'; }
        else { tier = 'green'; msg = 'WHtR — bình thường / tốt'; }
    } else {
        if (r > 0.55) { tier = 'red'; msg = 'WHtR cao — nguy cơ cao (NL · eo/chiều cao)'; }
        else if (r > 0.5) { tier = 'yellow'; msg = 'WHtR > 0,5 — nguy cơ thấp'; }
        else { tier = 'green'; msg = 'WHtR ≤ 0,5 — bình thường / tốt'; }
    }
    anthroApplyTier_(cEl, tier, msg);
}

function calcMUST() {
    const bmiS = parseInt(document.getElementById('must_bmi_score').value);
    const wlS = parseInt(document.getElementById('must_wl_score').value);
    const acute = document.getElementById('must_acute').checked ? 2 : 0;
    
    const total = bmiS + wlS + acute;
    document.getElementById('must_total').innerText = total;
    
    const label = document.getElementById('must_risk');
    if (total === 0) {
        label.innerText = "Nguy cơ thấp (Theo dõi)"; label.className = "fw-bold ms-2 text-success";
    } else if (total === 1) {
        label.innerText = "Nguy cơ trung bình (Theo dõi/Ăn bổ sung)"; label.className = "fw-bold ms-2 text-warning";
    } else {
        label.innerText = "Nguy cơ CAO (Điều trị dinh dưỡng)"; label.className = "fw-bold ms-2 text-danger";
    }
}

function calcNRS2002() {
    const initIds = ['nrs_init_bmi', 'nrs_init_wl', 'nrs_init_intake', 'nrs_init_severe'];
    const anyInitYes = initIds.some(id => document.getElementById(id)?.checked);
    const finalBlock = document.getElementById('nrs_final_block');
    if (finalBlock) finalBlock.style.display = anyInitYes ? 'block' : 'none';

    const totalEl = document.getElementById('nrs_total');
    const riskEl = document.getElementById('nrs_risk');
    const age70Cb = document.getElementById('nrs_age70');

    // Tự gợi ý tuổi >=70 từ dữ liệu tuổi nếu có
    if (age70Cb) {
        const ageText = String(document.getElementById('hienThiTuoi')?.value || '');
        if (!ageText.includes('tháng')) {
            const age = parseInt(ageText, 10);
            if (!Number.isNaN(age) && age >= 70) age70Cb.checked = true;
        }
    }

    if (!anyInitYes) {
        if (totalEl) {
            totalEl.innerText = '0';
            totalEl.className = 'badge bg-success fs-6';
        }
        if (riskEl) {
            riskEl.innerText = 'Không nguy cơ (bảng 1 âm tính)';
            riskEl.className = 'fw-bold ms-2 text-success';
        }
        return;
    }

    const nutri = parseInt(document.getElementById('nrs_nutri_score')?.value || '0', 10) || 0;
    const disease = parseInt(document.getElementById('nrs_disease_score')?.value || '0', 10) || 0;
    const ageAdj = document.getElementById('nrs_age70')?.checked ? 1 : 0;
    const total = nutri + disease + ageAdj;

    if (totalEl) totalEl.innerText = String(total);
    if (!riskEl || !totalEl) return;

    if (total >= 3) {
        riskEl.innerText = 'Nguy cơ cao (cần can thiệp dinh dưỡng)';
        riskEl.className = 'fw-bold ms-2 text-danger';
        totalEl.className = 'badge bg-danger fs-6';
    } else if (total >= 1) {
        riskEl.innerText = 'Nguy cơ thấp-trung bình (theo dõi sát)';
        riskEl.className = 'fw-bold ms-2 text-warning';
        totalEl.className = 'badge bg-warning text-dark fs-6';
    } else {
        riskEl.innerText = 'Không nguy cơ';
        riskEl.className = 'fw-bold ms-2 text-success';
        totalEl.className = 'badge bg-success fs-6';
    }
}

function calcSTRONGkids() {
    const checks = Array.from(document.querySelectorAll('.strongkids-item'));
    if (!checks.length) return;
    const total = checks
      .filter(cb => cb.checked)
      .reduce((sum, cb) => sum + (parseInt(cb.dataset.score || '0', 10) || 0), 0);

    const totalEl = document.getElementById('strongkids_total');
    const riskEl = document.getElementById('strongkids_risk');
    const actionEl = document.getElementById('strongkids_action');
    const appendixEl = document.getElementById('strongkids_appendix_target');
    if (totalEl) totalEl.innerText = String(total);
    if (!riskEl) return;

    if (total >= 4) {
        riskEl.innerText = 'Nguy cơ cao';
        riskEl.className = 'fw-bold text-danger';
        if (totalEl) totalEl.className = 'badge bg-danger fs-6';
        if (actionEl) actionEl.innerText = 'Cần đánh giá dinh dưỡng toàn diện và can thiệp sớm.';
    } else if (total >= 1) {
        riskEl.innerText = 'Nguy cơ trung bình';
        riskEl.className = 'fw-bold text-warning';
        if (totalEl) totalEl.className = 'badge bg-warning text-dark fs-6';
        if (actionEl) actionEl.innerText = 'Theo dõi sát, đánh giá lại và cân nhắc can thiệp.';
    } else {
        riskEl.innerText = 'Nguy cơ thấp';
        riskEl.className = 'fw-bold text-success';
        if (totalEl) totalEl.className = 'badge bg-success fs-6';
        if (actionEl) actionEl.innerText = 'Theo dõi định kỳ.';
    }

    // Đánh dấu phụ lục cần lập sau sàng lọc STRONG-kids theo phân luồng.
    if (appendixEl) {
        appendixEl.value = currentPatient.inPatient ? 'APP_6_1' : 'APP_6_2';
    }
    if (actionEl) {
        const appendixText = currentPatient.inPatient
            ? 'Lập Phụ lục 6.1 (bệnh nhi nội trú).'
            : 'Lập Phụ lục 6.2 (bệnh nhi ngoại trú).';
        actionEl.innerText = `${actionEl.innerText} ${appendixText}`;
    }
}

function calcWHR() {
    const eoEl = document.getElementById('m2_vongEo');
    const mongEl = document.getElementById('m2_vongMong');
    const whrEl = document.getElementById('m2_whr');
    const classEl = document.getElementById('m2_whr_class');
    if (!eoEl || !mongEl || !whrEl || !classEl) return;

    const eo = parseFloat(eoEl.value);
    const mong = parseFloat(mongEl.value);
    if (!(eo > 0) || !(mong > 0)) {
        whrEl.value = '';
        anthroApplyTier_(classEl, '', '');
        calcWHtR();
        return;
    }

    const whr = eo / mong;
    whrEl.value = whr.toFixed(2);

    const gender = (document.getElementById('gioiTinh')?.value || 'Nam').toLowerCase();
    const ped = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';

    let tier;
    let risk;

    if (ped) {
        if (gender === 'nam') {
            if (whr >= 0.95) { tier = 'red'; risk = 'WHR cao — nguy cơ cao (TE · Châu Á)'; }
            else if (whr >= 0.88) { tier = 'yellow'; risk = 'WHR tăng — nguy cơ thấp'; }
            else { tier = 'green'; risk = 'WHR — bình thường / tốt'; }
        } else {
            if (whr >= 0.88) { tier = 'red'; risk = 'WHR cao — nguy cơ cao (TE · Châu Á)'; }
            else if (whr >= 0.82) { tier = 'yellow'; risk = 'WHR tăng — nguy cơ thấp'; }
            else { tier = 'green'; risk = 'WHR — bình thường / tốt'; }
        }
    } else if (gender === 'nam') {
        if (whr >= 1.0) { tier = 'red'; risk = 'WHR rất cao — nguy cơ cao (NL · Châu Á)'; }
        else if (whr >= 0.9) { tier = 'yellow'; risk = 'WHR cao — nguy cơ thấp'; }
        else { tier = 'green'; risk = 'WHR — bình thường / tốt'; }
    } else {
        if (whr >= 0.85) { tier = 'red'; risk = 'WHR rất cao — nguy cơ cao (NL · Châu Á)'; }
        else if (whr >= 0.8) { tier = 'yellow'; risk = 'WHR cao — nguy cơ thấp'; }
        else { tier = 'green'; risk = 'WHR — bình thường / tốt'; }
    }

    anthroApplyTier_(classEl, tier, risk);
    calcWHtR();
}

function calcGripStrength() {
    const gripEl = document.getElementById('m2_lucBop');
    const classEl = document.getElementById('m2_grip_class');
    if (!gripEl || !classEl) return;

    const grip = parseFloat(gripEl.value);
    if (!(grip > 0)) {
        anthroApplyTier_(classEl, '', '');
        updateSarcopeniaAwgs2019();
        return;
    }

    const isMale = String(document.getElementById('gioiTinh')?.value || 'Nam').toLowerCase() === 'nam';
    const thr = isMale ? 28 : 18;
    let label;
    let tier;
    if (isMale ? grip < 28 : grip < 18) {
        label = `Giảm sức nắm (<${thr} kg, AWGS 2019) — nguy cơ cao`;
        tier = 'red';
    } else {
        label = `Đạt ngưỡng (≥${thr} kg, AWGS 2019) — tốt`;
        tier = 'green';
    }

    anthroApplyTier_(classEl, tier, label);
    updateSarcopeniaAwgs2019();
}

/** AWGS 2019 — chỉ hiện panel khi HGS giảm; danh sách kết quả gọn. */
function updateSarcopeniaAwgs2019() {
    const panel = document.getElementById('m2_sarcopenia_panel');
    const autoUl = document.getElementById('m2_sarcopenia_auto_list');
    const out = document.getElementById('m2_sarcopenia_summary');
    if (!panel || !autoUl || !out) return;

    function hideSarcopeniaPanel_() {
        panel.classList.add('d-none');
        autoUl.replaceChildren();
        out.value = '';
    }

    function addAutoLine_(text) {
        const li = document.createElement('li');
        li.className = 'list-group-item py-1 px-2';
        li.textContent = text;
        autoUl.appendChild(li);
    }

    if (currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO') {
        hideSarcopeniaPanel_();
        return;
    }

    const isMale = String(document.getElementById('gioiTinh')?.value || 'Nam').toLowerCase() === 'nam';
    const grip = parseFloat(document.getElementById('m2_lucBop')?.value);
    const hasGrip = grip > 0;
    const hgThr = isMale ? 28 : 18;
    const lowHG = hasGrip && (isMale ? grip < 28 : grip < 18);

    if (!lowHG) {
        hideSarcopeniaPanel_();
        return;
    }

    panel.classList.remove('d-none');
    autoUl.replaceChildren();

    const calf = parseFloat(document.getElementById('m2_calf_cm')?.value);
    const hasCalf = calf > 0;
    const lowCC = hasCalf && (isMale ? calf < 34 : calf < 33);

    const asm = parseFloat(document.getElementById('m2_asm_ht2')?.value);
    const hasAsm = asm > 0;
    const modality = document.getElementById('m2_asm_modality')?.value || 'BIA';
    const fMassCut = modality === 'BIA' ? 5.7 : 5.4;
    const lowMass = hasAsm && (isMale ? asm < 7.0 : asm < fMassCut);

    const sts = parseFloat(document.getElementById('m2_sts5_sec')?.value);
    const hasSts = sts > 0;
    const lowPerfSTS = hasSts && sts >= 12;

    const gait = parseFloat(document.getElementById('m2_gait_ms')?.value);
    const hasGait = gait > 0;
    const lowPerfGait = hasGait && gait < 1.0;

    const sppbRaw = document.getElementById('m2_sppb')?.value;
    const hasSppb = sppbRaw != null && String(sppbRaw).trim() !== '';
    const sppb = hasSppb ? parseFloat(sppbRaw) : NaN;
    const lowPerfSppb = hasSppb && !Number.isNaN(sppb) && sppb <= 9;

    const lowPerf = lowPerfSTS || lowPerfGait || lowPerfSppb;
    const sarcopenia = lowHG && lowMass;
    const severe = sarcopenia && lowPerf;

    const lines = [];
    addAutoLine_(`HGS: ${grip} kg — giảm (ngưỡng <${hgThr} kg, AWGS 2019)`);
    lines.push(`HGS ${grip} kg: giảm (<${hgThr})`);

    if (hasCalf) {
        const t = lowCC ? `CC ${calf} cm: dưới ngưỡng (nam<34 / nữ<33)` : `CC ${calf} cm: không đạt sàng lọc CC`;
        addAutoLine_(t);
        lines.push(t);
    } else {
        addAutoLine_('CC: chưa nhập');
        lines.push('CC: —');
    }

    if (hasAsm) {
        const t = lowMass
            ? `ASM/Ht² ${asm} (${modality}): thấp`
            : `ASM/Ht² ${asm} (${modality}): không thấp`;
        addAutoLine_(t);
        lines.push(t);
    } else {
        addAutoLine_('ASM/Ht²: chưa có — nên đo để chẩn đoán xác định');
        lines.push('ASM: chưa có');
    }

    const perfParts = [];
    if (hasSts) perfParts.push(`STS ${sts}s${lowPerfSTS ? ' (giảm)' : ''}`);
    if (hasGait) perfParts.push(`đi ${gait} m/s${lowPerfGait ? ' (giảm)' : ''}`);
    if (hasSppb && !Number.isNaN(sppb)) perfParts.push(`SPPB ${sppb}${lowPerfSppb ? ' (giảm)' : ''}`);
    if (perfParts.length) {
        const t = `Thể lực: ${perfParts.join('; ')} → ${lowPerf ? 'có tiêu chí giảm' : 'chưa đủ tiêu chí (theo số đã nhập)'}`;
        addAutoLine_(t);
        lines.push(t);
    } else {
        addAutoLine_('Thể lực: chưa nhập (STS / đi / SPPB)');
        lines.push('Thể lực: —');
    }

    let verdict = '';
    if (severe) verdict = 'Gợi ý: sarcopenia nặng (HGS↓ + khối lượng cơ↓ + thể lực↓).';
    else if (sarcopenia) verdict = 'Gợi ý: sarcopenia xác định (HGS↓ + ASM↓); bổ sung thể lực nếu cần phân độ nặng.';
    else if (!hasAsm) verdict = 'Gợi ý: đo ASM/Ht² (DXA/BIA) sau HGS giảm.';
    else if (!lowMass) verdict = 'Gợi ý: HGS↓ nhưng ASM chưa thấp — theo dõi, vận động & dinh dưỡng.';
    else if (lowPerf && !sarcopenia) verdict = 'Gợi ý: thể lực↓ — hoàn thiện khối lượng cơ để phân loại.';

    if (verdict) {
        addAutoLine_(verdict);
        lines.push(verdict);
    }

    out.value = lines.join('\n');
}

function updateEdemaAssessment() {
    const present = !!document.getElementById('m4_edema_present')?.checked;
    const gradeEl = document.getElementById('m4_edema_grade');
    const noteEl = document.getElementById('m4_edema_note');
    const warnEl = document.getElementById('m4_edema_warning');

    let grade = '';
    if (present) {
        const r = document.querySelector('input[name="m4_edema_grade_radio"]:checked');
        grade = r ? r.value : '';

        // Tự động suy ra mức độ từ vị trí phù nếu chưa chọn
        if (!grade) {
            const locs = Array.from(document.querySelectorAll('.edema-loc:checked')).map(c => c.value);
            const hasGeneral = locs.includes('ANASARCA') || locs.includes('FACE');
            const hasUpper = locs.includes('HAND');
            const hasLeg = locs.includes('LEG');
            if (hasGeneral) grade = '+++';
            else if (hasUpper || hasLeg) grade = '++';
            else if (locs.length > 0) grade = '+';
        }
    }

    if (gradeEl) gradeEl.value = grade;

    let note = '';
    if (grade === '+') note = 'Phù nhẹ: thường khu trú ở mu bàn chân và mắt cá chân.';
    else if (grade === '++') note = 'Phù vừa: phù 2 bàn chân, cẳng chân, bàn tay và cẳng tay.';
    else if (grade === '+++') note = 'Phù nặng: phù lan rộng toàn thân (chân, tay, mặt).';
    if (noteEl) noteEl.value = note;
    if (warnEl) warnEl.classList.toggle('d-none', !grade);

    updateNutritionClassification();

    if (typeof updatePed2460NutritionSummaryFromUI_ === 'function') updatePed2460NutritionSummaryFromUI_();
    if (typeof updatePed5to19NutritionSummary_ === 'function') updatePed5to19NutritionSummary_();
}

// Phân loại thể dinh dưỡng dựa vào phù + Z-score / BMI
function updateNutritionClassification() {
    const out = document.getElementById('m4_nutrition_classification');
    if (!out) return;

    const hasEdema = !!document.getElementById('m4_edema_present')?.checked;

    const parseZ = (id) => {
        const t = document.getElementById(id)?.innerText || '';
        const m = t.match(/[-+]?\d+(\.\d+)?/);
        return m ? parseFloat(m[0]) : NaN;
    };
    const zWaBadge = parseZ('val_wa');
    const zWhBadge = parseZ('val_wh');
    const zHaBadge = parseZ('val_ha');
    const zWaManual = parseFloat(document.getElementById('ped519_z_wa')?.value || '');
    const zHaManual = parseFloat(document.getElementById('ped519_z_ha')?.value || '');
    const zBmiManual = parseFloat(document.getElementById('ped519_z_bmi')?.value || '');
    const zBmiWho = parseFloat(document.getElementById('m2_bmi_z_who')?.value || '');

    const pickFinite = (...vals) => vals.find(v => Number.isFinite(v));
    const zWA = pickFinite(zWaBadge, zWaManual);
    const zHA = pickFinite(zHaBadge, zHaManual);
    const zWH = zWhBadge;
    const zBMI = pickFinite(zBmiManual, zBmiWho);
    const bmiAdult = parseFloat(document.getElementById('m2_bmi')?.value || '');
    const isAdult = (typeof currentPatient !== 'undefined') && currentPatient && currentPatient.type === 'ADULT';

    const sev = (z) => Number.isFinite(z) && z < -3;
    const mod = (z) => Number.isFinite(z) && z < -2;

    let isSevereWasting = sev(zWA) || sev(zWH) || sev(zBMI);
    let isModerate = mod(zWA) || mod(zWH) || mod(zBMI);
    if (isAdult && Number.isFinite(bmiAdult) && bmiAdult > 0) {
        if (bmiAdult < 16) isSevereWasting = true;
        else if (bmiAdult < 18.5) isModerate = true;
    }

    const haveAnyZ = [zWA, zWH, zBMI].some(Number.isFinite) || (isAdult && Number.isFinite(bmiAdult) && bmiAdult > 0);

    let label, icd, cls, icon;
    if (hasEdema && isSevereWasting) {
        label = 'Marasmus – Kwashiorkor (suy dinh dưỡng nặng thể phối hợp)';
        icd = 'E42';
        cls = 'alert-danger fw-bold';
        icon = 'fa-skull-crossbones';
    } else if (hasEdema) {
        label = 'Kwashiorkor (suy dinh dưỡng nặng thể phù)';
        icd = 'E40';
        cls = 'alert-danger fw-bold';
        icon = 'fa-tint';
    } else if (isSevereWasting) {
        label = 'Marasmus (suy dinh dưỡng nặng thể teo đét)';
        icd = 'E41';
        cls = 'alert-danger fw-bold';
        icon = 'fa-bone';
    } else if (isModerate) {
        label = 'Suy dinh dưỡng vừa (chưa phân thể nặng)';
        icd = 'E44.0';
        cls = 'alert-warning';
        icon = 'fa-exclamation-triangle';
    } else if (haveAnyZ) {
        label = 'Bình thường về thể dinh dưỡng';
        icd = '';
        cls = 'alert-success';
        icon = 'fa-check-circle';
    } else {
        label = 'Cần đủ Z-score (W/A, W/H hoặc BMI/tuổi) để phân loại';
        icd = '';
        cls = 'alert-secondary';
        icon = 'fa-stethoscope';
    }

    // Gợi ý thêm theo triệu chứng Kwashiorkor đi kèm
    const kwSigns = document.querySelectorAll('.edema-kw:checked').length;
    let extra = '';
    if (hasEdema && kwSigns >= 3) extra = ' <span class="badge bg-warning text-dark ms-1">Nhiều dấu hiệu Kwashiorkor (≥3)</span>';
    else if (hasEdema && kwSigns >= 1) extra = ` <span class="badge bg-warning text-dark ms-1">${kwSigns} dấu hiệu Kwashiorkor</span>`;

    out.className = `alert ${cls} py-2 px-2 mb-0 small`;
    out.innerHTML = `<i class="fas ${icon} me-1"></i> <strong>${label}</strong>${icd ? ` <span class="badge bg-secondary ms-1">ICD-10: ${icd}</span>` : ''}${extra}`;
}

// ============================================

document.getElementById('icdSearch')?.addEventListener('input', function(e) {
    const val = e.target.value.toUpperCase();
    const list = document.getElementById('icdSuggest');
    
    if (val.length < 1) { list.style.display = 'none'; return; }
    
    const matches = DISEASE_DB.filter(d => d.code.includes(val) || d.name.toUpperCase().includes(val));
    
    list.innerHTML = '';
    if (matches.length > 0) {
        list.style.display = 'block';
        matches.forEach(item => {
            const li = document.createElement('li');
            li.className = 'list-group-item list-group-item-action pointer';
            li.innerHTML = `<span class="fw-bold text-primary">${item.code}</span> - ${item.name}`;
            li.onclick = () => addICD(item.code, item.name, item.group);
            list.appendChild(li);
        });
    } else {
        list.style.display = 'none';
    }
});

function addICD(code, name, group) {
    if (selectedDiagnosisList.length >= 5) { alert("Tối đa 5 chẩn đoán!"); return; }
    if (selectedDiagnosisList.some(item => item.code === code)) { alert("Đã tồn tại!"); return; }
    
    selectedDiagnosisList.push({ code, name, group: group || 'OTHER' });
    renderICDList();
    
    document.getElementById('icdSearch').value = '';
    document.getElementById('icdSuggest').style.display = 'none';
}

function removeICD(index) {
    selectedDiagnosisList.splice(index, 1);
    renderICDList();
}

function renderICDList() {
    const container = document.getElementById('selectedICDContainer');
    const emptyMsg = document.getElementById('icdEmptyMsg');
    
    container.innerHTML = ''; 
    if (selectedDiagnosisList.length === 0) {
        container.appendChild(emptyMsg);
        emptyMsg.style.display = 'block';
    } else {
        if(emptyMsg) emptyMsg.style.display = 'none';
        selectedDiagnosisList.forEach((item, index) => {
            const html = `
                <div class="d-flex justify-content-between align-items-center bg-white border rounded p-1 mb-1 shadow-sm">
                    <div class="d-flex align-items-center overflow-hidden">
                        <span class="badge bg-danger me-2">${item.code}</span>
                        <span class="text-truncate small fw-bold" style="max-width: 150px;" title="${item.name}">${item.name}</span>
                    </div>
                    <button class="btn btn-sm text-danger border-0" onclick="removeICD(${index})"><i class="fas fa-times"></i></button>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        });
    }
    document.getElementById('icdDataJSON').value = JSON.stringify(selectedDiagnosisList);
    updateLifestyleRecommendations();
    if (typeof updateExercisePrescription_ === 'function') updateExercisePrescription_();
}

document.addEventListener('click', function(e) {
    const search = document.getElementById('icdSearch');
    const suggest = document.getElementById('icdSuggest');
    if (!search.contains(e.target) && !suggest.contains(e.target)) {
        suggest.style.display = 'none';
    }
});

function getPatientConditions() {
    let conditions = [];
    document.querySelectorAll('.condition-check:checked').forEach(cb => {
        conditions.push(cb.value);
    });
    const week = document.getElementById('preg_week')?.value;
    if (conditions.includes('PREGNANT') && week) conditions.push(`PREGNANT_W${week}`);
    const trimester = document.getElementById('preg_trimester')?.value;
    if (conditions.includes('PREGNANT') && trimester) conditions.push(`PREGNANT_T${trimester}`);

    // === 1.1 Trước phẫu thuật ===
    if (conditions.includes('PRE_OP')) {
        const lvl = document.getElementById('preop_level')?.value;
        const typ = document.getElementById('preop_type')?.value;
        const npo = document.getElementById('preop_npo_hours')?.value;
        if (lvl) conditions.push(`PREOP_${lvl}`);
        if (typ) conditions.push(`PREOP_TYPE_${typ}`);
        if (npo) conditions.push(`PREOP_NPO_${npo}H`);
    }

    // === 1.2 Hậu phẫu sớm ===
    if (conditions.includes('POST_OP_EARLY')) {
        const pod = document.getElementById('postop_pod')?.value;
        const typ = document.getElementById('postop_type')?.value;
        const diet = document.getElementById('postop_diet')?.value;
        if (pod) conditions.push(`POD_${pod}`);
        if (typ) conditions.push(`POSTOP_TYPE_${typ}`);
        if (diet) conditions.push(`POSTOP_DIET_${diet}`);
    }

    // === 1.3 Đang lọc máu ===
    if (conditions.includes('DIALYSIS_SESSION')) {
        const t = document.getElementById('hd_type')?.value;
        const f = document.getElementById('hd_freq')?.value;
        const k = document.getElementById('hd_potassium')?.value;
        const p = document.getElementById('hd_phosphate')?.value;
        if (t) conditions.push(`HD_${t}`);
        if (f && (t === 'HD' || t === 'HDF')) conditions.push(`HD_FREQ_${f}`);
        if (k) conditions.push(`HD_K_${k}`);
        if (p) conditions.push(`HD_P_${p}`);
    }

    // === 1.4 ICU ===
    if (conditions.includes('ICU')) {
        const r = document.getElementById('icu_resp')?.value;
        const h = document.getElementById('icu_hemo')?.value;
        const ro = document.getElementById('icu_route')?.value;
        if (r) conditions.push(`ICU_RESP_${r}`);
        if (h) conditions.push(`ICU_HEMO_${h}`);
        if (ro) conditions.push(`ICU_ROUTE_${ro}`);
    }

    return conditions;
}

    ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        if (el.type === 'checkbox' || el.type === 'radio') el.checked = false;
        else el.value = '';

function updateTrimesterFromWeek() {
    const w = parseInt(document.getElementById('preg_week')?.value, 10);
    const sel = document.getElementById('preg_trimester');
    if (!sel || !Number.isFinite(w) || w <= 0) return;
    let t = '';
    if (w >= 1 && w <= 13) t = '1';
    else if (w >= 14 && w <= 27) t = '2';
    else if (w >= 28) t = '3';
    sel.value = t;
    if (typeof updateNutritionWeightGoalBadge_ === 'function') updateNutritionWeightGoalBadge_();
}

function updateWeekFromTrimester() {
    const sel = document.getElementById('preg_trimester');
    const wEl = document.getElementById('preg_week');
    if (!sel || !wEl) return;
    const t = sel.value;
    const w = parseInt(wEl.value, 10);
    const inRange = (w >= 1 && w <= 13 && t === '1')
        || (w >= 14 && w <= 27 && t === '2')
        || (w >= 28 && t === '3');
    if (!Number.isFinite(w) || !inRange) {
        if (t === '1') wEl.value = 8;
        else if (t === '2') wEl.value = 20;
        else if (t === '3') wEl.value = 32;
    }
    if (typeof updateNutritionWeightGoalBadge_ === 'function') updateNutritionWeightGoalBadge_();
}

function calcPregWeightChange() {
    const pre = parseFloat(document.getElementById('preg_pre_weight')?.value);
    const cur = parseFloat(document.getElementById('m2_canNang')?.value);
    const out = document.getElementById('preg_weight_change_pct');
    if (!out) return;
    if (!Number.isFinite(pre) || pre <= 0 || !Number.isFinite(cur) || cur <= 0) {
        out.textContent = '--';
        out.classList.remove('text-success', 'text-danger', 'text-warning');
        out.classList.add('text-danger');
        return;
    }
    const pct = ((cur - pre) / pre) * 100;
    const sign = pct >= 0 ? '+' : '';
    out.textContent = `${sign}${pct.toFixed(1)}% (${(cur - pre).toFixed(1)} kg)`;
    out.classList.remove('text-success', 'text-danger', 'text-warning');
    if (pct < 0) out.classList.add('text-danger');
    else if (pct > 20) out.classList.add('text-warning');
    else out.classList.add('text-success');
    if (typeof updateNutritionWeightGoalBadge_ === 'function') updateNutritionWeightGoalBadge_();
}

function suggestWeight() {
    const actualW = parseFloat(document.getElementById('m2_canNang').value) || 0;
    const height = parseFloat(document.getElementById('m2_chieuCao').value) || 0;
    const bmi = parseFloat(document.getElementById('m2_bmi').value) || 0;
    
    if(actualW === 0) return;

    let targetW = actualW;
    let suggestionText = "Dùng cân nặng thực tế";

    if (currentPatient.type === 'ADULT') {
        const heightM = height / 100;
        const idealW = 22 * heightM * heightM; 

        if (bmi < 18.5) {
            targetW = actualW; 
            suggestionText = "Dùng CN thực tế (Tránh Refeeding). Lý tưởng: " + idealW.toFixed(1) + "kg";
        } 
        else if (bmi > 25) {
            targetW = idealW + 0.25 * (actualW - idealW);
            suggestionText = "Dùng CN hiệu chỉnh (Béo phì). Lý tưởng: " + idealW.toFixed(1) + "kg";
        }
    } else {
        suggestionText = "Nhi khoa: Dùng cân nặng thực tế.";
    }

    document.getElementById('target_weight').value = targetW.toFixed(1);
    document.getElementById('weight_suggestion').innerText = suggestionText;
    
    calcFinalTarget();
}

function recalcIntervention() {
    const isVN = document.getElementById('std_vn').checked;
    suggestWeight(); 
    
    let kcalPerKg = 30;
    let protPerKg = 1.0;
    let waterPerKg = 40;

    if (currentPatient.type === 'ADULT') {
        const stressFactor = parseFloat(document.getElementById('factor_stress').value) || 1.0;
        const groups = selectedDiagnosisList.map(d => d.group || "");

        if (isVN) {
            kcalPerKg = 25 * stressFactor; 
            if(groups.includes('CKD_SEV')) protPerKg = 0.6;
            else if(groups.includes('CKD_MOD')) protPerKg = 0.8;
            else if(groups.includes('LIVER')) protPerKg = 1.0;
            else if(groups.includes('DIALYSIS') || groups.includes('BURN')) protPerKg = 1.2;
            else protPerKg = 1.1;
        } else {
            kcalPerKg = 30 * stressFactor; 
            protPerKg = groups.includes('CKD_SEV') ? 0.8 : 1.25;
        }
    } else {
        const w = parseFloat(document.getElementById('target_weight').value);
        if(w <= 10) kcalPerKg = 100;
        else if (w <= 20) kcalPerKg = (1000 + (w-10)*50) / w;
        else kcalPerKg = (1500 + (w-20)*20) / w;
        
        protPerKg = isVN ? 1.5 : 2.0; 
    }

    document.getElementById('target_kcal_per_kg').value = kcalPerKg.toFixed(1);
    document.getElementById('target_prot_per_kg').value = protPerKg.toFixed(1);
    document.getElementById('target_water_per_kg').value = waterPerKg;

    autoMapDietCode();
    updateLifestyleRecommendations();
    calcFinalTarget();
}

function getAgeYearsFromDisplay_() {
    const txt = (document.getElementById('hienThiTuoi')?.value || '').toLowerCase();
    const m = txt.match(/(\d+)\s*tháng/);
    if (m) return parseInt(m[1], 10) / 12;
    const y = txt.match(/(\d+)\s*tuổi/);
    if (y) return parseInt(y[1], 10);
    return 0;
}

function _setListHtml_(id, items) {
    const ul = document.getElementById(id);
    if (!ul) return;
    ul.innerHTML = (items || []).map(t => `<li>${t}</li>`).join('') || '<li class="text-muted fst-italic">--</li>';
