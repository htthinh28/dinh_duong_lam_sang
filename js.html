function getAvoidanceList_() {
    const list = [];
    const dxCodes = (Array.isArray(selectedDiagnosisList) ? selectedDiagnosisList : []).map(d => String(d.code || '').toUpperCase());
    const conditions = (typeof getPatientConditions === 'function') ? getPatientConditions() : [];
    const months = getPatientAgeMonths_();
    const ageY = months / 12;
    const dietPref = (document.getElementById('diet_preference')?.value || 'NONE').toUpperCase();

    const allergies = [];
    document.querySelectorAll('.allergy-check:checked, #m1_drug_allergy_list input[type="checkbox"]:checked').forEach(cb => {
        const lbl = cb.closest('label')?.innerText || cb.value || '';
        if (lbl) allergies.push(lbl.trim());
    });

    const push = (label, reason, level = 'warn') => list.push({ label, reason, level });

    // ----- Theo chẩn đoán -----
    if (dxCodes.some(c => c.startsWith('E10') || c.startsWith('E11'))) {
        push('Đường tinh luyện · nước ngọt · bánh kẹo', 'Đái tháo đường — đỉnh đường huyết sau ăn', 'danger');
        push('Nước ép trái cây ngọt', 'Hấp thu glucose nhanh, tăng đường huyết', 'warn');
        push('Cơm trắng nhiều / xôi / bún ngọt', 'Tải đường huyết cao', 'warn');
    }
    if (dxCodes.some(c => c.startsWith('I10') || c.startsWith('I11') || c.startsWith('I12') || c.startsWith('I13') || c.startsWith('I15'))) {
        push('Muối &gt; 5 g/ngày', 'Tăng huyết áp', 'danger');
        push('Dưa muối · cá khô · mì gói · đồ hộp', 'Hàm lượng natri rất cao', 'warn');
        push('Nước mắm / tương / nước chấm đậm', 'Natri ẩn nhiều', 'warn');
    }
    if (dxCodes.some(c => c.startsWith('I50') || c.startsWith('I2'))) {
        push('Đồ ăn nhanh / chiên rán', 'Bệnh tim mạch — chất béo bão hòa &amp; trans', 'warn');
        push('Caffeine cao &gt; 300 mg/ngày', 'Có thể kích thích loạn nhịp', 'warn');
    }
    if (dxCodes.some(c => c.startsWith('N18'))) {
        push('Đạm vượt y lệnh (thịt &gt; 150 g/ngày)', 'Bệnh thận mạn — bảo tồn chức năng', 'danger');
        push('Phospho cao: phô mai, sữa nhiều, hạt rang muối, cola', 'Tránh tăng phospho máu', 'warn');
        push('Kali cao: chuối, cam, dừa, khoai tây nhiều — theo giai đoạn', 'Nguy cơ tăng kali máu', 'warn');
    }
    if (dxCodes.some(c => c.startsWith('K7'))) {
        push('Rượu bia tuyệt đối', 'Bệnh gan mật', 'danger');
        push('Đồ chiên rán nhiều dầu, nội tạng', 'Tăng gánh nặng gan', 'warn');
    }
    if (dxCodes.some(c => c.startsWith('M10'))) {
        push('Bia rượu (đặc biệt bia)', 'Gout — tăng acid uric', 'danger');
        push('Nội tạng động vật, hải sản (tôm hùm, sò, cá cơm)', 'Hàm lượng purin cao', 'danger');
        push('Nước hầm xương đậm đặc', 'Purin tan trong nước', 'warn');
    }
    if (dxCodes.some(c => c.startsWith('K21'))) {
        push('Cà phê đặc · trà đặc · nước có gas', 'Trào ngược dạ dày thực quản', 'warn');
        push('Đồ cay, sô cô la, bạc hà', 'Giảm trương lực cơ vòng dưới thực quản', 'warn');
        push('Ăn sát giờ ngủ (&lt;3 giờ)', 'Tăng trào ngược ban đêm', 'warn');
    }
    if (dxCodes.some(c => c.startsWith('K25') || c.startsWith('K26') || c.startsWith('K27') || c.startsWith('K28') || c.startsWith('K29'))) {
        push('Đồ cay, dấm, dưa muối', 'Loét / viêm dạ dày', 'warn');
        push('Rượu bia, NSAIDs', 'Tổn thương niêm mạc', 'danger');
    }
    if (dxCodes.some(c => c.startsWith('M81') || c.startsWith('M80'))) {
        push('Cà phê đặc &gt; 3 ly/ngày', 'Loãng xương — giảm hấp thu canxi', 'warn');
        push('Muối nhiều, đồ ngọt nhiều', 'Tăng đào thải canxi qua thận', 'warn');
    }

    // ----- Theo Bước 6 -----
    if (conditions.includes('PREGNANT')) {
        push('Cá thuỷ ngân cao (cá kiếm, cá ngừ to, cá thu vua)', 'Thai kỳ — nguy cơ độc thần kinh thai', 'danger');
        push('Gan động vật &gt; 1 lần/tuần', 'Quá liều vitamin A — dị tật thai', 'danger');
        push('Đồ sống / tái (sushi, gỏi, trứng sống)', 'Nguy cơ Listeria, Toxoplasma', 'danger');
        push('Rượu bia tuyệt đối', 'Hội chứng rượu bào thai', 'danger');
        push('Caffeine &gt; 200 mg/ngày', 'Liên quan sảy thai, sinh nhẹ cân', 'warn');
        push('Sữa &amp; phô mai chưa tiệt trùng', 'Listeria', 'warn');
    }
    if (conditions.includes('LACTATING')) {
        push('Rượu bia · thuốc lá', 'Qua sữa mẹ ảnh hưởng trẻ', 'danger');
        push('Cà phê &gt; 300 mg caffeine/ngày', 'Trẻ kích thích, khó ngủ', 'warn');
    }
    if (conditions.includes('REFEEDING_RISK')) {
        push('Nạp tinh bột nhiều &amp; nhanh tuần đầu', 'Hội chứng nuôi ăn lại — hạ phosphat', 'danger');
    }
    if (conditions.includes('PRE_OP') || conditions.includes('POST_OP_EARLY')) {
        push('Đồ sống / tái / chưa nấu chín', 'Nguy cơ nhiễm trùng quanh phẫu thuật', 'warn');
        push('Đồ sinh hơi nhiều: đậu, súp lơ, bắp cải sống — nếu phẫu thuật ổ bụng', 'Đầy hơi, khó chịu vết mổ', 'warn');
    }

    // ----- Theo lứa tuổi -----
    if (ageY > 0 && ageY < 1) {
        push('Mật ong (trẻ &lt; 12 tháng)', 'Nguy cơ ngộ độc Botulinum', 'danger');
        push('Sữa bò nguyên kem (&lt; 12 tháng)', 'Khó tiêu, gánh nặng thận', 'warn');
        push('Muối thêm vào thức ăn', 'Thận trẻ chưa hoàn thiện', 'warn');
    }
    if (ageY > 0 && ageY < 4) {
        push('Hạt nguyên hạt, kẹo cứng, nho nguyên trái', 'Nguy cơ hóc dị vật', 'warn');
    }

    // ----- Theo chế độ sở thích -----
    if (dietPref === 'VEGAN') {
        push('Tất cả sản phẩm động vật (thịt, cá, sữa, trứng, mật ong)', 'Theo nguyện vọng — cần bổ sung B12, sắt, kẽm', 'info');
    } else if (dietPref === 'VEGETARIAN') {
        push('Thịt và cá', 'Theo nguyện vọng — vẫn nhận đạm từ trứng/sữa', 'info');
    } else if (dietPref === 'HALAL') {
        push('Thịt heo và sản phẩm từ heo', 'Theo tôn giáo Halal', 'info');
        push('Rượu bia &amp; thực phẩm chứa cồn', 'Theo tôn giáo Halal', 'info');
    }

    // ----- Theo dị ứng -----
    allergies.forEach(a => push(`Dị ứng: ${a}`, 'Đã ghi nhận tiền sử dị ứng', 'danger'));

    // Khử trùng lặp
    const seen = new Set();
    return list.filter(it => {
        const k = (it.label || '').toLowerCase();
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
    });
}

function updateAvoidanceList_() {
    const wrap = document.getElementById('avoid_chips');
    const empty = document.getElementById('avoid_empty');
    const badge = document.getElementById('avoid_count_badge');
    if (!wrap || !empty || !badge) return;

    const items = getAvoidanceList_();
    badge.textContent = items.length;
    if (!items.length) {
        wrap.innerHTML = '';
        empty.style.display = '';
    } else {
        empty.style.display = 'none';
        wrap.innerHTML = items.map(it => {
            const cls = it.level === 'danger' ? 'bg-danger text-white' : it.level === 'warn' ? 'bg-warning text-dark' : 'bg-info-subtle text-dark border';
            return `<span class="badge ${cls} text-wrap" style="max-width:100%;" title="${it.reason}">${it.label}</span>`;
        }).join('');
    }

    // Đồng bộ với textarea ẩn để snapshot/in vẫn có nội dung tóm tắt.
    const txt = items.map(it => `• ${stripHtml_(it.label)} — ${stripHtml_(it.reason)}`).join('\n')
        || 'Không ghi nhận lưu ý kiêng cữ đặc biệt.';
    const note = document.getElementById('life_note_plan');
    if (note) note.value = txt;
}

function stripHtml_(s) {
    if (!s) return '';
    return String(s).replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
}

function _appliesAvoid_(diet) {
    const dxCodes = (Array.isArray(selectedDiagnosisList) ? selectedDiagnosisList : []).map(d => String(d.code || '').toUpperCase());
    const conditions = (typeof getPatientConditions === 'function') ? getPatientConditions() : [];
    const months = getPatientAgeMonths_();
    const ageY = months / 12;

    const flags = [];
    const has = (cond) => flags.push(cond);

    if (diet === 'KETO' || diet === 'LOWCARB') {
        if (dxCodes.some(c => c.startsWith('N18'))) has('Bệnh thận mạn');
        if (dxCodes.some(c => c.startsWith('K7'))) has('Bệnh gan mật');
        if (conditions.includes('PREGNANT') || conditions.includes('LACTATING')) has('Thai kỳ / cho con bú');
        if (ageY > 0 && ageY < 18) has('Trẻ em &lt; 18 tuổi');
        if (dxCodes.some(c => c === 'E10') && diet === 'KETO') has('Đái tháo đường type 1 (nguy cơ DKA)');
    }
    if (diet === 'IF168') {
        if (conditions.includes('PREGNANT') || conditions.includes('LACTATING')) has('Thai kỳ / cho con bú');
        if (ageY > 0 && ageY < 18) has('Dưới 18 tuổi');
        const bmi = parseFloat(document.getElementById('m2_bmi')?.value || '0');
        if (Number.isFinite(bmi) && bmi > 0 && bmi < 18.5) has('BMI &lt; 18.5 (gầy)');
        if (dxCodes.some(c => c === 'E10')) has('Đái tháo đường type 1');
    }
    if (diet === 'DASH') {
        if (dxCodes.some(c => c.startsWith('N18'))) has('Bệnh thận mạn nặng (cẩn trọng kali)');
    }
    if (diet === 'REVERSE') {
        if (ageY > 0 && ageY < 5) has('Trẻ &lt; 5 tuổi');
    }
    return flags;
}

function updateSpecialDietPanel_() {
    const sel = document.getElementById('special_diet_select');
    const panel = document.getElementById('special_diet_panel');
    if (!sel || !panel) return;
    const key = sel.value;

    if (!key || !SPECIAL_DIETS[key]) {
        panel.style.display = 'none';
        ['life_move_daily', 'life_sport_plan', 'life_rest_plan'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        return;
    }

    const d = SPECIAL_DIETS[key];
    panel.style.display = '';

    const setText = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
    setText('sd_name', d.name);
    setText('sd_summary', d.summary);
    const icon = document.getElementById('sd_icon');
    if (icon) icon.className = `fas ${d.icon} me-1`;

    _setListHtml_('sd_rules', d.rules);
    _setListHtml_('sd_schedule', d.schedule);
    _setListHtml_('sd_example', d.example);
    _setListHtml_('sd_suit', d.suit);
    _setListHtml_('sd_avoid', d.avoid);
    _setListHtml_('sd_monitor', d.monitor);

    // Badge tương thích với hồ sơ bệnh
    const conflicts = _appliesAvoid_(key);
    const compat = document.getElementById('sd_compat_badge');
    if (compat) {
        if (conflicts.length) {
            compat.textContent = `${conflicts.length} lưu ý cảnh báo`;
            compat.className = 'badge bg-danger';
            compat.title = 'Hồ sơ có yếu tố thuộc danh sách "Tránh / Chống chỉ định". Cân nhắc kỹ trước khi áp dụng:\n• ' + conflicts.map(stripHtml_).join('\n• ');
        } else {
            compat.textContent = 'Phù hợp hồ sơ';
            compat.className = 'badge bg-success';
            compat.title = 'Không ghi nhận chống chỉ định nổi bật trong hồ sơ hiện tại.';
        }
    }

    // Đồng bộ với textarea ẩn để snapshot / in vẫn lưu nội dung.
    const setVal = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
    setVal('life_move_daily', `${d.name} — Nguyên tắc:\n• ` + d.rules.map(stripHtml_).join('\n• '));
    setVal('life_sport_plan', `Cách thực hiện trong ngày:\n• ` + d.schedule.map(stripHtml_).join('\n• '));
    setVal('life_rest_plan', `Ví dụ thực đơn 1 ngày:\n• ` + d.example.map(stripHtml_).join('\n• '));
}

// ----- Phân loại mục tiêu cân: NL ≥19 tuổi = BMI Châu Á · Trẻ <19 = Z-score WHO · Thai phụ = IOM -----
function parseZFromBadge_(valId) {
    const t = document.getElementById(valId)?.innerText || '';
    const m = String(t).match(/[-+]?\d+(\.\d+)?/);
    return m ? parseFloat(m[0]) : NaN;
}

function getPatientAgeMonths_() {
    let m = (typeof currentPatient !== 'undefined' && currentPatient) ? (currentPatient.month || 0) : 0;
    if (!m) {
        const ageText = document.getElementById('hienThiTuoi')?.value || '';
        if (ageText.includes('tháng')) m = parseInt(ageText, 10) || 0;
        else m = (parseInt(ageText, 10) || 0) * 12;
    }
    return m;
}

function isAdult19Plus_() {
    return getPatientAgeMonths_() >= (19 * 12);
}

function isPregnantPatient_() {
    return !!document.getElementById('cond_pregnant')?.checked;
}

function getPrePregnancyBmi_() {
    const preW = parseFloat(document.getElementById('preg_pre_weight')?.value);
    const hCm = parseFloat(document.getElementById('m2_chieuCao')?.value);
    if (!(preW > 0) || !(hCm > 0)) return NaN;
    const hm = hCm / 100;
    return preW / (hm * hm);
}

/** IOM 2009 — tốc độ tăng cân khuyến nghị (kg/tuần), quý 2–3 */
function getIomWeeklyGainRange_(preBmi) {
    if (!Number.isFinite(preBmi)) return null;
    if (preBmi < 18.5) return { min: 0.44, max: 0.58, mid: 0.51, cat: 'Thiếu cân trước thai' };
    if (preBmi < 25) return { min: 0.35, max: 0.50, mid: 0.425, cat: 'Bình thường' };
    if (preBmi < 30) return { min: 0.23, max: 0.33, mid: 0.28, cat: 'Thừa cân' };
    return { min: 0.17, max: 0.27, mid: 0.22, cat: 'Béo phì' };
}

function getPediatricZScoresForWeightGoal_() {
    const month = getPatientAgeMonths_();
    let zWA = parseZFromBadge_('val_wa');
    let zWH = parseZFromBadge_('val_wh');
    let zBAZ = parseFloat(document.getElementById('m2_bmi_z_who')?.value || '');

    if (month >= 60 && month < (19 * 12)) {
        const zWaManual = parseFloat(document.getElementById('ped519_z_wa')?.value || '');
        const zBmiManual = parseFloat(document.getElementById('ped519_z_bmi')?.value || '');
        if (Number.isFinite(zWaManual)) zWA = zWaManual;
        if (Number.isFinite(zBmiManual)) zBAZ = zBmiManual;
    }
    return { zWA, zWH, zBAZ, month };
}

function applyIomPregnancyGoalDefaults_() {
    const card = document.getElementById('weight_goal_card');
    if (!card || card.dataset.userTouched) return;
    const gw = parseInt(document.getElementById('preg_week')?.value, 10);
    const preBmi = getPrePregnancyBmi_();
    const range = getIomWeeklyGainRange_(preBmi);
    const gainKgEl = document.getElementById('goal_gain_kg');
    const gainWkEl = document.getElementById('goal_gain_weeks');
    if (!gainKgEl || !gainWkEl || !Number.isFinite(gw) || gw < 1 || gw > 42 || !range) return;

    if (gw <= 13) {
        const wkLeft = Math.max(1, 14 - gw);
        gainWkEl.value = wkLeft;
        gainKgEl.value = '0.5';
    } else {
        const wkLeft = Math.max(1, 40 - gw);
        gainWkEl.value = wkLeft;
        gainKgEl.value = (range.mid * wkLeft).toFixed(1);
    }
}

function applySuggestedGoalMode_(suggestion) {
    const card = document.getElementById('weight_goal_card');
    if (!suggestion || !card || card.dataset.userTouched) return;
    const id = suggestion === 'LOSS' ? 'goal_loss' : suggestion === 'GAIN' ? 'goal_gain' : 'goal_maintain';
    const el = document.getElementById(id);
    if (!el || el.disabled || el.checked) return;
    el.checked = true;
    const lossBox = document.getElementById('goal_loss_detail');
    const gainBox = document.getElementById('goal_gain_detail');
    if (lossBox) lossBox.style.display = (suggestion === 'LOSS') ? '' : 'none';
    if (gainBox) gainBox.style.display = (suggestion === 'GAIN') ? '' : 'none';
    calcFinalTarget();
}

function calcFinalTarget() {
    const w = parseFloat(document.getElementById('target_weight').value);
    const kcalPk = parseFloat(document.getElementById('target_kcal_per_kg').value);
    const protPk = parseFloat(document.getElementById('target_prot_per_kg').value);

    if (!w) {
        syncWaterFiberDisplays();
        updateWeightGoalSummary_(0, 0);
        return;
    }

    const baseKcal = w * kcalPk;
    const delta = getWeightGoalKcalDelta_();
    // Sàn an toàn: không < 800 kcal (NL) / 1000 kcal (NL ngoại trú)
    const floorKcal = (typeof currentPatient !== 'undefined' && currentPatient && (currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO')) ? 700 : 1000;
    const totalKcal = Math.max(floorKcal, Math.round(baseKcal + delta));
    const totalProtG = (w * protPk).toFixed(1);

    document.getElementById('final_kcal').innerText = totalKcal;
    document.getElementById('macro_p_g').innerText = totalProtG;

    const kcalProt = totalProtG * 4;
    const pctProt = ((kcalProt / totalKcal) * 100).toFixed(1);
    document.getElementById('macro_p_pct').value = pctProt;

    recalcMacroFromRatio();
    updateWeightGoalSummary_(baseKcal, delta);
}

// ===== Mục tiêu thay đổi cân nặng =====
const KCAL_PER_KG_BODY = 7700; // hệ số kinh điển: 1 kg mô mỡ ≈ 7700 kcal

// Cập nhật hiển thị + tính delta khi đổi tham số mục tiêu
function updateWeightGoal() {
    const mode = document.querySelector('input[name="weight_goal_mode"]:checked')?.value || 'MAINTAIN';
    const lossBox = document.getElementById('goal_loss_detail');
    const gainBox = document.getElementById('goal_gain_detail');
    if (lossBox) lossBox.style.display = (mode === 'LOSS') ? '' : 'none';
    if (gainBox) gainBox.style.display = (mode === 'GAIN') ? '' : 'none';
    const card = document.getElementById('weight_goal_card');
    if (card) card.dataset.userTouched = '1';
    calcFinalTarget();
    if (typeof updateExercisePrescription_ === 'function') updateExercisePrescription_();
}

// Trả về kcal/day cộng thêm (âm: giảm, dương: tăng) từ form mục tiêu cân nặng
function getWeightGoalKcalDelta_() {
    const mode = document.querySelector('input[name="weight_goal_mode"]:checked')?.value || 'MAINTAIN';
    if (mode === 'MAINTAIN') return 0;

    if (isPregnantPatient_() && mode === 'LOSS') return 0;

    const curW = parseFloat(document.getElementById('m2_canNang')?.value) || 0;

    if (mode === 'LOSS') {
        const pct = parseFloat(document.getElementById('goal_loss_pct')?.value) || 0;
        const weeks = parseFloat(document.getElementById('goal_loss_weeks')?.value) || 0;
        if (curW <= 0 || pct <= 0 || weeks <= 0) return 0;
        const kgsLose = curW * (pct / 100);
        const days = weeks * 7;
        const deficit = (kgsLose * KCAL_PER_KG_BODY) / days;
        return -Math.round(deficit);
    }

    if (mode === 'GAIN') {
        const kgs = parseFloat(document.getElementById('goal_gain_kg')?.value) || 0;
        const weeks = parseFloat(document.getElementById('goal_gain_weeks')?.value) || 0;
        if (kgs <= 0 || weeks <= 0) return 0;
        const days = weeks * 7;
        const surplus = (kgs * KCAL_PER_KG_BODY) / days;
        return Math.round(surplus);
    }
    return 0;
}

function updateWeightGoalSummary_(baseKcal, delta) {
    const mode = document.querySelector('input[name="weight_goal_mode"]:checked')?.value || 'MAINTAIN';
    const curW = parseFloat(document.getElementById('m2_canNang')?.value) || 0;
    const rateEl = document.getElementById('goal_rate');
    const deltaEl = document.getElementById('goal_kcal_delta');
    const targetWEl = document.getElementById('goal_target_weight');
    const warnEl = document.getElementById('goal_warning');
    if (!rateEl || !deltaEl || !targetWEl || !warnEl) return;

    let kgsChange = 0;
    let weeks = 0;
    if (mode === 'LOSS') {
        const pct = parseFloat(document.getElementById('goal_loss_pct')?.value) || 0;
        weeks = parseFloat(document.getElementById('goal_loss_weeks')?.value) || 0;
        kgsChange = -curW * (pct / 100);
    } else if (mode === 'GAIN') {
        weeks = parseFloat(document.getElementById('goal_gain_weeks')?.value) || 0;
        kgsChange = parseFloat(document.getElementById('goal_gain_kg')?.value) || 0;
    }

    if (mode === 'MAINTAIN' || weeks <= 0 || kgsChange === 0 || curW <= 0) {
        rateEl.innerText = '0';
        deltaEl.innerText = (delta || 0).toString();
        targetWEl.innerText = curW > 0 ? curW.toFixed(1) : '--';
        warnEl.innerText = mode === 'MAINTAIN' ? 'Duy trì cân nặng — không hiệu chỉnh năng lượng.' : '';
        warnEl.className = 'small fst-italic mt-1 mb-0 text-success';
        return;
    }

    const ratePerWeek = kgsChange / weeks;
    const targetW = curW + kgsChange;

    rateEl.innerText = (ratePerWeek >= 0 ? '+' : '') + ratePerWeek.toFixed(2);
    deltaEl.innerText = (delta >= 0 ? '+' : '') + delta;
    targetWEl.innerText = targetW.toFixed(1);

    // Cảnh báo tốc độ — NL ≥19 tuổi · Trẻ <19 · Thai phụ (IOM)
    let warn = '';
    let warnCls = 'text-success';
    const absRate = Math.abs(ratePerWeek);
    const preg = isPregnantPatient_();
    const adult = isAdult19Plus_();

    if (preg && mode === 'LOSS') {
        warn = 'Thai kỳ: không khuyến khích giảm cân ngoài chỉ định chuyên khoa.';
        warnCls = 'text-danger fw-bold';
    } else if (mode === 'LOSS') {
        if (!adult) {
            if (absRate > 0.25) { warn = '⚠ Trẻ em: giảm cân quá nhanh — nguy cơ ảnh hưởng tăng trưởng.'; warnCls = 'text-danger fw-bold'; }
            else if (absRate < 0.05) { warn = 'Tốc độ giảm rất chậm.'; warnCls = 'text-muted'; }
            else { warn = '✓ Giảm thận trọng — cần đồng thuận chuyên khoa Nhi.'; warnCls = 'text-success'; }
        } else {
            if (absRate > 1.0) { warn = '⚠ Tốc độ giảm quá nhanh (>1 kg/tuần) — có nguy cơ mất khối nạc, sỏi mật, mệt mỏi.'; warnCls = 'text-danger fw-bold'; }
            else if (absRate < 0.25) { warn = 'Tốc độ giảm rất chậm — có thể kéo dài kế hoạch thêm.'; warnCls = 'text-muted'; }
            else { warn = '✓ Tốc độ giảm an toàn (0.5–1 kg/tuần).'; warnCls = 'text-success'; }
        }
    } else if (mode === 'GAIN') {
        if (preg) {
            const gw = parseInt(document.getElementById('preg_week')?.value, 10);
            const range = getIomWeeklyGainRange_(getPrePregnancyBmi_());
            if (range && gw >= 14 && gw <= 40) {
                if (absRate + 1e-4 < range.min) { warn = `⚠ Dưới khuyến nghị IOM (${range.min.toFixed(2)}–${range.max.toFixed(2)} kg/tuần, ${range.cat}).`; warnCls = 'text-warning fw-bold'; }
                else if (absRate - 1e-4 > range.max) { warn = `⚠ Trên khuyến nghị IOM (${range.min.toFixed(2)}–${range.max.toFixed(2)} kg/tuần) — nguy cơ thai to / biến chứng.`; warnCls = 'text-danger fw-bold'; }
                else { warn = `✓ Trong khuyến nghị IOM (${range.min.toFixed(2)}–${range.max.toFixed(2)} kg/tuần).`; warnCls = 'text-success'; }
            } else if (gw >= 1 && gw <= 13) {
                if (absRate > 0.22) { warn = '⚠ Quý 1: khuyến nghị tăng nhẹ (~0,5–2 kg cả quý); tránh tăng quá nhanh.'; warnCls = 'text-warning fw-bold'; }
                else { warn = '✓ Quý 1: tốc độ tăng phù hợp hướng dẫn IOM (tăng chậm).'; warnCls = 'text-success'; }
            } else if (!range) {
                warn = 'Nhập cân nặng trước mang thai và chiều cao để đối chiếu IOM đầy đủ.';
                warnCls = 'text-muted';
            }
        } else if (!adult) {
            if (absRate > 0.35) { warn = '⚠ Trẻ em: tăng >0,35 kg/tuần — xem xét nguyên nhân / chỉ định.'; warnCls = 'text-warning fw-bold'; }
            else if (absRate < 0.03) { warn = 'Tăng rất chậm — theo dõi hấp thu / lượng ăn.'; warnCls = 'text-muted'; }
            else { warn = '✓ Tốc độ tăng phù hợp phục hồi dinh dưỡng trẻ em.'; warnCls = 'text-success'; }
        } else {
            if (absRate > 0.5) { warn = '⚠ Tăng quá nhanh (>0.5 kg/tuần) — phần lớn có thể là mỡ, không phải cơ.'; warnCls = 'text-warning fw-bold'; }
            else if (absRate < 0.1) { warn = 'Tăng rất chậm — cần kiên nhẫn / kiểm tra hấp thu.'; warnCls = 'text-muted'; }
            else { warn = '✓ Tốc độ tăng an toàn (0.25–0.5 kg/tuần, ưu tiên tăng cơ).'; warnCls = 'text-success'; }
        }
    }
    warnEl.innerText = warn;
    warnEl.className = `small fst-italic mt-1 mb-0 ${warnCls}`;
}

/** Badge + gợi ý mode: NL ≥19 = BMI Châu Á · Trẻ <19 = Z-score WHO · Thai phụ = IOM */
function updateNutritionWeightGoalBadge_() {
    const badge = document.getElementById('bmi_status_badge');
    const banner = document.getElementById('goal_pregnancy_iom_banner');
    const bannerText = document.getElementById('goal_pregnancy_iom_text');
    const lossEl = document.getElementById('goal_loss');
    const lossLbl = document.getElementById('goal_loss_label');
    if (!badge) return;

    const preg = isPregnantPatient_();
    const adult = isAdult19Plus_();
    const months = getPatientAgeMonths_();

    // ——— Thai phụ (ưu tiên) ———
    if (preg) {
        if (lossEl) lossEl.disabled = true;
        if (lossLbl) {
            lossLbl.classList.add('opacity-50');
            lossLbl.title = 'Không khuyến khích giảm cân trong thai kỳ (ngoại trừ chỉ định chuyên khoa).';
        }
        if (lossEl?.checked) {
            const gain = document.getElementById('goal_gain');
            if (gain) gain.checked = true;
            const lb = document.getElementById('goal_loss_detail');
            const gb = document.getElementById('goal_gain_detail');
            if (lb) lb.style.display = 'none';
            if (gb) gb.style.display = '';
            calcFinalTarget();
        }
        if (banner && bannerText) {
            banner.classList.remove('d-none');
            const gw = parseInt(document.getElementById('preg_week')?.value, 10);
            const preBmi = getPrePregnancyBmi_();
            const range = getIomWeeklyGainRange_(preBmi);
            if (!Number.isFinite(gw) || gw < 1) {
                bannerText.textContent = 'Thai phụ: nhập tuần thai để áp dụng khuyến nghị tăng cân (IOM 2009).';
            } else if (!range) {
                bannerText.textContent = `Tuần ${gw}: nhập cân nặng trước mang thai và chiều cao để tính BMI tiền thai — từ đó có khoảng tăng cân/tuần IOM (quý 2–3).`;
            } else if (gw <= 13) {
                bannerText.textContent = `Tuần ${gw} (quý 1): khuyến nghị tăng nhẹ tổng ~0,5–2 kg cả quý 1 — không chủ động giảm cân. BMI tiền thai: ${preBmi.toFixed(1)} (${range.cat}). Quý 2–3: ${range.min.toFixed(2)}–${range.max.toFixed(2)} kg/tuần.`;
            } else {
                bannerText.textContent = `Tuần ${gw}: BMI tiền thai ${preBmi.toFixed(1)} (${range.cat}). IOM quý 2–3: ${range.min.toFixed(2)}–${range.max.toFixed(2)} kg/tuần.`;
            }
        }
        const card = document.getElementById('weight_goal_card');
        if (card && !card.dataset.userTouched) {
            const g = document.getElementById('goal_gain');
            if (g) {
                g.checked = true;
                const lossBox = document.getElementById('goal_loss_detail');
                const gainBox = document.getElementById('goal_gain_detail');
                if (lossBox) lossBox.style.display = 'none';
                if (gainBox) gainBox.style.display = '';
                applyIomPregnancyGoalDefaults_();
                calcFinalTarget();
            }
        }
        const gwShow = parseInt(document.getElementById('preg_week')?.value, 10);
        badge.textContent = Number.isFinite(gwShow) && gwShow >= 1 ? `Thai ${gwShow} tuần · IOM` : 'Đang mang thai · IOM';
        badge.className = 'badge bg-danger';
        badge.title = 'Thai kỳ: mục tiêu tăng cân theo IOM (2009), theo BMI trước thai và tuần thai — không dùng BMI người lớn để phân loại mục tiêu giảm cân.';
        return;
    }

    if (lossEl) lossEl.disabled = false;
    if (lossLbl) {
        lossLbl.classList.remove('opacity-50');
        lossLbl.title = '';
    }
    if (banner) banner.classList.add('d-none');

    // ——— Trẻ <19 tuổi: Z-score WHO ———
    if (!adult) {
        const { zWA, zWH, zBAZ, month: mo } = getPediatricZScoresForWeightGoal_();
        const zs = [zWA, zWH, zBAZ].filter(Number.isFinite);
        let suggestion = null;

        if (!zs.length) {
            badge.textContent = `Trẻ ${mo} tháng · chưa có Z-score`;
            badge.className = 'badge bg-secondary';
            badge.title = 'Nhập cân nặng, chiều cao và tuổi để có Z-score WHO (W/A, W/H, BMI-for-age). Trẻ 5–19 tuổi có thể nhập Z thủ công ở Module 2.';
            return;
        }

        const low = [zWA, zWH, zBAZ].some(z => Number.isFinite(z) && z < -2);
        const high = [zWA, zWH, zBAZ].some(z => Number.isFinite(z) && z > 2);
        const sevLow = [zWA, zWH, zBAZ].some(z => Number.isFinite(z) && z < -3);
        const sevHigh = [zWA, zWH, zBAZ].some(z => Number.isFinite(z) && z > 3);

        const parts = [];
        if (Number.isFinite(zWA)) parts.push(`Z W/A ${zWA >= 0 ? '+' : ''}${zWA.toFixed(1)}`);
        if (Number.isFinite(zWH)) parts.push(`Z W/H ${zWH >= 0 ? '+' : ''}${zWH.toFixed(1)}`);
        if (Number.isFinite(zBAZ)) parts.push(`Z BMI ${zBAZ >= 0 ? '+' : ''}${zBAZ.toFixed(1)}`);

        let label;
        let cls;
        if (low) {
            suggestion = 'GAIN';
            cls = sevLow ? 'bg-danger' : 'bg-warning text-dark';
            label = `NHI · ${parts.join(' · ')} · dưới -2 SD`;
        } else if (high) {
            suggestion = 'LOSS';
            cls = sevHigh ? 'bg-danger' : 'bg-warning text-dark';
            label = `NHI · ${parts.join(' · ')} · trên +2 SD`;
        } else {
            suggestion = 'MAINTAIN';
            cls = 'bg-success';
            label = `NHI · ${parts.join(' · ')} · BT`;
        }
        badge.textContent = label;
        badge.className = `badge ${cls}`;
        badge.title = 'Trẻ <19 tuổi: phân loại theo Z-score chuẩn WHO (không dùng ngưỡng BMI người lớn).';
        applySuggestedGoalMode_(suggestion);
        return;
    }

    // ——— Người trưởng thành ≥19 tuổi: BMI Châu Á ———
    const bmi = parseFloat(document.getElementById('m2_bmi')?.value);
    if (!Number.isFinite(bmi) || bmi <= 0) {
        badge.textContent = 'NL ≥19 · BMI: --';
        badge.className = 'badge bg-secondary';
        badge.title = 'Nhập cân nặng và chiều cao để có BMI (áp dụng từ đủ 19 tuổi).';
        return;
    }

    let label;
    let cls;
    let suggestion;
    if (bmi < 18.5) {
        label = `NL · BMI ${bmi.toFixed(1)} · Gầy`;
        cls = 'bg-info text-dark';
        suggestion = 'GAIN';
    } else if (bmi < 23) {
        label = `NL · BMI ${bmi.toFixed(1)} · Bình thường`;
        cls = 'bg-success';
        suggestion = 'MAINTAIN';
    } else if (bmi < 25) {
        label = `NL · BMI ${bmi.toFixed(1)} · Tiền béo phì (Châu Á)`;
        cls = 'bg-warning text-dark';
        suggestion = 'LOSS';
    } else if (bmi < 30) {
        label = `NL · BMI ${bmi.toFixed(1)} · Béo phì độ I`;
        cls = 'bg-danger';
        suggestion = 'LOSS';
    } else {
        label = `NL · BMI ${bmi.toFixed(1)} · Béo phì độ II+`;
        cls = 'bg-danger fw-bold';
        suggestion = 'LOSS';
    }
    badge.textContent = label;
    badge.className = `badge ${cls}`;
    badge.title = 'Người lớn ≥19 tuổi: phân loại BMI theo khuyến nghị Châu Á (thừa cân từ 23).';
    applySuggestedGoalMode_(suggestion);
    if (typeof updateExercisePrescription_ === 'function') updateExercisePrescription_();
}

            tri === 3 ? 'Yoga/giãn cơ tiền sản 2-3 buổi/tuần (tránh tư thế nằm ngửa kéo dài).' : 'Yoga/Pilates tiền sản 2-3 buổi/tuần.',
            'Bài tập sức cơ nhẹ với tạ 1-2 kg, 2 buổi/tuần (không nín thở khi gắng sức).'

        rest = [
            'Ngủ 7-9 giờ/đêm; quý 3 nằm nghiêng trái để cải thiện tuần hoàn.',
            'Nghỉ giữa giờ làm 5-10 phút mỗi giờ; gác chân khi ngồi lâu.'
        ];
        cautions.push('Tránh môn thể thao đối kháng, té ngã, lặn sâu, độ cao &gt;2.500m.');

    }

    else if (mode === 'LOSS') {

        ];
        weekly = [
            'Aerobic cường độ vừa <strong>150-300 phút/tuần</strong>: đi bộ nhanh, đạp xe, bơi, khiêu vũ (HIIT có thể thay thế nếu đủ sức).',
            '2-3 buổi/tuần kháng lực toàn thân: tạ tay, dây kháng lực, squat, plank — bảo toàn khối cơ khi giảm cân.',
            '1-2 buổi/tuần kéo giãn / yoga để giảm đau lưng - cải thiện linh hoạt.'
        ];
        rest = [
            'Ngủ <strong>7-9 giờ/đêm</strong>; thiếu ngủ làm tăng cảm giác đói (ghrelin) và giảm hiệu quả giảm cân.',
            'Nghỉ chủ động 1 ngày/tuần; theo dõi cân nặng &amp; vòng eo mỗi tuần cùng giờ.'
        ];
    }
    // ====== Người lớn ≥19 tuổi - TĂNG CÂN ======
    else if (mode === 'GAIN') {
        daily = [
            'Đi bộ nhẹ 15-30 phút/ngày để kích thích thèm ăn; tránh hoạt động cường độ cao gây tiêu hao thừa.',
            'Chia <strong>3 bữa chính + 2-3 bữa phụ</strong>; ưu tiên ăn sau buổi tập 30-60 phút (đạm + tinh bột).',
            'Hạn chế công việc thể lực nặng kéo dài.'
        ];
        weekly = [
            '<strong>3-4 buổi/tuần kháng lực</strong> (compound): squat, deadlift nhẹ, hít đất, kéo xà — ưu tiên tăng khối cơ.',
            'Aerobic cường độ thấp 2-3 buổi/tuần × 20-30 phút (đi bộ, đạp xe nhẹ) — không quá 150 phút/tuần.',
            'Mỗi nhóm cơ tập 1-2 lần/tuần, tăng tải dần dần (progressive overload).'
        ];
        rest = [
            'Ngủ <strong>8-9 giờ/đêm</strong> để hỗ trợ tổng hợp protein cơ.',
            'Nghỉ giữa các buổi cùng nhóm cơ ≥ 48 giờ.'

    // ====== Người lớn ≥19 tuổi - DUY TRÌ ======
    else {
        daily = [
            '<strong>5.000-7.000 bước/ngày</strong>; đứng dậy vận động 1-2 phút sau mỗi 30-45 phút ngồi.',

        ];
        weekly = [
            'Aerobic cường độ vừa <strong>150 phút/tuần</strong> hoặc cường độ cao 75 phút/tuần.',
            '2 buổi/tuần kháng lực toàn thân (mỗi nhóm cơ chính 1 lần/tuần).',
            '1-2 buổi/tuần thăng bằng / kéo giãn (đặc biệt sau 50 tuổi).'
        ];
        rest = [
            'Ngủ 7-9 giờ/đêm; giữ giờ ngủ - thức nhất quán.',
            'Theo dõi cân nặng &amp; vòng eo định kỳ 2-4 tuần/lần.'
        ];
    }

    // ====== Hiệu chỉnh theo bệnh lý ======
    if (isOlder) {
        weekly.push('Người ≥60 tuổi: thêm bài <strong>thăng bằng</strong> (đứng 1 chân, Tai Chi) 2-3 buổi/tuần dự phòng té ngã.');
        cautions.push('Khởi động kỹ 5-10 phút; tránh thay đổi tư thế đột ngột (nguy cơ tụt huyết áp tư thế).');
    }

    if (dxCodes.some(c => c.startsWith('E10') || c.startsWith('E11'))) {
        daily.push('<strong>Đái tháo đường</strong>: đi bộ 10-15 phút sau mỗi bữa chính giúp ổn định đường huyết sau ăn.');
        cautions.push('Mang theo viên đường nhanh khi tập; kiểm tra đường huyết trước-sau buổi tập đầu tiên trong ngày.');
        cautions.push('Đi giày vừa chân, kiểm tra bàn chân hằng ngày phòng loét chân do tiểu đường.');
    }
    if (dxCodes.some(c => c.startsWith('I10') || c.startsWith('I11') || c.startsWith('I12') || c.startsWith('I13') || c.startsWith('I15'))) {
        cautions.push('<strong>Tăng huyết áp</strong>: tránh nín thở (Valsalva) khi nâng tạ; giữ cường độ vừa, không gắng sức tối đa.');
    }
    if (dxCodes.some(c => c.startsWith('I2') || c.startsWith('I50'))) {
        cautions.push('<strong>Bệnh tim mạch / suy tim</strong>: tập theo chỉ định phục hồi chức năng tim; ngừng nếu đau ngực, khó thở bất thường.');
    }
    if (dxCodes.some(c => c.startsWith('N18') || conditions.includes('DIALYSIS_SESSION'))) {
        cautions.push('<strong>Bệnh thận mạn / lọc máu</strong>: ưu tiên tập ngày không lọc; theo dõi mệt, chuột rút, phù.');
    }
    if (dxCodes.some(c => c.startsWith('M10'))) {
        cautions.push('<strong>Gout</strong>: tránh tập nặng khi đang đợt cấp; ưu tiên bơi/đạp xe (giảm áp lực khớp).');
    }
    if (dxCodes.some(c => c.startsWith('M15') || c.startsWith('M16') || c.startsWith('M17') || c.startsWith('M19'))) {
        cautions.push('<strong>Thoái hóa khớp</strong>: ưu tiên bơi, đạp xe, thái cực quyền (giảm tải trọng lên khớp gối/háng).');
    }
    if (dxCodes.some(c => c.startsWith('J44') || c.startsWith('J45'))) {
        cautions.push('<strong>COPD / Hen</strong>: tập thở chu môi, mang theo bình xịt; khởi động dài hơn bình thường.');
    }
    if (dxCodes.some(c => c === 'M81' || c.startsWith('M80'))) {
        weekly.push('<strong>Loãng xương</strong>: thêm bài chịu tải (đi bộ, leo cầu thang, tạ nhẹ) - tránh xoắn cột sống và cúi gập sâu.');
    }
    if (conditions.includes('PRE_OP') || conditions.includes('POST_OP_EARLY')) {
        cautions.push('<strong>Quanh phẫu thuật</strong>: tập theo phác đồ phục hồi sau mổ (ERAS); đi lại sớm nhưng tránh gắng sức 4-6 tuần sau đại phẫu.');
    }
    if (conditions.includes('ICU')) {
        daily = ['Phục hồi vận động sớm tại giường theo Vật lý trị liệu Hồi sức (gập-duỗi tứ chi, ngồi dậy hỗ trợ).'];
        weekly = ['Tăng dần theo dung nạp; chuyển ra khỏi ICU mới áp dụng kế hoạch tập luyện chuẩn.'];
        cautions.push('<strong>Bệnh nặng / ICU</strong>: chỉ tập theo chỉ định bác sĩ &amp; vật lý trị liệu.');
    }
    if (conditions.includes('REFEEDING_RISK')) {
        cautions.push('<strong>Nguy cơ Refeeding</strong>: tập rất nhẹ (kéo giãn, đi lại ngắn) trong tuần đầu tái nuôi dưỡng.');
    }

    _setExerciseList_('exercise_rx_daily', daily);
    _setExerciseList_('exercise_rx_weekly', weekly);
    _setExerciseList_('exercise_rx_rest', rest);

    const cauWrap = document.getElementById('exercise_rx_caution_wrap');
    const cauUl = document.getElementById('exercise_rx_caution');
    if (cauWrap && cauUl) {
        if (cautions.length) {
            cauUl.innerHTML = cautions.map(t => `<li>${t}</li>`).join('');
            cauWrap.classList.remove('d-none');
        } else {
            cauUl.innerHTML = '';
            cauWrap.classList.add('d-none');
        }
    }
}

function recalcMacroFromRatio() {
    const p = parseFloat(document.getElementById('macro_p_pct').value);
    const l = parseFloat(document.getElementById('macro_l_pct').value);
    const g = 100 - p - l;
    document.getElementById('macro_g_pct').value = g.toFixed(1);

    const totalKcal = parseFloat(document.getElementById('final_kcal').innerText);
    const gLipid = ((totalKcal * (l/100)) / 9).toFixed(1);
    const gGlucid = ((totalKcal * (g/100)) / 4).toFixed(1);

    document.getElementById('macro_l_g').innerText = gLipid;
    document.getElementById('macro_g_g').innerText = gGlucid;
    syncWaterFiberDisplays();
    updateMicroNutrientsFootnote();
    if (document.getElementById('kitchen_note')) updateKitchenNote();
}

/** Nước ngày ≈ cân nặng tính toán × ml/kg (cấu hình Mod 3). */
function getTargetWaterMl() {
    const w = parseFloat(document.getElementById('target_weight').value) || 0;
    const waterPk = parseFloat(document.getElementById('target_water_per_kg').value) || 40;
    if (!w) return '0';
    return String(Math.round(w * waterPk));
}

/**
 * Gợi ý chất xơ: ~14 g/1000 kcal; người lớn tối thiểu ~25 g/ngày nếu đủ bệnh lý cho phép; tối đa ~40 g.
 * Trẻ em: giảm theo tuổi (tham khảo tổng kết dinh dưỡng lâm sàng / phổ biến ĐHYD).
 */
function getSuggestedFiberG() {
    const kcal = parseFloat(document.getElementById('final_kcal').innerText) || 0;
    if (!kcal) return '0';
    let g = Math.round((kcal / 1000) * 14);
    const isPed = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';
    const months = currentPatient.month || 0;
    if (isPed) {
        if (months < 12) return String(Math.max(0, Math.min(5, g)));
        if (months < 72) return String(Math.max(8, Math.min(25, g)));
    } else {
        g = Math.max(25, g);
        g = Math.min(g, 40);
    }
    return String(g);
}

function syncWaterFiberDisplays() {
    const wEl = document.getElementById('final_water_ml');
    const fEl = document.getElementById('final_fiber_g');
    if (wEl) wEl.innerText = getTargetWaterMl();
    if (fEl) fEl.innerText = getSuggestedFiberG();
}

function getInterventionNutrientSummary() {
    return {
        p: document.getElementById('macro_p_g')?.innerText || '0',
        l: document.getElementById('macro_l_g')?.innerText || '0',
        g: document.getElementById('macro_g_g')?.innerText || '0',
        water: getTargetWaterMl(),
        fiber: getSuggestedFiberG()
    };
}

// ===== Module 3 - Khối 3: tổng hợp toàn bộ đặc thù để gợi ý mã chế độ ăn =====
function getInterventionContext_() {
    const dxList = (Array.isArray(selectedDiagnosisList) ? selectedDiagnosisList : []);
    const dxCodes = dxList.map(d => String(d.code || '').toUpperCase());
    const dxGroups = dxList.map(d => String(d.group || '').toUpperCase());
    const conditions = (typeof getPatientConditions === 'function') ? getPatientConditions() : [];
    const isPed = currentPatient.type === 'PED' || currentPatient.type === 'PED_WHO';
    const monthAge = currentPatient.month || 0;
    const ageY = monthAge / 12;
    const gender = (document.getElementById('gioiTinh')?.value || '').toLowerCase();
    const bmi = parseFloat(document.getElementById('m2_bmi')?.value || '0') || 0;
    const stress = parseFloat(document.getElementById('factor_stress')?.value || '1') || 1;
    const pal = parseFloat(document.getElementById('factor_pal')?.value || '1.2') || 1.2;
    const dietPref = String(document.getElementById('diet_preference')?.value || 'NONE').toUpperCase();

    const edemaPresent = !!document.getElementById('m4_edema_present')?.checked;
    const edemaGrade = String(document.getElementById('m4_edema_grade')?.value || '');
    const nutritionClassif = String(document.getElementById('m4_nutrition_classification')?.innerText || '');

    // Hậu phẫu chi tiết (POD_*) / Trước phẫu thuật (PREOP_*) / ICU (ICU_*) / Lọc máu (HD_*)
    const pickPrefix = (prefix) => conditions.find(c => c.startsWith(prefix)) || '';
    const podCode = pickPrefix('POD_');                 // POD_0 / POD_1 / POD_2 / POD_3+
    const postopType = pickPrefix('POSTOP_TYPE_');      // GI/CARDIAC/...
    const postopDiet = pickPrefix('POSTOP_DIET_');      // NPO/CLEAR/LIQUID/SOFT/REGULAR/EN_TUBE/TPN
    const preopLevel = conditions.find(c => /^PREOP_(MAJOR|MODERATE|MINOR)$/.test(c)) || '';
    const preopType = pickPrefix('PREOP_TYPE_');
    const icuResp = pickPrefix('ICU_RESP_');
    const icuHemo = pickPrefix('ICU_HEMO_');
    const icuRoute = pickPrefix('ICU_ROUTE_');
    const hdType = conditions.find(c => /^HD_(HD|HDF|CRRT|PD|OTHER)$/.test(c)) || '';
    const hdFreq = pickPrefix('HD_FREQ_');              // HD_FREQ_2 / 3 / 4+
    const hdK = pickPrefix('HD_K_');                    // HD_K_HIGH/NORMAL/LOW
    const hdP = pickPrefix('HD_P_');
    const pregTri = pickPrefix('PREGNANT_T');           // PREGNANT_T1/2/3
    const pregWeek = parseInt(document.getElementById('preg_week')?.value, 10);

    // Dị ứng đã ghi nhận
    const allergies = [];
    document.querySelectorAll('.allergy-check:checked, #m1_drug_allergy_list input[type="checkbox"]:checked').forEach(cb => {
        const lbl = cb.closest('label')?.innerText || cb.value || '';
        if (lbl) allergies.push(lbl.trim());
    });

    return {
        dxList, dxCodes, dxGroups, conditions,
        isPed, monthAge, ageY, gender, bmi, stress, pal, dietPref,
        edemaPresent, edemaGrade, nutritionClassif,
        podCode, postopType, postopDiet, preopLevel, preopType,
        icuResp, icuHemo, icuRoute,
        hdType, hdFreq, hdK, hdP,
        pregTri, pregWeek,
        allergies
    };
}

function _scanFeatures_(ctx) {
    const features = [];
    const add = (label, level = 'info', tip = '') => features.push({ label, level, tip });

    // Module 1
    if (ctx.gender) add(`Giới: ${ctx.gender === 'nu' ? 'Nữ' : 'Nam'}`, 'info');
    if (ctx.monthAge > 0) {
        if (ctx.isPed) add(`Trẻ ${ctx.monthAge} tháng`, 'info');
        else if (ctx.ageY >= 60) add(`Người cao tuổi (${Math.round(ctx.ageY)} tuổi)`, 'info');
        else add(`Người lớn (${Math.round(ctx.ageY)} tuổi)`, 'info');
    }

    // Module 2
    if (ctx.bmi > 0) {
        if (!ctx.isPed) {
            if (ctx.bmi < 18.5) add(`BMI ${ctx.bmi.toFixed(1)} - Gầy`, 'warn');
            else if (ctx.bmi >= 30) add(`BMI ${ctx.bmi.toFixed(1)} - Béo phì`, 'warn');
            else if (ctx.bmi >= 25) add(`BMI ${ctx.bmi.toFixed(1)} - Béo phì độ I`, 'warn');
            else if (ctx.bmi >= 23) add(`BMI ${ctx.bmi.toFixed(1)} - Tiền béo phì (Á)`, 'warn');
            else add(`BMI ${ctx.bmi.toFixed(1)} - Bình thường`, 'success');
        } else {
            add(`BMI ${ctx.bmi.toFixed(1)} (nhi)`, 'info');
        }
    }
    if (ctx.edemaPresent) add(`Phù dinh dưỡng${ctx.edemaGrade ? ' ' + ctx.edemaGrade : ''}`, 'danger', 'Yếu tố tăng nặng - cao đạm');
    if (/Marasmus|Kwashiorkor|nặng/i.test(ctx.nutritionClassif)) add(`SDD: ${ctx.nutritionClassif}`, 'danger');
    ctx.allergies.forEach(a => add(`Dị ứng: ${a}`, 'danger'));

    // Module 3 - Bước 4 (chẩn đoán)
    ctx.dxList.forEach(d => add(`${d.code} ${d.name || ''}`.trim(), 'warn'));

    // Module 3 - Bước 5
    if (ctx.stress && ctx.stress !== 1) add(`Stress factor ×${ctx.stress.toFixed(2)}`, 'warn');

    // Module 3 - Bước 6
    if (ctx.conditions.includes('PRE_OP')) {
        const lvlLabel = ctx.preopLevel === 'PREOP_MAJOR' ? 'Đại phẫu' : ctx.preopLevel === 'PREOP_MODERATE' ? 'Trung phẫu' : ctx.preopLevel === 'PREOP_MINOR' ? 'Tiểu phẫu' : '';
        add('Trước phẫu thuật' + (lvlLabel ? ' · ' + lvlLabel : ''), 'warn');
        if (ctx.conditions.includes('PREOP_ERAS_CARB')) add('ERAS: carb 2h trước mổ', 'info');
    }
    if (ctx.conditions.includes('POST_OP_EARLY')) {
        const podLbl = ctx.podCode ? ctx.podCode.replace('POD_', 'Ngày ') : '';
        const dietLbl = ({ NPO: 'NPO', CLEAR: 'Nước trong', LIQUID: 'Lỏng', SOFT: 'Mềm', REGULAR: 'Thường', EN_TUBE: 'Sonde', TPN: 'TPN' })[ctx.postopDiet?.replace('POSTOP_DIET_', '') || ''] || '';
        add('Hậu phẫu' + (podLbl ? ' · ' + podLbl : '') + (dietLbl ? ' · ' + dietLbl : ''), 'warn');
        if (ctx.conditions.includes('POSTOP_GUT_OK')) add('Đã có trung tiện', 'success');
    }
    if (ctx.conditions.includes('DIALYSIS_SESSION')) {
        const t = ctx.hdType?.replace('HD_', '') || '';
        const f = ctx.hdFreq?.replace('HD_FREQ_', '') || '';
        add('Đang lọc máu' + (t ? ' · ' + t : '') + (f ? ` · ${f} lần/tuần` : ''), 'danger');
        if (ctx.hdK === 'HD_K_HIGH') add('Kali máu cao', 'danger');
        if (ctx.hdP === 'HD_P_HIGH') add('Phospho máu cao', 'danger');
    }
    if (ctx.conditions.includes('ICU')) {
        const r = ({ ICU_RESP_IMV: 'Thở máy XL', ICU_RESP_NIV: 'Thở máy KXL', ICU_RESP_HFNC: 'HFNC/Oxy', ICU_RESP_SPONT: 'Tự thở' })[ctx.icuResp] || '';
        const h = ({ ICU_HEMO_STABLE: 'Ổn định', ICU_HEMO_VASO_LOW: 'Vận mạch thấp', ICU_HEMO_SHOCK: 'Sốc' })[ctx.icuHemo] || '';
        const ro = ({ ICU_ROUTE_EN: 'EN', ICU_ROUTE_PN: 'PN', ICU_ROUTE_MIXED: 'EN+PN', ICU_ROUTE_NPO: 'NPO' })[ctx.icuRoute] || '';
        add('ICU' + [r, h, ro].filter(Boolean).map(s => ' · ' + s).join(''), 'danger');
        if (ctx.conditions.includes('ICU_NUTRIC_HIGH')) add('NUTRIC ≥ 5', 'danger');
        if (ctx.conditions.includes('REFEEDING_RISK')) add('Nguy cơ Refeeding', 'danger');
    }
    if (ctx.conditions.includes('PREGNANT')) {
        const tri = ctx.pregTri ? ' Q' + ctx.pregTri.replace('PREGNANT_T', '') : '';
        add(`Mang thai${tri}${Number.isFinite(ctx.pregWeek) ? ' (' + ctx.pregWeek + ' tuần)' : ''}`, 'warn');
    }
    if (ctx.conditions.includes('LACTATING')) add('Cho con bú' + (ctx.conditions.includes('EBF') ? ' · Bú mẹ HT' : ctx.conditions.includes('NON_EBF') ? ' · Không HT' : ''), 'info');
    if (ctx.dietPref && ctx.dietPref !== 'NONE') add(`Sở thích/Tôn giáo: ${ctx.dietPref}`, 'info');

    return features;
}

function updateRxScanPanel_(features) {
    const wrap = document.getElementById('rx_scan_chips');
    const empty = document.getElementById('rx_scan_empty');
    const cnt = document.getElementById('rx_scan_count');
    if (!wrap || !empty || !cnt) return;

    cnt.textContent = `${features.length} đặc thù`;
    if (!features.length) {
        wrap.innerHTML = '';
        empty.style.display = '';
    } else {
        empty.style.display = 'none';
        wrap.innerHTML = features.map(f => {
            const cls = f.level === 'danger' ? 'bg-danger text-white'
                : f.level === 'warn' ? 'bg-warning text-dark'
                : f.level === 'success' ? 'bg-success text-white'
                : 'bg-info-subtle text-dark border';
            return `<span class="badge ${cls} text-wrap" title="${(f.tip || '').replace(/"/g, '&quot;')}">${f.label}</span>`;
        }).join('');
    }
}

function autoMapDietCode() {
    const ctx = getInterventionContext_();
    const features = _scanFeatures_(ctx);
    updateRxScanPanel_(features);

    const candidates = [];
    const push = (severity, c, r) => candidates.push({ severity, code: c, reason: r });

    // Nền mặc định
    push(0, "BT02-X", "Không có ghi nhận đặc biệt.");

    // ===== A. ƯU TIÊN ĐỜI SỐNG / NHẬN BIẾT TÍNH MẠNG (severity cao nhất) =====
    if (ctx.conditions.includes('ICU')) {
        if (ctx.icuRoute === 'ICU_ROUTE_PN' || ctx.icuRoute === 'ICU_ROUTE_NPO') push(99, 'TH02-X', 'ICU - đường nuôi tĩnh mạch/NPO → ưu tiên dạng lỏng/qua ống');
        else if (ctx.icuRoute === 'ICU_ROUTE_EN' || ctx.icuRoute === 'ICU_ROUTE_MIXED') push(99, 'TH02-X', 'ICU - nuôi qua sonde → mã ăn lỏng cao đạm');
        else push(98, 'TH02-X', 'Bệnh nặng / ICU');
    }
    if (ctx.conditions.includes('REFEEDING_RISK')) {
        push(97, 'TH02-X', 'Nguy cơ Refeeding - khởi đầu ăn lỏng năng lượng thấp, theo dõi điện giải');
    }
    if (ctx.dxCodes.some(c => c.startsWith('T31'))) push(96, 'BO02-X', 'Bỏng diện rộng - rất cao năng lượng & đạm');
    if (ctx.dxCodes.some(c => c.startsWith('A41'))) push(94, 'NK01-X', 'Nhiễm khuẩn huyết / nặng');

    // ===== B. PHẪU THUẬT (Bước 6 mục 1) =====
    if (ctx.conditions.includes('POST_OP_EARLY')) {
        const dietK = ctx.postopDiet ? ctx.postopDiet.replace('POSTOP_DIET_', '') : '';
        if (dietK === 'NPO' || dietK === 'CLEAR') push(92, 'PT01-X', 'Hậu phẫu sớm - lỏng / khởi động ruột');
        else if (dietK === 'LIQUID') push(90, 'PT01-X', 'Hậu phẫu - ăn lỏng');
        else if (dietK === 'SOFT') push(88, 'PT02-X', 'Hậu phẫu - ăn mềm chuyển tiếp');
        else if (dietK === 'EN_TUBE' || dietK === 'TPN') push(95, 'TH02-X', 'Hậu phẫu nuôi qua sonde / TPN');
        else if (ctx.podCode === 'POD_3+') push(70, 'PT03-X', 'Hậu phẫu chuyển tiếp 2');
        else push(85, 'PT01-X', 'Hậu phẫu - khởi động ruột');
    }
    if (ctx.conditions.includes('PRE_OP')) {
        // Tiền phẫu giữ chế độ thường nhưng đánh dấu lưu ý ERAS — không ép mã đặc biệt
        push(20, 'BT02-X', 'Trước phẫu thuật - ăn cân đối, lưu ý ERAS / NPO theo phác đồ');
    }
    if (ctx.dxCodes.some(c => c.startsWith('Z98'))) push(64, 'PT04-X', 'Hậu phẫu phục hồi (Z98)');

    // ===== C. THẬN / LỌC MÁU (Bước 6 mục 1.3) =====
    if (ctx.conditions.includes('DIALYSIS_SESSION')) {
        const f = ctx.hdFreq?.replace('HD_FREQ_', '') || '';
        if (f === '3' || f === '4+') push(95, 'TN10-X', 'Thận lọc máu 3+ lần/tuần');
        else if (f === '2') push(94, 'TN11-X', 'Thận lọc máu 2 lần/tuần');
        else if (f) push(93, 'TN12-X', 'Thận lọc máu 1 lần/tuần');
        else push(93, 'TN12-X', 'Đang lọc máu');
    }
    if (ctx.dxCodes.some(c => c.includes('N18.5'))) push(93, 'TN12-X', 'Suy thận giai đoạn cuối');
    else if (ctx.dxCodes.some(c => c.includes('N18.3') || c.includes('N18.4'))) {
        const k = ctx.hdK === 'HD_K_HIGH' ? 'TN09-X' : 'TN08-X';
        push(85, k, 'Suy thận mạn GĐ 3-4' + (ctx.hdK === 'HD_K_HIGH' ? ' (tăng K)' : ''));
    } else if (ctx.dxCodes.some(c => c.startsWith('N18'))) push(80, 'TN07-X', 'Suy thận mạn bảo tồn');
    if (ctx.dxCodes.some(c => c.startsWith('N04'))) push(82, 'TN13-X', 'Hội chứng thận hư');

    // ===== D. ĐÁI THÁO ĐƯỜNG + bệnh nền =====
    const hasDM = ctx.dxCodes.some(c => c.startsWith('E10') || c.startsWith('E11'));
    if (hasDM) {
        if (ctx.bmi >= 25 && !ctx.isPed) push(82, 'DD02-X', 'ĐTĐ + thừa cân / béo phì');
        else if (ctx.dxCodes.some(c => c.includes('N18.3') || c.includes('N18.4'))) push(85, 'DD07-X', 'ĐTĐ + suy thận GĐ 3-4');
        else if (ctx.dxCodes.some(c => c.startsWith('N18'))) push(83, 'DD06-X', 'ĐTĐ + suy thận GĐ 1-2');
        else if (ctx.dxCodes.some(c => c.startsWith('I50'))) push(83, 'DD08-X', 'ĐTĐ + suy tim');
        else if (ctx.dxCodes.some(c => c.startsWith('M10'))) push(80, 'DD09-X', 'ĐTĐ + Gout');
        else push(78, 'DD01-X', 'Đái tháo đường');
    }

    // ===== E. TIM MẠCH =====
    if (ctx.dxCodes.some(c => c.startsWith('I21'))) push(85, 'TM06-X', 'Nhồi máu cơ tim cấp 1-3 ngày');
    if (ctx.dxCodes.some(c => c.startsWith('I50'))) {
        if (ctx.dxCodes.some(c => c.includes('I50.4') || c.includes('I50.9'))) push(82, 'TM05-X', 'Suy tim GĐ 4 mất bù');
        else push(75, 'TM03-X', 'Suy tim GĐ 1-2');
    }
    if (ctx.dxCodes.some(c => c.startsWith('I10'))) push(58, 'TM01-X', 'Tăng huyết áp');
    if (ctx.dxCodes.some(c => c.startsWith('E78'))) push(55, 'TM02-X', 'Rối loạn lipid máu');

    // ===== F. TIÊU HÓA / GAN MẬT / TỤY =====
    if (ctx.dxCodes.some(c => c.startsWith('K85'))) push(76, 'VT01-X', 'Viêm tụy cấp - khởi động');
    if (ctx.dxCodes.some(c => c.startsWith('K86.1'))) push(70, 'VT05-X', 'Viêm tụy mạn');
    if (ctx.dxCodes.some(c => c.includes('K72'))) push(80, 'GM05-X', 'Hôn mê gan');
    if (ctx.dxCodes.some(c => c.startsWith('K74') || c.startsWith('K70.3'))) push(75, 'GM04-X', 'Xơ gan');
    if (ctx.dxCodes.some(c => c.startsWith('K7'))) push(62, 'GM03-X', 'Bệnh gan mật');
    if (ctx.dxCodes.some(c => c.startsWith('K92.0') || c.startsWith('K92.1') || c.startsWith('K92.2'))) push(85, 'TH02-X', 'Chảy máu tiêu hóa - ăn lỏng');
    if (ctx.dxCodes.some(c => c.startsWith('K29') || c.startsWith('K21') || c.startsWith('K25') || c.startsWith('K26'))) push(52, 'TH01-X', 'Bệnh dạ dày-thực quản');
    if (ctx.dxCodes.some(c => c.startsWith('K50') || c.startsWith('K51') || c.startsWith('K52'))) push(56, 'TH04-X', 'Viêm đại tràng');

    // ===== G. GOUT =====
    if (ctx.dxCodes.some(c => c.startsWith('M10'))) push(60, 'GU01-X', 'Bệnh gout');

    // ===== H. SDD / suy mòn / NHIỄM KHUẨN MẠN =====
    if (ctx.dxCodes.some(c => c.startsWith('E40') || c.startsWith('E41') || c.startsWith('E42') || c.startsWith('E43') || c.startsWith('E44'))) {
        push(78, 'NK01-X', 'Suy dinh dưỡng nặng - cao năng lượng & đạm');
    }
    if (ctx.edemaPresent) push(74, 'NK01-X', 'Phù dinh dưỡng / Kwashiorkor - cao đạm');

    // ===== I. SẢN KHOA =====
    if (ctx.conditions.includes('PREGNANT')) {
        if (ctx.conditions.includes('GDM') || ctx.dxCodes.some(c => c === 'O24.4')) push(75, 'SK05-X', 'Đái tháo đường thai kỳ');
        else if (ctx.dxCodes.some(c => c.startsWith('O14'))) push(78, 'SK06-X', 'Tiền sản giật');
        else if (ctx.dxCodes.some(c => c.startsWith('O21'))) push(72, 'SK04-X', 'Nghén nặng');
        else if (ctx.pregTri === 'PREGNANT_T3') push(60, 'SK02-X', 'Thai kỳ 3 tháng cuối');
        else push(55, 'SK01-X', 'Thai kỳ 6 tháng đầu');
    }
    if (ctx.conditions.includes('LACTATING')) push(50, 'SK03-X', 'Cho con bú');

    // ===== J. NHI KHOA =====
    if (ctx.isPed) {
        if (ctx.monthAge < 6) push(15, 'SK01-X', 'Trẻ < 6 tháng');
        else if (ctx.monthAge < 24) push(15, 'SK02-X', 'Trẻ 6-24 tháng (bột/súp)');
        else if (ctx.monthAge < 36) push(10, 'VT01-X', 'Trẻ 1-3 tuổi');
        else if (ctx.monthAge < 72) push(8, 'VT02-X', 'Trẻ 3-6 tuổi');
    }

    // ===== K. THỪA CÂN / BÉO PHÌ (khi không có bệnh nặng khác) =====
    if (!ctx.isPed && ctx.bmi >= 25 && !hasDM) push(35, 'BT01-X', 'Thừa cân - chế độ năng lượng thấp BT01');

    // ===== Chốt mã có severity cao nhất =====
    candidates.sort((a, b) => b.severity - a.severity);
    const top = candidates[0];
    const code = top.code;
    const prioritized = candidates.filter(c => c.severity > 0);
    const extraCount = Math.max(0, prioritized.length - 1);
    const reason = top.reason + (extraCount ? ` | (+${extraCount} yếu tố khác trong stack ưu tiên)` : '');

    // Render select danh mục mã
    const selectEl = document.getElementById('diet_code_select');
    if (selectEl) {
        selectEl.innerHTML = "";
        for (const [key, val] of Object.entries(DIET_CODE_DB)) {
            const option = document.createElement("option");
            option.value = key;
            option.text = `${val.name}`;
            selectEl.appendChild(option);
        }
        selectEl.value = code;
    }

    const displayCode = getDietCodeDisplay(code, document.getElementById('diet_prep_select')?.value || 'COM');
    const badge = document.getElementById('suggested_code_badge');
    if (badge) {
        const tip = candidates.filter(c => c.severity > 0).map(c => `[${c.severity}] ${c.reason}`).join('\n');
        badge.title = tip;
        badge.innerHTML = `<i class="fas fa-robot"></i> Gợi ý: <strong>${displayCode}</strong> <small>(${reason})</small>`;
    }

    syncSuggestedDietPrepFromCode(code);

    // Đề xuất "Dạng chế biến" dựa trên đường nuôi/POD/ICU/dysphagia
    const prepSel = document.getElementById('diet_prep_select');
    if (prepSel) {
        if (ctx.icuRoute === 'ICU_ROUTE_EN' || ctx.icuRoute === 'ICU_ROUTE_PN' || ctx.icuRoute === 'ICU_ROUTE_NPO' || ctx.postopDiet === 'POSTOP_DIET_NPO' || ctx.postopDiet === 'POSTOP_DIET_CLEAR' || ctx.postopDiet === 'POSTOP_DIET_LIQUID' || ctx.postopDiet === 'POSTOP_DIET_TPN') {
            prepSel.value = 'SUA';
        } else if (ctx.postopDiet === 'POSTOP_DIET_SOFT' || ctx.podCode === 'POD_1' || ctx.podCode === 'POD_2') {
            prepSel.value = 'CHAO';
        }
    }

    updateKitchenNote();
}

function updateKitchenNote() {
    let rxFeats = [];
    try {
        rxFeats = _scanFeatures_(getInterventionContext_());
        updateRxScanPanel_(rxFeats);
    } catch (e) { console.warn('updateKitchenNote rx scan', e); }

    const codeKey = document.getElementById('diet_code_select').value;
    const prepKey = document.getElementById('diet_prep_select')?.value || 'COM';
    const prepLabel = getDietPrepLabel(prepKey);
    const displayCode = getDietCodeDisplay(codeKey, prepKey);
    const dietInfo = DIET_CODE_DB[codeKey] || { name: 'Chưa xác định', desc: '' };
    const totalKcal = document.getElementById('final_kcal').innerText;
    const nut = getInterventionNutrientSummary();
    
    const freq = "3";
    const route = "Đường miệng"; 
    
    let kNote = `MÃ ĂN: ${displayCode} - ${dietInfo.name}.\n`;
    kNote += `ĐẶC ĐIỂM: ${dietInfo.desc}\n`;
    kNote += `TỔNG KẾT THÀNH PHẦN: P: ${nut.p} g | L: ${nut.l} g | G: ${nut.g} g | Nước: ~${nut.water} ml | Xơ: ~${nut.fiber} g (gợi ý, điều chỉnh theo bệnh).\n`;
    kNote += `DẠNG CHẾ BIẾN: ${prepLabel} | SỐ BỮA: ${freq}/ngày | ĐƯỜNG NUÔI: ${route}.\n`;
    kNote += `MỤC TIÊU NĂNG LƯỢNG: ${totalKcal} Kcal/ngày.`;

    const pref = document.getElementById('diet_preference')?.value;
    if(pref && pref !== 'NONE') kNote += `\n⚠️ LƯU Ý ĐẶC BIỆT: KHÁCH ${pref}.`;

    if (rxFeats.length) {
        kNote += `\n\n── CƠ SỞ KÊ ĐƠN (quét Mod 1–3, QĐ 2879) ──\n`;
        const maxLines = 14;
        rxFeats.slice(0, maxLines).forEach(f => { kNote += `• ${stripHtml_(f.label)}\n`; });
        if (rxFeats.length > maxLines) kNote += `• … và ${rxFeats.length - maxLines} đặc thù khác (xem chip “Đặc thù người bệnh đã quét”).\n`;
    }

    document.getElementById('kitchen_note').value = kNote;
    document.getElementById('kitchen_note').rows = rxFeats.length ? Math.min(20, 7 + Math.min(rxFeats.length, 12)) : 6; 

    let dNote = `Chỉ định dinh dưỡng: ${dietInfo.name} (${displayCode}). Dạng chế biến: ${prepLabel}. `;
    dNote += `Năng lượng ${totalKcal} kcal; P ${nut.p}g, L ${nut.l}g, G ${nut.g}g; nước ~${nut.water} ml; xơ ~${nut.fiber}g. Đường nuôi: ${route}. `;
    if (rxFeats.length) {
        const brief = rxFeats.slice(0, 6).map(f => stripHtml_(f.label)).join('; ');
        dNote += `Đặc thù đã quét (${rxFeats.length}): ${brief}${rxFeats.length > 6 ? '…' : ''}. `;
    }
    
    document.getElementById('doctor_note').value = dNote;
    updateCdaReferencePanel();
    updateIycfReferencePanel();
    updateLifestyleRecommendations();
}

// HÀM ADD MENU ĐÃ ĐƯỢC TÍCH HỢP LOGIC KIỂM TRA DỊ ỨNG
function addToMenu(foodId) {
    const food = VIET_FOOD_DB.find(f => f.id === foodId);
    // --- SAFETY BLOCK (TỰ ĐỘNG HOÀN TOÀN) ---
    if (food && isFoodBlockedByAllergy(food)) {
        alert(`⛔ CHẶN TỰ ĐỘNG: Bệnh nhân dị ứng (${currentAllergies.join(', ')}).\nMón "${food.name}" không được phép chỉ định.`);
        return;
    }

    const qtyInput = document.getElementById(`qty_${foodId}`);
    const qty = parseFloat(qtyInput.value) || 0;
    
    const mealRadios = document.getElementsByName(`meal_${foodId}`);
    let selectedMeal = 'breakfast';
    for (const r of mealRadios) { if (r.checked) selectedMeal = r.value; }
    
    if (selectedMeal === 'snack') {
        if (currentMenuData.snack1.length === 0) selectedMeal = 'snack1';
        else if (currentMenuData.snack2.length === 0) selectedMeal = 'snack2';
        else selectedMeal = 'snack3';
    }

    if (qty > 0 && food) {
        let factor = (food.unit === 'g' || food.unit === 'ml') ? qty / 100 : qty;
        const itemData = {
            ...food,
            realQty: qty,
            realKcal: (food.kcal * factor).toFixed(0),
            realP: (food.p * factor).toFixed(1),
            realL: (food.l * factor).toFixed(1),
            realG: (food.g * factor).toFixed(1)
        };
        currentMenuData[selectedMeal].push(itemData);
        renderCurrentMenu();
        updateDashboard();
    }
}

function renderCurrentMenu() {
    ['breakfast', 'snack1', 'lunch', 'snack2', 'dinner', 'snack3'].forEach(meal => {
        const tbody = document.getElementById(`menu_${meal}`);
        tbody.innerHTML = "";
        currentMenuData[meal].forEach((item, index) => {
            const row = `
            <tr>
                <td>${item.name}</td>
                <td class="text-end fw-bold">${item.realQty} ${item.unit}</td>
                <td class="text-end text-muted small">${item.realKcal} kcal</td>
                <td class="text-end"><i class="fas fa-times text-danger pointer" onclick="removeFromMenu('${meal}', ${index})"></i></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    });
    renderDailyExchangeTable();
}

function renderDailyExchangeTable() {
    const tbody = document.getElementById('daily_exchange_body');
    if (!tbody) return;

    const categoryLabel = {
        STARCH: 'Tinh bot',
        PROTEIN: 'Dam',
        VEG: 'Rau',
        MILK: 'Sua',
        FAT: 'Chat beo',
        SUGAR: 'Duong'
    };
    const groups = {};

    Object.values(currentMenuData).forEach(mealItems => {
        mealItems.forEach(item => {
            const key = item.cat || 'OTHER';
            if (!groups[key]) {
                groups[key] = {
                    label: categoryLabel[key] || key,
                    qty: 0,
                    unit: item.unit || ''
                };
            }
            groups[key].qty += parseFloat(item.realQty || 0);
            if (!groups[key].unit && item.unit) groups[key].unit = item.unit;
        });
    });

    const rows = Object.values(groups).filter(group => group.qty > 0);
    if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-muted text-center">Chua co du lieu quy doi.</td></tr>';
        return;
    }

    tbody.innerHTML = '';
    rows.forEach(group => {
        const qtyText = `${group.qty.toFixed(0)} ${group.unit || ''}`.trim();
        tbody.innerHTML += `<tr>
            <td>${group.label}</td>
            <td class="text-end fw-bold">${qtyText}</td>
            <td>${qtyText}</td>
        </tr>`;
    });
}

function removeFromMenu(meal, index) {
    currentMenuData[meal].splice(index, 1);
    renderCurrentMenu();
    updateDashboard();
}

function clearMenu() {
    currentMenuData = { breakfast: [], snack1: [], lunch: [], snack2: [], dinner: [], snack3: [] };
    renderCurrentMenu();
    updateDashboard();
}

function updateDashboard() {
    let totalKcal = 0, totalP = 0, totalL = 0, totalG = 0;
    Object.values(currentMenuData).forEach(mealItems => {
        mealItems.forEach(item => {
            totalKcal += parseFloat(item.realKcal);
            totalP += parseFloat(item.realP);
            totalL += parseFloat(item.realL);
            totalG += parseFloat(item.realG);
        });
    });

    const targetKcal = parseFloat(document.getElementById('final_kcal').innerText) || 2000;
    
    document.getElementById('curr_p').innerText = totalP.toFixed(1);
    document.getElementById('curr_l').innerText = totalL.toFixed(1);
    document.getElementById('curr_g').innerText = totalG.toFixed(1);
    
    const pct = Math.min((totalKcal / targetKcal) * 100, 100).toFixed(0);
    const progBar = document.getElementById('prog_kcal');
    progBar.style.width = `${pct}%`;
    progBar.innerText = `${totalKcal.toFixed(0)} / ${targetKcal} (${pct}%)`;
    
    if (pct > 110) { progBar.className = "progress-bar bg-danger"; progBar.innerText += " (DƯ)"; }
    else if (pct > 90) { progBar.className = "progress-bar bg-success"; }
    else { progBar.className = "progress-bar bg-warning text-dark"; }
}

function autoGenerateMenu() {
    const dietCode = document.getElementById('diet_code_select').value;
    const dietPrep = document.getElementById('diet_prep_select')?.value || 'COM';
    const prepLabel = getDietPrepLabel(dietPrep);
    const targetKcal = parseFloat(document.getElementById('final_kcal').innerText) || 1800;
    
    clearMenu();
    alert(`Đang khởi tạo thực đơn mẫu: ${dietCode} — ${prepLabel} (~${targetKcal} kcal)`);

    let starchId = 'S01'; 
    if (dietCode === 'DT01' || dietCode === 'DT_GDM') starchId = 'S02'; 
    if (dietCode === 'DD01' || dietCode.includes('NK03')) starchId = 'S03'; 
    if (dietCode === 'DT04') starchId = 'S06'; 
    starchId = applyDietPrepToStarch(dietPrep, starchId);

    let proteinId_Sang = 'P01'; 
    let proteinId_Trua = 'P02'; 
    let proteinId_Toi = 'P04'; 
    if (dietCode === 'DT06') { proteinId_Trua = 'P03'; proteinId_Toi = 'P06'; } 
    if (dietCode === 'DT03') { proteinId_Trua = 'P04'; proteinId_Toi = 'P06'; } 

    let milkId = 'M01'; 
    if (dietCode === 'DT01') milkId = 'M03'; 
    if (dietCode === 'DT04') milkId = 'M04'; 
    if (dietCode === 'DT05') milkId = 'M05'; 
    if (dietCode === 'BD' || dietCode === 'DT11' || dietCode.includes('NK_SDD')) milkId = 'M06'; 

    const starchKcalPool = targetKcal * 0.5;
    const starchPortionMult = dietPrep === 'SUA' ? 0.55 : 1;
    const kcalLunch = starchKcalPool * 0.4 * starchPortionMult;
    const kcalDinner = starchKcalPool * 0.35 * starchPortionMult;

    let bStarch = 'S04';
    let bQty = '150';
    if (dietPrep === 'CHAO' || dietPrep === 'SUA') { bStarch = 'S03'; bQty = '1'; }
    else if (dietPrep === 'COM') { bStarch = 'S04'; bQty = '150'; }
    else if (dietPrep === 'SUP') { bStarch = 'S04'; bQty = '150'; }

    const blockedItems = [];
    const safeAdd = (foodId, qty, meal) => {
        const ok = addToMenuDirect(foodId, qty, meal);
        if (!ok) {
            const f = VIET_FOOD_DB.find(x => x.id === foodId);
            blockedItems.push(f ? f.name : foodId);
        }
    };

    safeAdd(bStarch, bQty, 'breakfast'); 
    safeAdd(proteinId_Sang, 30, 'breakfast'); 

    safeAdd(starchId, starchQtyForKcalShare(starchId, kcalLunch), 'lunch'); 
    safeAdd(proteinId_Trua, 60, 'lunch'); 
    safeAdd('V01', 150, 'lunch'); 

    safeAdd(starchId, starchQtyForKcalShare(starchId, kcalDinner), 'dinner');
    safeAdd(proteinId_Toi, 60, 'dinner');
    safeAdd('V03', 150, 'dinner'); 

    const isNormalDiet = /^BT\d{2}-X$/.test(dietCode);
    if (!isNormalDiet) { 
        safeAdd(milkId, dietPrep === 'SUA' ? 250 : 200, 'snack2'); 
    } else {
        safeAdd('M02', 1, 'snack2'); 
    }

    if (dietCode === 'DT01' || dietCode === 'DT_GDM') {
        safeAdd(milkId, dietPrep === 'SUA' ? 150 : 100, 'snack3'); 
    } else if (dietPrep === 'SUA') {
        safeAdd(milkId, 150, 'snack3');
    }

    updateDashboard();
    if (blockedItems.length > 0) {
        alert(`⛔ Đã tự động chặn ${blockedItems.length} món do dị ứng: ${Array.from(new Set(blockedItems)).join(', ')}.`);
    }
}

function addToMenuDirect(foodId, qty, meal, opts) {
    const skipRender = opts && opts.skipRender;
    const food = VIET_FOOD_DB.find(f => f.id === foodId);
    if (!food) return false;
    if (isFoodBlockedByAllergy(food)) return false;
    
    let factor = (food.unit === 'g' || food.unit === 'ml') ? qty / 100 : qty;
    const itemData = {
        ...food,
        realQty: qty,
        realKcal: (food.kcal * factor).toFixed(0),
        realP: (food.p * factor).toFixed(1),
        realL: (food.l * factor).toFixed(1),
        realG: (food.g * factor).toFixed(1)
    };
    currentMenuData[meal].push(itemData);
    if (!skipRender) renderCurrentMenu();
    return true;
}

function escapeHtml_(s) {
    if (s == null || s === undefined) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function renderAiWeeklyDayPane_(plan, dayIndex) {

        el.innerHTML = '<div class="alert alert-warning mb-0">Không có dữ liệu cho ngày này.</div>';
        return;
    }
    let html = `<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">

        <button type="button" class="btn btn-sm btn-outline-primary" onclick="loadAiDayIntoCurrentMenu(${dayIndex})"><i class="fas fa-download"></i> Nạp ngày này vào menu &amp; quy đổi Mod 4</button>
    </div>`;

    AI_WEEKLY_MEAL_KEYS.forEach(([key, label, iconCls]) => {
        const m = day.meals[key];
        if (!m) return;
        html += `<div class="card mb-2 border-primary-subtle"><div class="card-header py-1 fw-bold bg-white">
            <i class="fas ${iconCls} me-1"></i> ${escapeHtml_(label)}
        </div><div class="card-body py-2">`;

        html += `<table class="table table-sm table-bordered mb-2"><thead class="table-light"><tr>
            <th>Món / thực phẩm</th><th class="text-end">SL</th><th class="text-end">Kcal</th><th class="text-end">P</th><th class="text-end">L</th><th class="text-end">G</th>
        </tr></thead><tbody>`;
        const items = Array.isArray(m.items) ? m.items : [];
        items.forEach(it => {
            const db = it.foodId ? VIET_FOOD_DB.find(f => f.id === it.foodId) : null;
            const name = (it.nameVi && String(it.nameVi).trim()) ? it.nameVi : (db ? db.name : (it.foodId || '—'));
            const qty = it.qty != null ? it.qty : '';
            const unit = it.unit != null ? it.unit : (db ? db.unit : '');
            let rk = '—', rp = '—', rl = '—', rg = '—';
            if (db && qty !== '' && qty != null) {
                const q = parseFloat(qty);
                if (Number.isFinite(q)) {
                    const factor = (db.unit === 'g' || db.unit === 'ml') ? q / 100 : q;
                    rk = (db.kcal * factor).toFixed(0);
                    rp = (db.p * factor).toFixed(1);
                    rl = (db.l * factor).toFixed(1);
                    rg = (db.g * factor).toFixed(1);
                }
            }
            html += `<tr><td>${escapeHtml_(name)}${it.foodId ? ` <span class="badge bg-light text-dark">${escapeHtml_(String(it.foodId))}</span>` : ''}</td>
                <td class="text-end">${escapeHtml_(String(qty))} ${escapeHtml_(String(unit))}</td>
                <td class="text-end">${escapeHtml_(rk)}</td><td class="text-end">${escapeHtml_(rp)}</td>
                <td class="text-end">${escapeHtml_(rl)}</td><td class="text-end">${escapeHtml_(rg)}</td></tr>`;
        });
        html += '</tbody>';
        const t = m.totals || {};
        if (t.kcal != null || t.p != null) {
            html += `<tfoot class="table-group-divider"><tr><th colspan="2">Tổng bữa (AI)</th>
                <th class="text-end">${t.kcal != null ? escapeHtml_(String(t.kcal)) : '—'}</th>
                <th class="text-end">${t.p != null ? escapeHtml_(String(t.p)) : '—'}</th>
                <th class="text-end">${t.l != null ? escapeHtml_(String(t.l)) : '—'}</th>
                <th class="text-end">${t.g != null ? escapeHtml_(String(t.g)) : '—'}</th></tr></tfoot>`;
        }
        html += '</table>';

        html += '<div class="fw-bold text-secondary small mb-1"><i class="fas fa-exchange-alt"></i> Quy đổi / khẩu phần (bữa)</div><ul class="small mb-2 ps-3">';
        (Array.isArray(m.exchanges) ? m.exchanges : []).forEach(ex => {
            html += `<li><strong>${escapeHtml_(ex.group)}:</strong> ${escapeHtml_(ex.detail)}</li>`;
        });

        html += '<div class="fw-bold text-success small mb-1"><i class="fas fa-fire-burner"></i> Gợi ý chế biến</div>';
        html += `<div class="border rounded p-2 bg-light" style="white-space:pre-wrap;">${escapeHtml_(m.recipe || '—')}</div>`;
        html += '</div></div>';
    });

    el.innerHTML = html;
}

function renderAiWeeklyPlan_(plan) {
    aiWeeklyPlanCache = plan;
    aiWeeklySelectedDay = 1;
    const toolbar = document.getElementById('ai_weekly_toolbar');
    const disc = document.getElementById('ai_weekly_disclaimer');
    if (disc) {
        disc.textContent = (plan.meta && plan.meta.disclaimer) ? plan.meta.disclaimer
            : 'Gợi ý do AI tạo — bác sĩ/cử nhân dinh dưỡng rà soát trước khi chỉ định.';
    }
    if (!toolbar || !plan.days) return;

    const days = plan.days.slice().sort((a, b) => Number(a.dayIndex) - Number(b.dayIndex));
    toolbar.innerHTML = days.map(d => {
        const di = Number(d.dayIndex);
        const active = di === 1 ? 'btn-success' : 'btn-outline-success';
        return `<button type="button" class="btn btn-sm ${active} ai-weekly-day-btn" data-day="${di}">Ngày ${di}</button>`;
    }).join(' ');

    toolbar.querySelectorAll('.ai-weekly-day-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            aiWeeklySelectedDay = parseInt(btn.getAttribute('data-day'), 10);
            toolbar.querySelectorAll('.ai-weekly-day-btn').forEach(b => {
                b.classList.remove('btn-success');
                b.classList.add('btn-outline-success');
            });
            btn.classList.remove('btn-outline-success');
            btn.classList.add('btn-success');
            renderAiWeeklyDayPane_(plan, aiWeeklySelectedDay);
        });
    });

    renderAiWeeklyDayPane_(plan, 1);
}

function loadAiDayIntoCurrentMenu(dayIndex) {
    const plan = aiWeeklyPlanCache;
    if (!plan || !plan.days) {
        alert('Chưa có thực đơn AI. Bấm «AI 7 ngày» trước.');
        return;
    }
    const day = plan.days.find(d => Number(d.dayIndex) === Number(dayIndex)) || plan.days[dayIndex - 1];
    if (!day || !day.meals) {
        alert('Không tìm thấy dữ liệu ngày ' + dayIndex);
        return;
    }
    clearMenu();
    let skipped = 0;
    const mealKeys = AI_WEEKLY_MEAL_KEYS.map(x => x[0]);
    mealKeys.forEach(meal => {
        const block = day.meals[meal];
        if (!block || !Array.isArray(block.items)) return;
        block.items.forEach(it => {
            const fid = it.foodId;
            const qty = parseFloat(it.qty);
            if (!fid || !Number.isFinite(qty) || qty <= 0) {
                skipped++;
                return;
            }
            const ok = addToMenuDirect(fid, qty, meal, { skipRender: true });
            if (ok === false) skipped++;
        });
    });
    renderCurrentMenu();
    updateDashboard();
    let msg = 'Đã nạp thực đơn AI — Ngày ' + dayIndex + ' vào bảng Mod 4.';
    if (skipped) msg += '\n\n(' + skipped + ' dòng bỏ qua: thiếu foodId trong kho hoặc dị ứng — xem chi tiết trong bảng AI phía dưới.)';
    alert(msg);
}

/** Lấy text của <label> liền kề một input checkbox/radio đã tick. */
function _labelOf_(el) {
    if (!el) return '';
    if (el.dataset && el.dataset.printLabel) return el.dataset.printLabel.trim();
    let l = el.closest('label');
    if (l) return (l.innerText || '').trim();
    if (el.id) {
        const labelFor = document.querySelector(`label[for="${el.id}"]`);
        if (labelFor) return (labelFor.innerText || '').trim();
    }
    if (el.nextElementSibling && el.nextElementSibling.tagName === 'LABEL') return (el.nextElementSibling.innerText || '').trim();
    return el.value || el.id || '';
}

/** Trả về danh sách "label: value" của các <input>/<select>/<textarea> có giá trị trong scope (theo container/id). */
function _collectFilledFields_(rootSelector) {
    const root = document.querySelector(rootSelector);
    if (!root) return [];
    const out = [];
    root.querySelectorAll('input, select, textarea').forEach(el => {
        if (el.type === 'hidden') return;
        if (el.disabled) return;
        if (el.closest('.d-none, [style*="display: none"], [style*="display:none"]')) return;

        if (el.type === 'checkbox' || el.type === 'radio') {
            if (!el.checked) return;
            const label = _labelOf_(el);
            if (!label) return;
            out.push({ label });
            return;
        }
        const v = (el.value || '').trim();
        if (!v) return;
        const label = _labelOf_(el);
        out.push({ label: label || el.id || el.name || '(không nhãn)', value: v });
    });
    return out;
}

/** Gom toàn bộ <ul> trong một container thành mảng dòng text (loại bỏ HTML). */
function _collectListsHtml_(rootSelector) {
    const root = document.querySelector(rootSelector);
    if (!root) return '';
    const blocks = [];
    root.querySelectorAll('ul, ol').forEach(ul => {
        const items = Array.from(ul.querySelectorAll(':scope > li'))
            .map(li => (li.innerHTML || '').trim())
            .filter(Boolean);
        if (items.length) blocks.push('<ul style="margin:4px 0 6px 18px;padding:0;">' + items.map(t => `<li>${t}</li>`).join('') + '</ul>');
    });
    return blocks.join('');
}

/** Format ngày YYYY-MM-DD -> DD/MM/YYYY. */
function _formatDateVN_(v) {
    if (!v) return '';
    const p = String(v).split('-');
    if (p.length === 3) return `${p[2]}/${p[1]}/${p[0]}`;
    return v;
}

/** Tính khoảng tái khám theo bệnh lý/đặc thù để gợi ý. */
function _suggestFollowUpDays_() {
    const ctx = (typeof getInterventionContext_ === 'function') ? getInterventionContext_() : null;
    if (!ctx) return 30;
    if (ctx.conditions.includes('ICU') || ctx.conditions.includes('REFEEDING_RISK')) return 3;
    if (ctx.conditions.includes('POST_OP_EARLY')) return 7;
    if (ctx.conditions.includes('DIALYSIS_SESSION')) return 14;
    if (ctx.conditions.includes('PREGNANT')) return 28;
    if (ctx.dxCodes.some(c => c.startsWith('E10') || c.startsWith('E11'))) return 30;
    if (ctx.dxCodes.some(c => c.startsWith('I10') || c.startsWith('I50') || c.startsWith('I21'))) return 30;
    if (ctx.dxCodes.some(c => c.startsWith('N18'))) return 30;
    if (/Marasmus|Kwashiorkor|nặng/i.test(ctx.nutritionClassif)) return 14;
    return 30;
}

/** Trả về DD/MM/YYYY khi cộng N ngày từ hôm nay. */
function _addDaysFormatted_(n) {
    const d = new Date();
    d.setDate(d.getDate() + Number(n || 0));
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');

                    if (db && qty !== '' && Number.isFinite(parseFloat(qty))) {
                        const q = parseFloat(qty);
                        const factor = (db.unit === 'g' || db.unit === 'ml') ? q / 100 : q;
                        rk = (db.kcal * factor).toFixed(0);
                        rp = (db.p * factor).toFixed(1);
                        rl = (db.l * factor).toFixed(1);
                        rg = (db.g * factor).toFixed(1);
                    }
                    html += `<tr>
                        <td style="border:1px solid #bbb;padding:2px 4px;">${escapeHtml_(name)}${it.foodId ? ` <span style="color:#666;">[${escapeHtml_(String(it.foodId))}]</span>` : ''}</td>
                        <td style="border:1px solid #bbb;padding:2px 4px;text-align:right;">${escapeHtml_(String(qty))} ${escapeHtml_(String(unit))}</td>
                        <td style="border:1px solid #bbb;padding:2px 4px;text-align:right;">${escapeHtml_(rk)}</td>

                        <td style="border:1px solid #bbb;padding:2px 4px;text-align:right;">${escapeHtml_(rg)}</td>
